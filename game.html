const balSaveProb=(arm,pen)=>Math.max(0,(21-(arm+pen))/20);
// Damage of 1 weapon at best range vs target armor
const balWeaponDmg=(wk,tArm)=>{
  const w=WEAPS[wk]||VWEAPS[wk];if(!w)return 0;
  let best=0;
  for(const b of["melee","cat1","cat2","catP"]){
    const diff=w[b];if(!diff)continue;
    const hitP=Math.max(0,(21-diff)/20);
    const failS=1-balSaveProb(tArm,w.pen);
    const dmg=w.dMax?(1+w.dMax)/2:w.dmg;
    const exp=w.mun*hitP*failS*dmg;
    if(exp>best)best=exp;
  }
  return best;
};
const balUnitData=(tArm=15)=>Object.entries(UDEFS).map(([k,u])=>{
  // Each weapon costs 2PA to fire, each can fire once/turn
  const nWeapons=u.w.length;
  const maxFires=Math.floor(u.act/2); // max weapon uses per turn
  const nFires=Math.min(nWeapons,maxFires); // actual fires per turn
  // Sort weapons by damage, take the best nFires
  const wDmgs=u.w.map(wk=>({key:wk,dmg:balWeaponDmg(wk,tArm)})).sort((a,b)=>b.dmg-a.dmg);
  const dpt=wDmgs.slice(0,nFires).reduce((s,w)=>s+w.dmg,0); // damage per turn
  const paAfterFire=u.act-nFires*2; // PA left for movement
  // Survivability
  const parade=balSaveProb(u.arm,5);
  const effHP=parade<1?u.hp/(1-parade):u.hp*20;
  // Lifetime damage = dpt × turns alive (effHP ≈ turns survived)
  const lifetime=dpt*effHP;
  // Mobility bonus: more moves after fire = more tactical value
  const mobBonus=1+paAfterFire*0.05; // +5% per move remaining
  const value=(lifetime*mobBonus)/u.pts*1000;
  return{key:k,...u,nFires,dpt,paAfterFire,parade,effHP,lifetime,value,
    wDmgs:wDmgs.map(w=>({...w,dmg:+w.dmg.toFixed(2)}))};
}).sort((a,b)=>b.value-a.value);
const balVehData=(tArm=15)=>Object.entries(VDEFS).map(([k,v])=>{
  // Pilot fires pw (2PA each), gunner fires gw (2PA each, separate PA pool)
  const pDmgs=v.pw.map(wk=>({key:wk,dmg:balWeaponDmg(wk,tArm)}));
  const gDmgs=v.gw.map(wk=>({key:wk,dmg:balWeaponDmg(wk,tArm)}));
  const pilotDpt=pDmgs.reduce((s,w)=>s+w.dmg,0);
  const gunnerDpt=gDmgs.reduce((s,w)=>s+w.dmg,0);
  const totalDpt=pilotDpt+gunnerDpt;
  const parade=balSaveProb(v.arm,5);
  const effHP=parade<1?(v.hp+2)/(1-parade):(v.hp+2)*20;
  const lifetime=totalDpt*effHP;
  const value=(lifetime)/v.pts*1000;
  return{key:k,...v,pilotDpt,gunnerDpt,totalDpt,parade,effHP,lifetime,value};
}).sort((a,b)=>b.value-a.value);

function hitLine(x1,y1,x2,y2,rx,ry,rw,rh){
  const E=[[rx,ry,rx+rw,ry],[rx+rw,ry,rx+rw,ry+rh],[rx+rw,ry+rh,rx,ry+rh],[rx,ry+rh,rx,ry]];
  for(const[a,b,c,d]of E){const D=(x2-x1)*(d-b)-(y2-y1)*(c-a);if(Math.abs(D)<1e-6)continue;
    const t=((a-x1)*(d-b)-(b-y1)*(c-a))/D,u=((a-x1)*(y2-y1)-(b-y1)*(x2-x1))/D;
    if(t>=0&&t<=1&&u>=0&&u<=1)return true;}return false;
}

// 3D LOS: shoots multiple rays from attacker eye to different heights on target.
// Returns {status:"clear"|"cover"|"blocked", pct:0-1}
// pct = fraction of target body that is occluded by the WORST obstacle.
// The shooter aims at the most exposed part of the target.
function los3d(ax,ay,aH,dx,dy,dH,T){
  const dist2d=Math.hypot(dx-ax,dy-ay);if(dist2d<1)return{status:"clear",pct:0};
  // Collect all terrain that crosses the 2D line
  const crossT=T.filter(t=>hitLine(ax,ay,dx,dy,t.x,t.y,t.w,t.h)&&(t.h3d||16)>0);
  if(!crossT.length)return{status:"clear",pct:0};
  // Test rays from attacker eye (top = aH) to N sample points on target body
  // Target body spans from 0 (feet) to dH (top of head)
  const N=10;
  let visibleCount=0;
  for(let i=0;i<=N;i++){
    const targetZ=dH*(i/N); // sample point on target at this height
    // Ray goes from (ax, ay, aH) to (dx, dy, targetZ)
    // At each terrain, check if terrain blocks this ray
    let rayBlocked=false;
    for(const t of crossT){
      const tH=t.h3d||16;
      const tcx=t.x+t.w/2,tcy=t.y+t.h/2;
      const dt=Math.hypot(tcx-ax,tcy-ay);
      if(dt<1||dt>=dist2d)continue;
      const frac=dt/dist2d;
      // Height of ray at terrain position
      const rayZ=aH+(targetZ-aH)*frac;
      // Terrain blocks from 0 to tH
      if(rayZ<=tH){rayBlocked=true;break;}
    }
    if(!rayBlocked)visibleCount++;
  }
  const visFrac=visibleCount/(N+1);
  const occFrac=1-visFrac;
  // Rules: <50% hidden = clear, 50-99% = cover (arm-3), 100% = blocked
  if(visFrac<=0)return{status:"blocked",pct:1};
  if(occFrac>=0.5)return{status:"cover",pct:occFrac};
  return{status:"clear",pct:occFrac};
}

  let u2=army2Defs.map(t=>mkU(t,2));

  // Generate terrain for simulation
  const simTerr=[];
  for(let i=0;i<4;i++)simTerr.push(mkTerr(ri(30,BW-30),ri(HALF+30,BH-60),1,simTerr));
  for(let i=0;i<4;i++)simTerr.push(mkTerr(ri(30,BW-30),ri(60,HALF-30),2,simTerr));

  // Deploy — edge line spread (avoid terrain)
  const deploy=(army,pl)=>{
    const placed=[];const yBase=pl===1?BH-BASE-PAD:PAD;
    for(const u of army){
      if(u.air){placed.push({...u,dep:false,x:-999,y:-999});continue;}
      let ok=false;
      for(let i=0;i<100;i++){
        const px=PAD+BASE+ri(0,Math.floor(BW-PAD*2-BASE*3));
        if(!onTerr(px,yBase,simTerr)&&!placed.some(p=>p.dep&&Math.abs(p.x-px)<BASE+3)){
          placed.push({...u,x:px,y:yBase,dep:true});ok=true;break;}}
      if(!ok)placed.push({...u,x:ri(PAD,BW-BASE-PAD),y:yBase,dep:true});
    }return placed;
  };
  u1=deploy(u1,1);u2=deploy(u2,2);
  const all=()=>[...u1,...u2];

  // Deploy airborne (avoid terrain)
  const deployAir=(u,units)=>{
    const en=units.filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep);if(!en.length)return u;
    for(let i=0;i<60;i++){
      const p={x:ri(PAD+BASE,BW-BASE*2),y:ri(PAD+BASE,BH-BASE*2)};
      if(onTerr(p.x,p.y,simTerr))continue;
      if(units.some(a=>a.dep&&a.hp>0&&a.id!==u.id&&Math.abs(a.x-p.x)<BASE+3&&Math.abs(a.y-p.y)<BASE+3))continue;
      let sc=0;for(const e of en){const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<C1*SEG_PX&&!blocked(p.x+BR,p.y+BR,e.x+BR,e.y+BR,simTerr))sc++;}
      if(sc>0)return{...u,x:p.x,y:p.y,dep:true};
    }return u;
  };

  // Sim combat
  let turns=0,maxTurns=40;
  const simFire=(att,bT,weaponList)=>{
    const d2=Math.hypot(att.x+BR-(bT.x+BR),att.y+BR-(bT.y+BR));
    const cat=rCat(d2);let bW=null,bD=0;
    for(const w of weaponList){if(w.cur<=0)continue;const df=wDiff(w.key,cat);if(df>0&&(!bW||df<bD)){bW=w;bD=df;}}
    if(!bW)return null;
    const rolls=[];for(let i=0;i<bW.cur;i++)rolls.push(d20());
    const hits=rolls.filter(r=>r>=bD);
    let totD=0;
    for(const h of hits){const sr=d20();if(sr<bT.arm+bW.pen)totD+=(bW.dMax?ri(1,bW.dMax):bW.dmg);}
    // Apply to vehicle HP first
    if(bT.isVeh&&bT.vHp>0){
      const nVHp=Math.max(0,bT.vHp-totD);
      if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?{...a,vHp:nVHp}:a);
      else u2=u2.map(a=>a.id===bT.id?{...a,vHp:nVHp}:a);
      if(nVHp<=0){
        // Vehicle destruction
        const boom=d20()<=10;const pHp=boom?Math.max(0,bT.hp-2):bT.hp;
        if(pHp<=0){if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?{...a,vHp:0,hp:0,isVeh:false}:a);else u2=u2.map(a=>a.id===bT.id?{...a,vHp:0,hp:0,isVeh:false}:a);}
        else{
          const bt=bT.fac==="sep"?"b1":bT.fac==="reb"?"rebel":"clone";const bd=UDEFS[bt];
          const eject={...bT,isVeh:false,vHp:0,fly:false,type:bt,mm:bd.mm,arm:bd.arm,hp:pHp,mHp:bd.hp,ws:bd.w.map(k=>({key:k,...WEAPS[k],cur:WEAPS[k].mun})),gw:[],hasGunner:false};
          if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?eject:a);else u2=u2.map(a=>a.id===bT.id?eject:a);
        }
      }
    } else {
      const nHp=Math.max(0,bT.hp-totD);
      if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?{...a,hp:nHp}:a);
      else u2=u2.map(a=>a.id===bT.id?{...a,hp:nHp}:a);
    }
    return bW;
  };

  while(turns<maxTurns){
    turns++;
    // Reset acts & ammo
    const resetSim=u=>{
      const rw=u.ws.map(w=>{if(w.once&&w.cur<=0)return w;const s=WEAPS[w.key]||VWEAPS[w.key];return{...w,cur:s?.mun||w.mun};});
      const rgw=u.gw?u.gw.map(w=>{if(w.once&&w.cur<=0)return w;const s=VWEAPS[w.key];return{...w,cur:s?.mun||w.mun};}):[];
      return{...u,act:u.mAct,done:false,ws:rw,gw:rgw,gunDone:false,gunAct:u.mGunAct||0};
    };
    u1=u1.map(resetSim);u2=u2.map(resetSim);

    // Initiative
    let r1=d20(),r2=d20();while(r1===r2){r1=d20();r2=d20();}
    let curP=r1>r2?1:2;

    // Airborne deploy
    for(let i=0;i<u1.length;i++)if(u1[i].air&&!u1[i].dep&&u1[i].hp>0)u1[i]=deployAir(u1[i],all());
    for(let i=0;i<u2.length;i++)if(u2[i].air&&!u2[i].dep&&u2[i].hp>0)u2[i]=deployAir(u2[i],all());

    let safety=0;
    while(safety<80){
      safety++;
      const army=curP===1?u1:u2;
      const active=army.filter(u=>u.hp>0&&!u.done&&u.dep);
      if(!active.length){
        const other=curP===1?2:1;
        const oA=(other===1?u1:u2).filter(u=>u.hp>0&&!u.done&&u.dep);
        if(!oA.length)break; // turn over
        curP=other;continue;
      }

      // Pick unit (fire-capable first, but everyone gets activated)
      let best=active[0],bs=-1e9;
      for(const u of active){let sc=0;let canFire=false;
        for(const e of all().filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep)){
          const d=Math.hypot(u.x+BR-(e.x+BR),u.y+BR-(e.y+BR));
          if(!blocked(u.x+BR,u.y+BR,e.x+BR,e.y+BR,simTerr)){const cat=rCat(d);for(const w of u.ws)if(w.cur>0&&wDiff(w.key,cat)>0){canFire=true;sc+=80;}}
        }
        if(canFire)sc+=200;
        else sc+=50; // still worth activating to advance
        if(sc>bs){bs=sc;best=u;}}

      let cur={...best};const sA=cur.pl===1?v=>{u1=u1.map(a=>a.id===cur.id?v:a);}:v=>{u2=u2.map(a=>a.id===cur.id?v:a);};

      const canFireFrom=(px,py,ws)=>{
        for(const e of all().filter(e=>e.pl!==cur.pl&&e.hp>0&&e.dep)){
          const d=Math.hypot(px-(e.x+BR),py-(e.y+BR));
          if(blocked(px,py,e.x+BR,e.y+BR,simTerr))continue;
          const cat=rCat(d);for(const w of ws){if(w.cur>0&&wDiff(w.key,cat)>0)return true;}
        }return false;
      };
      let hasFired=false;

      // AI actions (pilot) — aggressive: always advance toward optimal range
      // Calculate optimal range for this unit's weapons
      let simOptRange=C1*SEG_PX*0.7,simBestD=99;
      for(const w of cur.ws){const src=WEAPS[w.key]||VWEAPS[w.key];if(!src)continue;
        const cats=[{d:src.melee,r:BASE*4},{d:src.cat1,r:C1*SEG_PX*0.7},{d:src.cat2,r:(C1+C2)/2*SEG_PX*0.5},{d:src.catP,r:C2*SEG_PX*0.9}];
        for(const c of cats){if(c.d>0&&c.d<simBestD){simBestD=c.d;simOptRange=c.r;}}
      }

      for(let step=0;step<8&&cur.act>0;step++){
        const en=all().filter(e=>e.pl!==cur.pl&&e.hp>0&&e.dep);if(!en.length)break;

        // Try attack (2PA) — ALWAYS PRIORITY
        if(cur.act>=2){
          let bT=null,bS=-1e9;
          for(const e of en){
            const d=Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR));
            if(blocked(cur.x+BR,cur.y+BR,e.x+BR,e.y+BR,simTerr))continue;
            const cat=rCat(d);
            for(const w of cur.ws){if(w.cur<=0)continue;const df=wDiff(w.key,cat);
              if(df>0){const sc=(21-df)*w.cur*(w.dMax||w.dmg)+(e.hp<=(w.dMax||w.dmg)?80:0);if(sc>bS){bS=sc;bT=e;}}}
          }
          if(bT){
            const usedW=simFire(cur,bT,cur.ws);
            if(usedW){hasFired=true;cur={...cur,act:cur.act-2,ws:cur.ws.map(w=>w===usedW?{...w,cur:0}:w)};sA(cur);continue;}
          }
        }

        // ALWAYS move toward optimal range if can't fire or not at optimal
        if(cur.act>=1){
          const ceDist=en.reduce((m,e)=>Math.min(m,Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR))),1e9);
          const atOptimal=Math.abs(ceDist-simOptRange)<SEG_PX*2;
          const canFireHere=canFireFrom(cur.x+BR,cur.y+BR,cur.ws);

          // Only stay if at optimal range AND can fire
          if(canFireHere&&atOptimal)break;

          // Move toward closest enemy
          let closest=null,closestD=1e9;
          for(const e of en){const d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<closestD){closestD=d;closest=e;}}
          if(closest){
            const ag=Math.atan2(closest.y-cur.y,closest.x-cur.x);
            const ms=(2+cur.mm)*SEG_PX;
            let nx=Math.max(PAD,Math.min(BW-BASE-PAD,cur.x+Math.cos(ag)*ms));
            let ny=Math.max(PAD,Math.min(BH-BASE-PAD,cur.y+Math.sin(ag)*ms));
            if(!cur.fly&&(onTerr(nx,ny,simTerr)||blocked(cur.x+BR,cur.y+BR,nx+BR,ny+BR,simTerr))){
              let found=false;
              for(let t=0.8;t>=0.2;t-=0.2){
                const sx=Math.max(PAD,Math.min(BW-BASE-PAD,cur.x+Math.cos(ag)*ms*t));
                const sy=Math.max(PAD,Math.min(BH-BASE-PAD,cur.y+Math.sin(ag)*ms*t));
                if(!onTerr(sx,sy,simTerr)&&!blocked(cur.x+BR,cur.y+BR,sx+BR,sy+BR,simTerr)){
                  nx=sx;ny=sy;found=true;break;}
              }
              if(!found)break;
            }
            cur={...cur,x:nx,y:ny,act:cur.act-1};sA(cur);continue;
          }
          break;
        }
        break;
      }

      // Gunner attacks (vehicle only)
      if(cur.isVeh&&cur.hasGunner&&cur.gw){
        let gAct=cur.gunAct||0;
        for(let gs=0;gs<4&&gAct>=2;gs++){
          const en=all().filter(e=>e.pl!==cur.pl&&e.hp>0&&e.dep);if(!en.length)break;
          let bT=null,bS=-1e9;
          for(const e of en){
            const d=Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR));
            if(blocked(cur.x+BR,cur.y+BR,e.x+BR,e.y+BR,simTerr))continue;
            const cat=rCat(d);for(const w of cur.gw){if(w.cur<=0)continue;const df=wDiff(w.key,cat);
              if(df>0){const sc=(21-df)*w.cur*(w.dMax||w.dmg);if(sc>bS){bS=sc;bT=e;}}}
          }
          if(bT){const usedW=simFire(cur,bT,cur.gw);if(usedW){gAct-=2;cur={...cur,gunAct:gAct,gw:cur.gw.map(w=>w===usedW?{...w,cur:0}:w)};sA(cur);}else break;}
          else break;
        }
      }

      // End unit turn
      cur={...cur,done:true,act:0,gunDone:true};sA(cur);
      if(cur.pl===1)u1=u1.map(a=>a.id===cur.id?cur:a);else u2=u2.map(a=>a.id===cur.id?cur:a);

      // Check win
      if(u1.filter(u=>u.hp>0||(u.air&&!u.dep)).length===0)return{winner:2,turns,surv1:0,surv2:u2.filter(u=>u.hp>0).length,
        detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
      if(u2.filter(u=>u.hp>0||(u.air&&!u.dep)).length===0)return{winner:1,turns,surv1:u1.filter(u=>u.hp>0).length,surv2:0,
        detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};

      // Switch player
      const o=curP===1?2:1;
      const oA=(o===1?u1:u2).filter(u=>u.hp>0&&!u.done&&u.dep);
      if(oA.length>0)curP=o;
    }

    // Check end of turn
    if(u1.filter(u=>u.hp>0).length===0)return{winner:2,turns,surv1:0,surv2:u2.filter(u=>u.hp>0).length,
      detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
    if(u2.filter(u=>u.hp>0).length===0)return{winner:1,turns,surv1:u1.filter(u=>u.hp>0).length,surv2:0,
      detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
  }
  // Timeout → whoever has more hp wins
  const hp1=u1.reduce((s,u)=>s+Math.max(0,u.hp),0),hp2=u2.reduce((s,u)=>s+Math.max(0,u.hp),0);
  return{winner:hp1>=hp2?1:2,turns,surv1:u1.filter(u=>u.hp>0).length,surv2:u2.filter(u=>u.hp>0).length,
    detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
}

function runSimulations(n,a1Defs,a2Defs){
  const results={n,w1:0,w2:0,totalTurns:0,survJ1:[],survJ2:[],unitStats:{}};
  for(let i=0;i<n;i++){
    const r=simBattle(a1Defs,a2Defs);
    if(r.winner===1)results.w1++;else results.w2++;
    results.totalTurns+=r.turns;
    results.survJ1.push(r.surv1);results.survJ2.push(r.surv2);
    for(const d of r.detail1){if(!results.unitStats[d.type])results.unitStats[d.type]={total:0,alive:0};results.unitStats[d.type].total++;if(d.alive)results.unitStats[d.type].alive++;}
    for(const d of r.detail2){if(!results.unitStats[d.type])results.unitStats[d.type]={total:0,alive:0};results.unitStats[d.type].total++;if(d.alive)results.unitStats[d.type].alive++;}
  }
  return results;
}

/* Learning */
function getBalanceTips(L){
  const tips=[];
  if(L.g<2)return["Jouez 2+ parties pour les conseils."];
  const w1=L.w1/L.g,w2=L.w2/L.g;
  if(w1>0.65)tips.push("⚠ J1 domine — réduisez -50pts ou ajoutez 1 unité J2.");
  if(w2>0.65)tips.push("⚠ J2 domine — ajoutez 1 unité J1.");
  for(const[t,s]of Object.entries(L.us||{})){
    if(s.n>=3&&UDEFS[t]){const sr=s.s/s.n;
      if(sr>0.8)tips.push(`📈 ${UDEFS[t].ic}${UDEFS[t].n} survit ${Math.round(sr*100)}% → +30pts`);
      if(sr<0.2)tips.push(`📉 ${UDEFS[t].ic}${UDEFS[t].n} meurt ${Math.round((1-sr)*100)}% → -30pts`);
    }}
  if(!tips.length)tips.push("✓ Équilibrage correct.");
  return tips;
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  render(){
    if(this.state.hasError)return React.createElement('div',{style:{background:'#1a0000',color:'#f85149',padding:20,margin:10,borderRadius:6,fontFamily:'monospace',fontSize:12,whiteSpace:'pre-wrap',border:'2px solid #f85149'}},
      'Erreur React: '+String(this.state.error?.message||this.state.error)+'\n\n'+String(this.state.error?.stack||''));
    return this.props.children;
  }
}

function CrossBlock(){
  // ── 3D PRE-RENDER ──
  const [fig3dReady, setFig3dReady] = React.useState(0);
  React.useEffect(() => {
    if (typeof THREE === "undefined") return;
    // 3D pre-render disabled - using clear SVG figures instead
  }, []);

  // ── SYNC: game.html ↔ index.html (v2 - BroadcastChannel + storage) ──
  React.useEffect(() => {
    var bc = null;
    try { bc = new BroadcastChannel('crossblocks_sync'); } catch(e) {}
    
    function importCardsFromIndex(data) {
      if (!data || !data.cards || !Array.isArray(data.cards)) return;
      // Map gallery cards to game.html units, finding matching UDEFS or creating custom
      var importedUnits = data.cards.slice(0, 12).map(function(c, idx) {
        // Try to find matching UDEFS entry by name
        var matchKey = null;
        var cName = c.name.replace(/\s*\([^)]+\)/g, '').replace(/^SW\s+/, '');
        for (var k in UDEFS) {
          var ud = UDEFS[k];
          var udName = (ud.fullName || ud.n || '').replace(/\s*\([^)]+\)/g, '').replace(/^SW\s+/, '');
          if (udName === cName || ud.fullName === c.name) {
            matchKey = k;
            break;
          }
        }
        var fac = c.faction === 'République' ? 'cl' :
                  c.faction === 'Séparatistes' ? 'sep' :
                  c.faction === 'Rebelles' ? 'reb' :
                  c.faction === 'Empire' ? 'emp' :
                  c.faction === 'Mandalorien' ? 'mando' :
                  c.faction === 'Résistance' ? 'res' :
                  c.faction === 'Première Ordre' ? 'fo' :
                  c.faction === 'Côté Obscur' ? 'obs' :
                  c.faction === 'Chasseur de primes' ? 'hunt' : 'cl';
        // Match weapons to WEAPS keys
        var weaponKeys = (c.weapons || []).slice(0, 2).map(function(w) {
          if (/Pistolet.*DC-17.*auto/i.test(w)) return 'pist_a';
          if (/Pistolet.*DC-17/i.test(w)) return 'pist_b';
          if (/Pistolet.*DL-44/i.test(w)) return 'pist_dl44';
          if (/Pistolet.*WESTAR/i.test(w)) return 'pist_mando';
          if (/Pistolet.*rebelle/i.test(w)) return 'pist_r';
          if (/Pistolet.*SE-14r/i.test(w)) return 'pist_e';
          if (/Pistolet/i.test(w)) return 'pist_b';
          if (/Fusil.*DC-15a/i.test(w)) return 'fusil_b';
          if (/Fusil.*E-11/i.test(w)) return 'fusil_e11';
          if (/Fusil.*A280/i.test(w)) return 'fusil_a280';
          if (/Fusil.*ARC|DC-17m/i.test(w)) return 'fusil_arc';
          if (/Fusil.*EE-3/i.test(w)) return 'fusil_ee3';
          if (/Fusil/i.test(w)) return 'fusil_b';
          if (/Sniper.*Crosshair|modifié/i.test(w)) return 'sniper_mod';
          if (/Sniper.*IQA/i.test(w)) return 'sniper_iqa';
          if (/Sniper/i.test(w)) return 'sniper';
          if (/Z-6/i.test(w)) return 'z6_b';
          if (/Bowcaster/i.test(w)) return 'bowcaster';
          if (/Sabre.*violet/i.test(w)) return 'sabre_vio';
          if (/Sabre.*blanc/i.test(w)) return 'sabre_w';
          if (/Sabre.*bleu/i.test(w)) return 'sabre_b';
          if (/Sabre.*vert/i.test(w)) return 'sabre_g';
          if (/Sabre.*rouge|courbe/i.test(w)) return 'sabre_r';
          if (/Double sabre/i.test(w)) return 'dbl_sabre';
          if (/Darksaber/i.test(w)) return 'darksaber';
          if (/Blaster.*rebelle/i.test(w)) return 'blast_r';
          if (/Blaster/i.test(w)) return 'blast_b';
          if (/Bâton de Rey/i.test(w)) return 'baton_rey';
          return 'fusil_b';
        });
        return {
          id: uid(), 
          type: matchKey || 'clone',
          pl: 1,
          name: cName,
          pts: c.points || 200,
          mAct: c.pa || 5, act: c.pa || 5,
          mm: c.move || 0,
          arm: c.armor || 15,
          mHp: c.hp || 2, hp: c.hp || 2,
          ws: weaponKeys.map(function(k) { return Object.assign({key:k, cur: WEAPS[k]?WEAPS[k].mun:3}, WEAPS[k]||{}); }),
          ic: '🃏', fac: fac, co: '#4488dd',
          air: false, fly: false, dep: false, done: false, sqId: null, prone: false, alt: 0,
          x: -999, y: -999,
        };
      });
      sA1(importedUnits);
      sP1(importedUnits.reduce(function(s, u) { return s + u.pts; }, 0));
      aL('📥 ' + importedUnits.length + ' unités synchronisées depuis index.html');
    }
    
    var onStorage = function(e) {
      if (e.key === 'crossblocks_cards_to_game' && e.newValue) {
        try { importCardsFromIndex(JSON.parse(e.newValue)); } catch(err) {}
      }
    };
    window.addEventListener('storage', onStorage);
    
    if (bc) {
      bc.onmessage = function(e) {
        if (e.data && e.data.type === 'cards_update' && e.data.data && e.data.data.source === 'index.html') {
          importCardsFromIndex(e.data.data);
        }
      };
    }
    
    // Try initial sync from existing localStorage
    setTimeout(function() {
      try {
        var stored = localStorage.getItem('crossblocks_cards_to_game');
        if (stored) {
          var data = JSON.parse(stored);
          if (data && data.cards && data.cards.length > 0) {
            console.log('Initial sync: ' + data.cards.length + ' cards from index.html');
          }

    const c=clamp(nx,ny);nx=c.x;ny=c.y;
    // Recalculate destination terrain after clamping
    const finalTerr=getTerrAt(nx,ny,terr);
    const finalAlt=finalTerr?(finalTerr.h3d||0):0;
    // Flying units ignore terrain blocking
    if(!u.fly&&!finalTerr){
      // Not landing on terrain: check path for blocking obstacles
      if(blocked(u.x+BR,u.y+BR,nx+BR,ny+BR,terr)){
        let bestD=0,bestX=u.x,bestY=u.y;
        const steps=12;
        for(let i=1;i<=steps;i++){
          const t=i/steps;
          const px=u.x+((nx-u.x)*t),py=u.y+((ny-u.y)*t);
          const midTerr=getTerrAt(px,py,terr);
          if(!midTerr&&(onTerr(px,py,terr)||blocked(u.x+BR,u.y+BR,px+BR,py+BR,terr)))break;
          bestD=t;bestX=px;bestY=py;
        }
        if(bestD<=0.1){aL("Décor bloque le passage !");cb?.(null);return;}
        const bc=clamp(bestX,bestY);nx=bc.x;ny=bc.y;
        aL("Arrêté par décor — déplacement partiel");
      }
    }
    if(overlap(nx,ny,all,u.id)){aL("Occupé !");cb?.(null);return;}
    const newAlt=getTerrH(nx,ny,terr);
    const climbing=newAlt>curAlt;const descending=newAlt<curAlt;
    const up={...u,x:nx,y:ny,act:u.act-1,alt:newAlt};
    const climbMsg=climbing?" (MONTE +"+Math.round(newAlt-curAlt)+"h)":descending?" (DESCEND "+Math.round(curAlt-newAlt)+"h)":"";
    aL(`${u.ic}${u.name} déplace${u.fly?" Vol":""}${climbMsg}(PA:${up.act})`);
    doAnimMove(u,nx,ny,sA,()=>{sA(p=>p.map(a=>a.id===u.id?up:a));cb?.(up);});
  };

  /* ═══ VEHICLE DESTRUCTION ═══ */
  const vehicleDestroy=(def,sDf)=>{
    const expl=d20();
    const boom=expl<=10;
    aL(boom?`💥 ${def.ic}${def.name} EXPLOSE! (🎲${expl}≤10) — Équipage: 2 dégâts!`:`🔥 ${def.ic}${def.name} détruit (🎲${expl}>10) — Pas d'explosion`);
    const pilotHp=boom?Math.max(0,def.hp-2):def.hp;
    const o=def.origUnit;
    const baseType=o?.type||(def.fac==="sep"?"b1":def.fac==="reb"?"rebel":"clone");
    const bd=UDEFS[baseType];
    if(pilotHp<=0){
      aL(`  💀 Pilote tué dans l'explosion!`);
      sDf(p=>p.map(u=>u.id===def.id?{...u,vHp:0,hp:0,isVeh:false,name:"Épave "+def.name,ic:"🔥",done:true}:u));
      sTerr(t=>[...t,{id:uid(),x:def.x-2,y:def.y-2,w:BASE+4,h:BASE+4,kind:"Épave",color:"#333",emoji:"",h3d:8,tex:"ruin"}]);
      // Drop pilot weapons on death
      for(const wk of bd.w){const pick=!NOT_PICKABLE.includes(wk);const wn=WEAPS[wk]?.n||"Arme";
        sDrops(p=>[...p,{id:uid(),x:def.x+ri(-3,3),y:def.y+ri(-3,3),key:wk,pickable:pick,name:wn}]);
      }
      checkWin(def.pl);
    } else {
      aL(`  🏃 Pilote éjecté! PV:${pilotHp}`);
      sDf(p=>p.map(u=>u.id===def.id?{...u,
        origUnit:null,isVeh:false,vHp:0,vMHp:0,fly:o?.fly||false,prone:false,
        type:baseType,name:(o?.name||bd.n)+"(éjecté)",ic:o?.ic||bd.ic,co:o?.co||bd.co,
        mm:o?.mm??bd.mm,arm:o?.arm??bd.arm,hp:pilotHp,mHp:o?.mHp||bd.hp,
        ws:bd.w.map(k=>({key:k,...WEAPS[k],cur:WEAPS[k].mun})),
        gw:[],hasGunner:false,gunDone:true,gunAct:0,
        done:true
      }:u));
      sTerr(t=>[...t,{id:uid(),x:def.x-2,y:def.y-2,w:BASE+4,h:BASE+4,kind:"Épave",color:"#333",emoji:"",h3d:8,tex:"ruin"}]);
    }
  };

  /* ═══ ATTACK — DETAILED (with vehicle HP) ═══ */
  const attackUnit=(att,def,sAt,sDf,cb2,useGw)=>{
    const actCost=2;
    const isGunnerFiring=!!useGw;
    if(!isGunnerFiring&&att.act<actCost){aL("2PA requis");cb2?.(null);return;}
    if(isGunnerFiring&&att.gunAct<actCost){aL("Canonnier: 2PA requis");cb2?.(null);return;}
    const ax=att.x+BR,ay=att.y+BR,dx2=def.x+BR,dy2=def.y+BR,d=Math.hypot(ax-dx2,ay-dy2);
    // 3D LOS check
    const los=los3d(ax,ay,unitTotalH(att),dx2,dy2,unitTotalH(def),terr);
    if(los.status==="blocked"){aL("Ligne bloquée (cible cachée à "+Math.round(los.pct*100)+"%)");cb2?.(null);return;}
    const hasCover=los.status==="cover";
    const coverBonus=hasCover?3:0;
    const cat=rCat(d);let bW=null,bD=0;
    const weaponList=isGunnerFiring?att.gw:att.ws;
    for(const w of weaponList){if(w.cur<=0)continue;const df=wDiff(w.key,cat);if(df>0&&(!bW||df<bD)){bW=w;bD=df;}}
    if(!bW){aL("Pas d'arme à portée");cb2?.(null);return;}
    let hitDiff=bD;
    if(def.prone&&cat==="melee")hitDiff=Math.max(1,bD-1);
    const bid=uid();sBul(p=>[...p,{id:bid,x1:ax,y1:ay,x2:dx2,y2:dy2,t:0}]);
    const rolls=[];for(let i=0;i<bW.cur;i++)rolls.push(d20());
    const hits=rolls.filter(r=>r>=hitDiff);
    const defArm=def.isVeh&&def.vHp>0?def.arm:def.arm;
    const effArm=Math.max(1,defArm-coverBonus); // Cover makes armor better (lower threshold = easier to save)
    let totD=0;const saveDetails=[];
    for(const h of hits){
      const sr=d20();const thresh=effArm+bW.pen;const ok=sr>=thresh;
      saveDetails.push({sr,thresh,ok});
      if(!ok){const d1=bW.dMax?ri(1,bW.dMax):bW.dmg;totD+=d1;saveDetails[saveDetails.length-1].d1=d1;}
    }
    // Apply damage to vehicle HP or unit HP
    const isVehTarget=def.isVeh&&def.vHp>0;
    const nVHp=isVehTarget?Math.max(0,def.vHp-totD):0;
    const nHp=isVehTarget?def.hp:Math.max(0,def.hp-totD);
    setTimeout(()=>{
      sBul(p=>p.filter(b=>b.id!==bid));
      if(isVehTarget){
        sDf(p=>p.map(u=>u.id===def.id?{...u,vHp:nVHp}:u));
      } else {
        sDf(p=>p.map(u=>u.id===def.id?{...u,hp:nHp}:u));
      }
      const nW=isGunnerFiring?att.ws:att.ws.map(w=>w===bW?{...w,cur:0}:w);
      const nGW=isGunnerFiring?att.gw.map(w=>w===bW?{...w,cur:0}:w):att.gw||[];
      const uA=isGunnerFiring?
        {...att,gunAct:att.gunAct-actCost,gw:nGW}:
        {...att,act:att.act-actCost,ws:nW};
      sAt(p=>p.map(u=>u.id===att.id?uA:u));
      const src=isGunnerFiring?"🎯Canonnier":"⚔";
      aL(`${src} ${att.ic}${att.name}→${def.ic}${def.name} [${bW.n}]${hasCover?` COUVERT(${Math.round(los.pct*100)}% caché, arm-3)`:""}`);
      aL(`  Touche: ${rolls.join(",")} (>=${hitDiff}${def.prone&&cat==="melee"?" couché!":""}) → ${hits.length}/${rolls.length}`);
      for(const s of saveDetails)
        aL(`  Armure(${effArm}${hasCover?"[couvert]":""})+Pen(${bW.pen})=${s.thresh}: ${s.sr} ${s.ok?"Pare":"X"+(s.d1||bW.dmg)+"dmg"}`);
      if(isVehTarget){
        aL(totD>0?`  → ${totD}dégât(s)! Véhicule PV:${def.vHp}→${nVHp}`:`  → 0 dégât`);
        if(nVHp<=0){
          vehicleDestroy({...def,vHp:nVHp},sDf);
        }
      } else {
        aL(totD>0?`  → ${totD}dégât(s)! PV:${def.hp}→${nHp}`:`  → 0 dégât`);
        if(nHp<=0){
          aL(`💀 ${def.ic}${def.name}(J${def.pl}) détruit!`);
          // Drop weapons at death location
          const dw=def.ws||[];
          for(const w of dw){
            const pick=!NOT_PICKABLE.includes(w.key);
            sDrops(p=>[...p,{id:uid(),x:def.x+ri(-3,3),y:def.y+ri(-3,3),key:w.key,pickable:pick,name:w.n||WEAPS[w.key]?.n||"Arme"}]);
            aL(`  🔫 ${w.n||"Arme"} tombée${!pick?" (non ramassable)":""}`);
          }
          checkWin(def.pl);
        }
      }
      cb2?.(uA);
    },500);
  };

  /* ═══ SQUAD MANAGEMENT ═══ */
  // Get all squads for a player
  const getSquads=(pl)=>{
    const army=pl===1?a1:a2;
    const sqs={};
    army.filter(u=>u.sqId&&u.hp>0&&u.dep).forEach(u=>{if(!sqs[u.sqId])sqs[u.sqId]=[];sqs[u.sqId].push(u);});
    return sqs;
  };
  // Create new squad with selected unit as leader
  const createSquad=(u)=>{
    if(u.sqId){aL(`${u.name} est déjà dans une escouade`);return;}
    const sid=nextSqId();
    const sA=u.pl===1?sA1:sA2;
    sA(p=>p.map(a=>a.id===u.id?{...a,sqId:sid}:a));
    sMU(prev=>prev&&prev.id===u.id?{...prev,sqId:sid}:prev);
    aL(`Escouade ${sid} créée avec ${u.name} comme leader`);
  };
  // Add unit to an existing squad
  const joinSquad=(u,sqId)=>{
    if(u.sqId===sqId){aL("Déjà dans cette escouade");return;}
    const sA=u.pl===1?sA1:sA2;
    // Leave old squad first
    sA(p=>p.map(a=>a.id===u.id?{...a,sqId}:a));
    sMU(prev=>prev&&prev.id===u.id?{...prev,sqId}:prev);
    aL(`${u.name} rejoint l'escouade ${sqId}`);
  };
  // Remove unit from its squad
  const leaveSquad=(u)=>{
    if(!u.sqId){aL("Pas dans une escouade");return;}
    const oldSq=u.sqId;
    const sA=u.pl===1?sA1:sA2;
    sA(p=>{
      const updated=p.map(a=>a.id===u.id?{...a,sqId:null}:a);
      // If only 1 member left, dissolve the squad
      const remaining=updated.filter(a=>a.sqId===oldSq&&a.hp>0);
      if(remaining.length<=1)return updated.map(a=>a.sqId===oldSq?{...a,sqId:null}:a);
      return updated;
    });
    sMU(prev=>prev&&prev.id===u.id?{...prev,sqId:null}:prev);
    aL(`${u.name} quitte l'escouade`);
  };
  // Disband entire squad
  const disbandSquad=(sqId)=>{
    sA1(p=>p.map(a=>a.sqId===sqId?{...a,sqId:null}:a));
    sA2(p=>p.map(a=>a.sqId===sqId?{...a,sqId:null}:a));
    if(mU&&mU.sqId===sqId)sMU(prev=>({...prev,sqId:null}));
    aL(`Escouade ${sqId} dissoute`);
  };
  // AI auto-squad: group nearby same-type units
  const aiAutoSquad=(pl)=>{
    const army=pl===1?a1:a2;const sA=pl===1?sA1:sA2;
    const unassigned=army.filter(u=>!u.sqId&&u.hp>0&&u.dep&&!u.isVeh);
    const types={};unassigned.forEach(u=>{if(!types[u.type])types[u.type]=[];types[u.type].push(u);});
    sA(prev=>{
      let next=[...prev];
      for(const[tp,units]of Object.entries(types)){
        if(units.length>=2){
          const sid=nextSqId();
          next=next.map(u=>units.some(m=>m.id===u.id)?{...u,sqId:sid}:u);
        }
      }
      return next;
    });
  };

  /* ═══ MANUAL CONTROL ═══ */
  const takeCtrl=(u)=>{
    const canCtrl=paused||isHuman(realCP.current);
    if(!canCtrl||u.done||u.hp<=0||!u.dep)return;
    // In PvP/PvE, only allow controlling own units
    if(isHuman(realCP.current)&&u.pl!==realCP.current){aL(`C'est au tour de J${realCP.current}!`);return;}
    const fresh=all.find(x=>x.id===u.id)||u;
    sMU(fresh);sMW(null);showLos(fresh);
    const vInfo=fresh.isVeh&&fresh.vHp>0?` Véh:${fresh.vHp}/${fresh.vMHp}`:"";
    const gInfo=fresh.isVeh&&fresh.hasGunner?` Canon:${fresh.gunAct}PA`:"";
    aL(`${fresh.ic}${fresh.name}(J${fresh.pl}) PA:${fresh.act}${vInfo}${gInfo}`);
  };

  const manAction=(a)=>{
    if(!mU)return;
    if(a==="move"){if(mU.act<1){aL("⚠ 0PA");return;}sMW("move");aL("➡ Cliquez destination");}
    else if(a==="attack"){if(mU.act<2){aL("⚠ 2PA");return;}sMW("attack");aL("🎯 Cliquez ennemi");}
    else if(a==="gunner"){if(!mU.isVeh||mU.gunAct<2){aL("⚠ Canonnier: 2PA requis");return;}sMW("gunner");aL("🎯 Canonnier: cliquez ennemi");}
    else if(a==="prone"){
      if(mU.isVeh){aL("Véhicule ne peut pas se coucher");return;}
      if(mU.act<1){aL("1PA requis");return;}
      pushUndo();
      const sA=mU.pl===1?sA1:sA2;
      const np=!mU.prone;
      sA(p=>p.map(u=>u.id===mU.id?{...u,prone:np,act:u.act-1}:u));
      const nu={...mU,prone:np,act:mU.act-1};sMU(nu);showLos(nu);
      aL(np?`🛏 ${mU.ic}${mU.name} se couche (MM−4)`:`🧍 ${mU.ic}${mU.name} se relève`);
      if(nu.act<=0)setTimeout(()=>endManual(nu),200);
    }
    else if(a==="board"){
      if(mU.isVeh){aL("Déjà dans un véhicule");return;}
      if(mU.act<1){aL("Pas assez d'actions");return;}
      // Find nearby empty vehicle
      const evs=mU.pl===1?ev1:ev2;const sEv=mU.pl===1?sEv1:sEv2;
      const nearby=evs.find(v=>Math.hypot((v.x+BR)-(mU.x+BR),(v.y+BR)-(mU.y+BR))<=SEG_PX*1.5);
      if(!nearby){aL("Pas de véhicule à portée");return;}
      pushUndo();
      const sA=mU.pl===1?sA1:sA2;
      const boarded=boardVehUnit(mU,nearby.vtype);
      boarded.x=nearby.x;boarded.y=nearby.y;
      sA(p=>p.map(u=>u.id===mU.id?boarded:u));
      sEv(p=>p.filter(v=>v.id!==nearby.id));
      aL(`🚗 ${mU.ic}${mU.name} embarque dans ${nearby.name}!`);

    }
    else if(a==="dismount"){
      if(!mU.isVeh){aL("Pas dans un véhicule");return;}
      if(mU.act<1){aL("1PA requis");return;}
      pushUndo();
      const sA=mU.pl===1?sA1:sA2;const sEv=mU.pl===1?sEv1:sEv2;
      const pilot=dismountVehUnit(mU);
      // Place empty vehicle at current position
      sEv(p=>[...p,mkEmptyVeh(mU.vtype,mU.pl,mU.x,mU.y)]);
      // Place pilot next to vehicle
      const px=mU.x+BASE+4,py=mU.y;
      const cp=clamp(px,py);
      sA(p=>p.map(u=>u.id===mU.id?{...pilot,x:cp.x,y:cp.y}:u));
      aL(`🏃 ${pilot.ic}${pilot.name} débarque! PA:${pilot.act}`);
      const nu={...pilot,x:cp.x,y:cp.y};sMU(nu);showLos(nu);
      if(nu.act<=0)setTimeout(()=>endManual(nu),200);
    }
    else if(a==="pickup"){
      if(mU.act<1){aL("Pas assez d'actions");return;}
      const nearby=drops.find(d=>d.pickable&&Math.hypot((d.x+2)-(mU.x+BR),(d.y+2)-(mU.y+BR))<=SEG_PX);
      if(!nearby){aL("Pas d'arme à portée");return;}
      const wData=WEAPS[nearby.key];if(!wData){aL("Arme invalide");return;}
      pushUndo();
      const sA=mU.pl===1?sA1:sA2;
      sA(p=>p.map(u=>u.id===mU.id?{...u,ws:[...u.ws,{key:nearby.key,...wData,cur:wData.mun}],act:0,done:true}:u));
      sDrops(p=>p.filter(d=>d.id!==nearby.id));
      aL(`🔫 ${mU.ic}${mU.name} ramasse ${nearby.name}! (toutes actions consommées)`);
      sMU(null);sMW(null);sLos([]);
    }
    else if(a==="squadfire"){
      if(mU.act<2){aL("⚠ 2PA requis");return;}
      if(!mU.sqId){aL("⚠ Pas dans une escouade");return;}
      sMW("squadfire");aL("🎯 TIR GROUPÉ: cliquez l'ennemi cible");
    }
    else endManual(mU);
  };

  const doManMove=(u,tx,ty)=>{
    pushUndo();
    moveUnit(u,tx-BR,ty-BR,u.pl===1?sA1:sA2,(r)=>{
      if(r){sMU(r);showLos(r);if(r.act<=0&&!(r.isVeh&&r.hasGunner&&r.gunAct>=2))setTimeout(()=>endManual(r),200);}
    });sMW(null);
  };

  const doManAttack=(att,def,isGunner)=>{
    pushUndo();
    attackUnit(att,def,att.pl===1?sA1:sA2,def.pl===1?sA1:sA2,(uA)=>{
      if(uA){sMU(uA);showLos(uA);
        const canStillAct=uA.act>=1||(uA.isVeh&&uA.hasGunner&&uA.gunAct>=2);
        if(!canStillAct)setTimeout(()=>endManual(uA),500);
      }
    },!!isGunner);sMW(null);
  };

  const endManual=(u)=>{
    const uu=u||mU;if(!uu)return;
    // Auto-pickup best nearby weapon if actions remaining
    if(uu.act>=1&&!uu.isVeh&&uu.hp>0){
      const nearby=drops.filter(d=>d.pickable&&Math.hypot((d.x+2)-(uu.x+BR),(d.y+2)-(uu.y+BR))<=BASE*2);
      if(nearby.length>0){
        let best=null,bs=-1;
        for(const d of nearby){const w=WEAPS[d.key];if(!w)continue;const sc=w.mun*(w.dMax||w.dmg)*Math.max(w.pen,1);if(sc>bs){bs=sc;best=d;}}
        if(best){
          const wData=WEAPS[best.key];
          (uu.pl===1?sA1:sA2)(p=>p.map(a=>a.id===uu.id?{...a,ws:[...a.ws,{key:best.key,...wData,cur:wData.mun}],done:true}:a));
          sDrops(p=>p.filter(d=>d.id!==best.id));
          aL(`🔫 ${uu.ic}${uu.name} ramasse ${best.name} en fin de tour!`);
          sMU(null);sMW(null);sLos([]);return;
        }
      }
    }
    (uu.pl===1?sA1:sA2)(p=>p.map(a=>a.id===uu.id?{...a,done:true}:a));
    aL(`${uu.ic}${uu.name} terminé`);sMU(null);sMW(null);sLos([]);
    // Handle turn switching for PvP/PvE and paused mode
    const humanMode=isHuman(realCP.current);
    if(paused||humanMode){
      const oP=uu.pl===1?2:1;
      const oLeft=(oP===1?a1:a2).filter(a=>a.hp>0&&!a.done&&a.dep);
      const sLeft=(uu.pl===1?a1:a2).filter(a=>a.hp>0&&!a.done&&a.dep&&a.id!==uu.id);
      if(humanMode){
        if(oLeft.length>0){sCP(oP);aL(`━━ Tour de J${oP} ━━`);}
        else if(sLeft.length>0){aL(`J${uu.pl}: ${sLeft.length} unité(s) restante(s)`);}
        else if(!oLeft.length&&!sLeft.length){sTurn(t=>t+1);aL("═══ NOUVEAU TOUR ═══");setTimeout(()=>rollInit(),400);}
      } else {
        if(oLeft.length>0)aL(`J${oP} a ${oLeft.length} unité(s) — cliquez-en une`);
        else if(sLeft.length>0)aL(`J${uu.pl}: ${sLeft.length} unité(s) restante(s)`);
        else aL("Tour fini — cliquez RELANCER pour continuer");
      }
    }
  };

  const togglePause=()=>{
    if(!paused){sPau(true);if(aiRef.current){clearTimeout(aiRef.current);aiRef.current=null;}aL("PAUSE — Cliquez n'importe quelle unité");}
    else{sPau(false);sMU(null);sMW(null);sLos([]);aL("IA RELANCÉE");}
  };

  // Is current player human?
  const isHuman=(pl)=>gMode==="pvp"||(gMode==="pve"&&pl===1);

  /* ═══ AI ═══ */
  useEffect(()=>{
    if(phase!=="battle"||winner||paused||animating)return;
    // If current player is human, don't auto-play — wait for manual input
    if(isHuman(realCP.current)){
      if(!mU){
        const army=realCP.current===1?a1:a2;
        const active=army.filter(u=>u.hp>0&&!u.done&&u.dep);
        if(!active.length){
          const o=realCP.current===1?2:1;
          const oA=(o===1?a1:a2).filter(u=>u.hp>0&&!u.done&&u.dep);

          else sCP(o);
        }
      }
      return;
    }
    aiRef.current=setTimeout(()=>{
      const army=curP===1?a1:a2;
      const air=army.find(u=>u.air&&!u.dep&&u.hp>0);
      if(air){deployAir(air);return;}
      // AI auto-board: if empty vehicles and nearby infantry, board them
      const evs=curP===1?ev1:ev2;const sEv=curP===1?sEv1:sEv2;const sA=curP===1?sA1:sA2;
      if(evs.length>0){
        for(const v of evs){
          const nearby=army.find(u=>u.hp>0&&!u.done&&u.dep&&!u.isVeh&&
            Math.hypot((v.x+BR)-(u.x+BR),(v.y+BR)-(u.y+BR))<=SEG_PX*1.5);
          if(nearby){

  },[phase,curP,a1,a2,ev1,ev2,turn,winner,paused,animating,gMode,mU]);

  const pickBest=(active)=>{
    let best=active[0],bs=-1e9;
    const enemies=all.filter(e=>e.pl!==active[0]?.pl&&e.hp>0&&e.dep);
    const maxEPts=Math.max(1,...enemies.map(e=>e.pts||100));
    for(const u of active){let sc=0;const cx=u.x+BR,cy=u.y+BR;
      let canFire=false;
      // 2.4 Squad priority: squads go first for coordinated fire
      if(u.sqId){const sqM=active.filter(a=>a.sqId===u.sqId&&a.id!==u.id);sc+=sqM.length*60;}
      // 2.1 Powerful units first (play them before they're destroyed)
      sc+=(u.pts||100)/10;
      for(const e of enemies){
        const d=Math.hypot(cx-(e.x+BR),cy-(e.y+BR));
        const los=los3d(cx,cy,unitTotalH(u),e.x+BR,e.y+BR,unitTotalH(e),terr);
        if(los.status!=="blocked"){
          const cat=rCat(d);
          for(const w of u.ws){if(w.cur>0&&wDiff(w.key,cat)>0){canFire=true;
            // 2.2 Bonus for targeting dangerous enemies

        }
      }
      if(canFire)sc+=200;else sc+=30;
      const st=(learn.us||{})[u.type];if(st&&st.n>=2)sc+=(st.s/st.n-0.5)*20;
      if(sc>bs){bs=sc;best=u;}}

  };

  const aiPlay=(u)=>{
    const en=all.filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep);
    if(!en.length){endAi(u);return;}
    let cur={...u};const sA=cur.pl===1?sA1:sA2;const sD=cur.pl===1?sA2:sA1;

    // Helper: can fire from position? (uses 3D LOS)
    const canFireFrom=(px,py,ws)=>{
      for(const e of en.filter(e=>e.hp>0)){
        const d=Math.hypot(px-(e.x+BR),py-(e.y+BR));
        const los=los3d(px,py,unitTotalH(cur),e.x+BR,e.y+BR,unitTotalH(e),terr);
        if(los.status==="blocked")continue;

      }return false;

    // Optimal range: distance where best weapon has lowest difficulty
    const getOptRange=()=>{
      let best=C1*SEG_PX*0.7,bestD=99;

    };
    const optRange=getOptRange();

    // Closest enemy distance
    const closestEnDist=()=>en.filter(e=>e.hp>0).reduce((m,e)=>Math.min(m,Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR))),1e9);

      if(n>10||cur.act<=0){

      if(cur.act>=2&&cur.sqId&&!cur.isVeh){

            }

      }

      // ── PHASE 1: ATTACK (always try first if 2+ PA) ──
      if(cur.act>=2){
        const cx=cur.x+BR,cy=cur.y+BR;let bT=null,bS=-1e9;
        for(const e of en.filter(e=>e.hp>0)){
          const d=Math.hypot(cx-(e.x+BR),cy-(e.y+BR));

          if(los.status==="blocked")continue;
          const coverPen=los.status==="cover"?-15:0;
          const cat=rCat(d);for(const w of cur.ws){if(w.cur<=0)continue;const df=wDiff(w.key,cat);const wd=w.dMax||w.dmg;
            if(df>0){let sc=(21-df)*w.cur*wd+coverPen;sc+=(e.pts||100)/5;if(e.hp<=wd)sc+=80;if(!e.done)sc+=30;if(sc>bS){bS=sc;bT=e;}}}
        }
        if(bT){

      // ── PHASE 2: ALWAYS ADVANCE toward optimal firing range ──
      if(cur.act>=1){
        const ceDist=closestEnDist();
        const canFireHere=canFireFrom(cur.x+BR,cur.y+BR,cur.ws);
        const atOptimal=Math.abs(ceDist-optRange)<SEG_PX*2;

          if(cur.isVeh&&cur.hasGunner&&!cur.gunDone&&cur.gunAct>=2){aiGunner(cur);return;}

        // ── Find best move position ──
        let bDe=null,bDS=-1e9;
        // Closest enemy for direct approach
        let cl=null,clD=1e9;for(const e of en.filter(e=>e.hp>0)){const d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<clD){clD=d;cl=e;}}

        const candidates=[];
        // 30 random positions
        for(let i=0;i<30;i++){
          const a=Math.random()*Math.PI*2,mp=(2+cur.mm)*SEG_PX*(0.4+Math.random()*0.6);
          const c2=clamp(cur.x+Math.cos(a)*mp,cur.y+Math.sin(a)*mp);
          if(overlap(c2.x,c2.y,all,cur.id))continue;
          // Allow terrain positions (climbing); only block if path is wall-blocked and not climbing
          if(!cur.fly&&!getTerrAt(c2.x,c2.y,terr)&&blocked(cur.x+BR,cur.y+BR,c2.x+BR,c2.y+BR,terr))continue;
          candidates.push(c2);

        // Direct approach toward closest enemy — aim for optimal range distance
        if(cl){
          const ag=Math.atan2(cl.y-cur.y,cl.x-cur.x);
          const ms=(2+cur.mm)*SEG_PX;
          const c2=clamp(cur.x+Math.cos(ag)*ms,cur.y+Math.sin(ag)*ms);
          if(!overlap(c2.x,c2.y,all,cur.id)&&(cur.fly||getTerrAt(c2.x,c2.y,terr)||!blocked(cur.x+BR,cur.y+BR,c2.x+BR,c2.y+BR,terr)))
            candidates.push(c2);

  /* Gunner AI — fires vehicle gunner weapons */
  const aiGunner=(veh)=>{

  const checkWin=(loserPl)=>{setTimeout(()=>{

  /* Board click */

    group.scale.setScalar(scale);
    group.traverse(m => { if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; } });

  function preRenderUnit3D(unitType) {
    if (FIG3D_CACHE[unitType]) return FIG3D_CACHE[unitType];
    if (typeof THREE === "undefined") return null;

    const SIZE = 80;
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(SIZE, SIZE);
    renderer.setPixelRatio(2);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(38, 1, 0.01, 50);
    cam.position.set(0.7, 1.3, 1.9);
    cam.lookAt(0, 0.7, 0);

    // Lighting (cinematic)
    scene.add(new THREE.AmbientLight(0xaabbcc, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1.8);
    sun.position.set(3, 5, 3); sun.castShadow = true;
    sun.shadow.mapSize.set(512, 512);
    scene.add(sun);
    const rim = new THREE.DirectionalLight(0x4488ff, 0.6);
    rim.position.set(-2, 2, -3); scene.add(rim);
    const fill = new THREE.PointLight(0xffaa44, 0.4); fill.position.set(0, 3, -2); scene.add(fill);

    // Build figure
    const fig = buildMinifig3D(unitType);
    scene.add(fig);

    // Render
    renderer.render(scene, cam);
    const dataURL = renderer.domElement.toDataURL("image/png");
    renderer.dispose();
    FIG3D_CACHE[unitType] = dataURL;
    return dataURL;
  }

  // Pre-render all unit types on load
  function preRenderAllUnits() {
    if (typeof THREE === "undefined") { console.warn("Three.js not loaded yet"); return; }
    Object.keys(UDEFS).forEach(t => {
      try { preRenderUnit3D(t); } catch(e) { console.warn("3D render fail", t, e); }
    });
    console.log("3D units pre-rendered:", Object.keys(FIG3D_CACHE).length);
  }
  // Trigger on load
  if (typeof window !== "undefined") {
    if (document.readyState === "complete") setTimeout(preRenderAllUnits, 100);
    else window.addEventListener("load", () => setTimeout(preRenderAllUnits, 100));
  }

  /* ═══ DRAW FIGURE — Silhouettes claires, jamais des cubes ═══ */
  const drawFig=(type,cx,y0,s,pl)=>{
    const bt = type.startsWith("v_") ? null : type;
    if (!bt) return drawVeh(type.slice(2), cx, y0, s, pl, 1);

    const ud = UDEFS[bt] || {};
    const facKey = ud.fac || "def";

    // Color schemes
    const COLS = {
      cl:    {body:"#e8e8e8", head:"#FFCC88", armor:"#3366CC", weapon:"#445566", helmet:"#dddddd"},

      emp:   {body:"#1a1a1a", head:"#1a1a1a", armor:"#333333", weapon:"#445566", helmet:"#0a0a0a"},
      mando: {body:"#788899", head:"#FFCC88", armor:"#556677", weapon:"#aabbcc", helmet:"#778899"},

      obs:   {body:"#222233", head:"#cc4444", armor:"#444455", weapon:"#444455", helmet:"#1a1a2e"},
      def:   {body:"#888888", head:"#FFCC88", armor:"#666666", weapon:"#444455", helmet:"#555555"},
    };
    const c = COLS[facKey] || COLS.def;

    // Special features
    const hasSaber = ["obi_wan","anakin","yoda","mace","ahsoka","luke_jedi","vader","kylo","maul","grievous","rey"].includes(bt);
    const saberCol = bt==="vader"||bt==="kylo"||bt==="maul"||(bt==="grievous"?true:false) ? "#ff3333" :
                     bt==="yoda"||bt==="luke_jedi" ? "#44ff77" :
                     bt==="mace" ? "#cc44ff" :
