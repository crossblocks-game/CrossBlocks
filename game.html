/* ═══ BALANCE ANALYSIS FUNCTIONS ═══ */
const balSaveProb=(arm,pen)=>Math.max(0,(21-(arm+pen))/20);
// Damage of 1 weapon at best range vs target armor
const balWeaponDmg=(wk,tArm)=>{
  const w=WEAPS[wk]||VWEAPS[wk];if(!w)return 0;
  let best=0;
  for(const b of["melee","cat1","cat2","catP"]){
    const diff=w[b];if(!diff)continue;
    const hitP=Math.max(0,(21-diff)/20);
    const failS=1-balSaveProb(tArm,w.pen);
    const dmg=w.dMax?(1+w.dMax)/2:w.dmg;
    const exp=w.mun*hitP*failS*dmg;
    if(exp>best)best=exp;
  }
  return best;
};
const balUnitData=(tArm=15)=>Object.entries(UDEFS).map(([k,u])=>{
  // Each weapon costs 2PA to fire, each can fire once/turn
  const nWeapons=u.w.length;
  const maxFires=Math.floor(u.act/2); // max weapon uses per turn
  const nFires=Math.min(nWeapons,maxFires); // actual fires per turn
  // Sort weapons by damage, take the best nFires
  const wDmgs=u.w.map(wk=>({key:wk,dmg:balWeaponDmg(wk,tArm)})).sort((a,b)=>b.dmg-a.dmg);
  const dpt=wDmgs.slice(0,nFires).reduce((s,w)=>s+w.dmg,0); // damage per turn
  const paAfterFire=u.act-nFires*2; // PA left for movement
  // Survivability
  const parade=balSaveProb(u.arm,5);
  const effHP=parade<1?u.hp/(1-parade):u.hp*20;
  // Lifetime damage = dpt × turns alive (effHP ≈ turns survived)
  const lifetime=dpt*effHP;
  // Mobility bonus: more moves after fire = more tactical value
  const mobBonus=1+paAfterFire*0.05; // +5% per move remaining
  const value=(lifetime*mobBonus)/u.pts*1000;
  return{key:k,...u,nFires,dpt,paAfterFire,parade,effHP,lifetime,value,
    wDmgs:wDmgs.map(w=>({...w,dmg:+w.dmg.toFixed(2)}))};
}).sort((a,b)=>b.value-a.value);
const balVehData=(tArm=15)=>Object.entries(VDEFS).map(([k,v])=>{
  // Pilot fires pw (2PA each), gunner fires gw (2PA each, separate PA pool)
  const pDmgs=v.pw.map(wk=>({key:wk,dmg:balWeaponDmg(wk,tArm)}));
  const gDmgs=v.gw.map(wk=>({key:wk,dmg:balWeaponDmg(wk,tArm)}));
  const pilotDpt=pDmgs.reduce((s,w)=>s+w.dmg,0);
  const gunnerDpt=gDmgs.reduce((s,w)=>s+w.dmg,0);
  const totalDpt=pilotDpt+gunnerDpt;
  const parade=balSaveProb(v.arm,5);
  const effHP=parade<1?(v.hp+2)/(1-parade):(v.hp+2)*20;
  const lifetime=totalDpt*effHP;
  const value=(lifetime)/v.pts*1000;
  return{key:k,...v,pilotDpt,gunnerDpt,totalDpt,parade,effHP,lifetime,value};
}).sort((a,b)=>b.value-a.value);

function hitLine(x1,y1,x2,y2,rx,ry,rw,rh){
  const E=[[rx,ry,rx+rw,ry],[rx+rw,ry,rx+rw,ry+rh],[rx+rw,ry+rh,rx,ry+rh],[rx,ry+rh,rx,ry]];
  for(const[a,b,c,d]of E){const D=(x2-x1)*(d-b)-(y2-y1)*(c-a);if(Math.abs(D)<1e-6)continue;
    const t=((a-x1)*(d-b)-(b-y1)*(c-a))/D,u=((a-x1)*(y2-y1)-(b-y1)*(x2-x1))/D;
    if(t>=0&&t<=1&&u>=0&&u<=1)return true;}return false;
}
function blocked(x1,y1,x2,y2,T){for(const t of T)if(hitLine(x1,y1,x2,y2,t.x,t.y,t.w,t.h))return true;return false;}
// Unit height: standing=20, prone=6, vehicles=24 (customizable later)
function unitH(u){if(!u)return 20;if(u.prone)return 6;if(u.isVeh)return u.vH3d||24;return u.h3d||20;}
function unitTotalH(u){return unitH(u)+(u?.alt||0);}
// 3D LOS: shoots multiple rays from attacker eye to different heights on target.
// Returns {status:"clear"|"cover"|"blocked", pct:0-1}
// pct = fraction of target body that is occluded by the WORST obstacle.
// The shooter aims at the most exposed part of the target.
function los3d(ax,ay,aH,dx,dy,dH,T){
  const dist2d=Math.hypot(dx-ax,dy-ay);if(dist2d<1)return{status:"clear",pct:0};
  // Collect all terrain that crosses the 2D line
  const crossT=T.filter(t=>hitLine(ax,ay,dx,dy,t.x,t.y,t.w,t.h)&&(t.h3d||16)>0);
  if(!crossT.length)return{status:"clear",pct:0};
  // Test rays from attacker eye (top = aH) to N sample points on target body
  // Target body spans from 0 (feet) to dH (top of head)
  const N=10;
  let visibleCount=0;
  for(let i=0;i<=N;i++){
    const targetZ=dH*(i/N); // sample point on target at this height
    // Ray goes from (ax, ay, aH) to (dx, dy, targetZ)
    // At each terrain, check if terrain blocks this ray
    let rayBlocked=false;
    for(const t of crossT){
      const tH=t.h3d||16;
      const tcx=t.x+t.w/2,tcy=t.y+t.h/2;
      const dt=Math.hypot(tcx-ax,tcy-ay);
      if(dt<1||dt>=dist2d)continue;
      const frac=dt/dist2d;
      // Height of ray at terrain position
      const rayZ=aH+(targetZ-aH)*frac;
      // Terrain blocks from 0 to tH
      if(rayZ<=tH){rayBlocked=true;break;}
    }
    if(!rayBlocked)visibleCount++;
  }
  const visFrac=visibleCount/(N+1);
  const occFrac=1-visFrac;
  // Rules: <50% hidden = clear, 50-99% = cover (arm-3), 100% = blocked
  if(visFrac<=0)return{status:"blocked",pct:1};

  return{status:"clear",pct:occFrac};
}

/* ═══ HEADLESS SIMULATION ENGINE ═══ */
function simBattle(army1Defs,army2Defs){
  // Create units or vehicles
  const mkU=(t,pl)=>{
    if(t.startsWith("v_")){const vt=t.slice(2);return mkVeh(vt,pl);}
    const d=UDEFS[t];return{id:uid(),type:t,pl,n:d.n,pts:d.pts,mAct:d.act,act:d.act,mm:d.mm,arm:d.arm,mHp:d.hp,hp:d.hp,ws:d.w.map(k=>({key:k,...WEAPS[k],cur:WEAPS[k].mun})),ic:d.ic,fac:d.fac,co:d.co,air:!!d.air,fly:!!d.fly,dep:!d.air,done:false,x:-99,y:-99};
  };
  let u1=army1Defs.map(t=>mkU(t,1));
  let u2=army2Defs.map(t=>mkU(t,2));

  // Generate terrain for simulation
  const simTerr=[];
  for(let i=0;i<4;i++)simTerr.push(mkTerr(ri(30,BW-30),ri(HALF+30,BH-60),1,simTerr));
  for(let i=0;i<4;i++)simTerr.push(mkTerr(ri(30,BW-30),ri(60,HALF-30),2,simTerr));

  // Deploy — edge line spread (avoid terrain)
  const deploy=(army,pl)=>{
    const placed=[];const yBase=pl===1?BH-BASE-PAD:PAD;
    for(const u of army){
      if(u.air){placed.push({...u,dep:false,x:-999,y:-999});continue;}
      let ok=false;
      for(let i=0;i<100;i++){
        const px=PAD+BASE+ri(0,Math.floor(BW-PAD*2-BASE*3));
        if(!onTerr(px,yBase,simTerr)&&!placed.some(p=>p.dep&&Math.abs(p.x-px)<BASE+3)){
          placed.push({...u,x:px,y:yBase,dep:true});ok=true;break;}}
      if(!ok)placed.push({...u,x:ri(PAD,BW-BASE-PAD),y:yBase,dep:true});
    }return placed;
  };
  u1=deploy(u1,1);u2=deploy(u2,2);
  const all=()=>[...u1,...u2];

  // Deploy airborne (avoid terrain)
  const deployAir=(u,units)=>{
    const en=units.filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep);if(!en.length)return u;
    for(let i=0;i<60;i++){
      const p={x:ri(PAD+BASE,BW-BASE*2),y:ri(PAD+BASE,BH-BASE*2)};
      if(onTerr(p.x,p.y,simTerr))continue;
      if(units.some(a=>a.dep&&a.hp>0&&a.id!==u.id&&Math.abs(a.x-p.x)<BASE+3&&Math.abs(a.y-p.y)<BASE+3))continue;
      let sc=0;for(const e of en){const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<C1*SEG_PX&&!blocked(p.x+BR,p.y+BR,e.x+BR,e.y+BR,simTerr))sc++;}
      if(sc>0)return{...u,x:p.x,y:p.y,dep:true};
    }return u;
  };

  // Sim combat
  let turns=0,maxTurns=40;
  const simFire=(att,bT,weaponList)=>{
    const d2=Math.hypot(att.x+BR-(bT.x+BR),att.y+BR-(bT.y+BR));
    const cat=rCat(d2);let bW=null,bD=0;
    for(const w of weaponList){if(w.cur<=0)continue;const df=wDiff(w.key,cat);if(df>0&&(!bW||df<bD)){bW=w;bD=df;}}
    if(!bW)return null;
    const rolls=[];for(let i=0;i<bW.cur;i++)rolls.push(d20());
    const hits=rolls.filter(r=>r>=bD);
    let totD=0;
    for(const h of hits){const sr=d20();if(sr<bT.arm+bW.pen)totD+=(bW.dMax?ri(1,bW.dMax):bW.dmg);}
    // Apply to vehicle HP first
    if(bT.isVeh&&bT.vHp>0){
      const nVHp=Math.max(0,bT.vHp-totD);
      if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?{...a,vHp:nVHp}:a);
      else u2=u2.map(a=>a.id===bT.id?{...a,vHp:nVHp}:a);
      if(nVHp<=0){
        // Vehicle destruction
        const boom=d20()<=10;const pHp=boom?Math.max(0,bT.hp-2):bT.hp;
        if(pHp<=0){if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?{...a,vHp:0,hp:0,isVeh:false}:a);else u2=u2.map(a=>a.id===bT.id?{...a,vHp:0,hp:0,isVeh:false}:a);}
        else{
          const bt=bT.fac==="sep"?"b1":bT.fac==="reb"?"rebel":"clone";const bd=UDEFS[bt];
          const eject={...bT,isVeh:false,vHp:0,fly:false,type:bt,mm:bd.mm,arm:bd.arm,hp:pHp,mHp:bd.hp,ws:bd.w.map(k=>({key:k,...WEAPS[k],cur:WEAPS[k].mun})),gw:[],hasGunner:false};
          if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?eject:a);else u2=u2.map(a=>a.id===bT.id?eject:a);
        }
      }
    } else {
      const nHp=Math.max(0,bT.hp-totD);
      if(bT.pl===1)u1=u1.map(a=>a.id===bT.id?{...a,hp:nHp}:a);
      else u2=u2.map(a=>a.id===bT.id?{...a,hp:nHp}:a);
    }
    return bW;
  };

  while(turns<maxTurns){
    turns++;
    // Reset acts & ammo
    const resetSim=u=>{
      const rw=u.ws.map(w=>{if(w.once&&w.cur<=0)return w;const s=WEAPS[w.key]||VWEAPS[w.key];return{...w,cur:s?.mun||w.mun};});
      const rgw=u.gw?u.gw.map(w=>{if(w.once&&w.cur<=0)return w;const s=VWEAPS[w.key];return{...w,cur:s?.mun||w.mun};}):[];
      return{...u,act:u.mAct,done:false,ws:rw,gw:rgw,gunDone:false,gunAct:u.mGunAct||0};
    };
    u1=u1.map(resetSim);u2=u2.map(resetSim);

    // Initiative
    let r1=d20(),r2=d20();while(r1===r2){r1=d20();r2=d20();}
    let curP=r1>r2?1:2;

    // Airborne deploy
    for(let i=0;i<u1.length;i++)if(u1[i].air&&!u1[i].dep&&u1[i].hp>0)u1[i]=deployAir(u1[i],all());
    for(let i=0;i<u2.length;i++)if(u2[i].air&&!u2[i].dep&&u2[i].hp>0)u2[i]=deployAir(u2[i],all());

    let safety=0;
    while(safety<80){
      safety++;
      const army=curP===1?u1:u2;
      const active=army.filter(u=>u.hp>0&&!u.done&&u.dep);
      if(!active.length){
        const other=curP===1?2:1;
        const oA=(other===1?u1:u2).filter(u=>u.hp>0&&!u.done&&u.dep);
        if(!oA.length)break; // turn over
        curP=other;continue;
      }

      // Pick unit (fire-capable first, but everyone gets activated)
      let best=active[0],bs=-1e9;
      for(const u of active){let sc=0;let canFire=false;
        for(const e of all().filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep)){
          const d=Math.hypot(u.x+BR-(e.x+BR),u.y+BR-(e.y+BR));
          if(!blocked(u.x+BR,u.y+BR,e.x+BR,e.y+BR,simTerr)){const cat=rCat(d);for(const w of u.ws)if(w.cur>0&&wDiff(w.key,cat)>0){canFire=true;sc+=80;}}
        }
        if(canFire)sc+=200;
        else sc+=50; // still worth activating to advance
        if(sc>bs){bs=sc;best=u;}}

      let cur={...best};const sA=cur.pl===1?v=>{u1=u1.map(a=>a.id===cur.id?v:a);}:v=>{u2=u2.map(a=>a.id===cur.id?v:a);};

      const canFireFrom=(px,py,ws)=>{
        for(const e of all().filter(e=>e.pl!==cur.pl&&e.hp>0&&e.dep)){
          const d=Math.hypot(px-(e.x+BR),py-(e.y+BR));
          if(blocked(px,py,e.x+BR,e.y+BR,simTerr))continue;
          const cat=rCat(d);for(const w of ws){if(w.cur>0&&wDiff(w.key,cat)>0)return true;}
        }return false;
      };
      let hasFired=false;

      // AI actions (pilot) — aggressive: always advance toward optimal range
      // Calculate optimal range for this unit's weapons
      let simOptRange=C1*SEG_PX*0.7,simBestD=99;
      for(const w of cur.ws){const src=WEAPS[w.key]||VWEAPS[w.key];if(!src)continue;
        const cats=[{d:src.melee,r:BASE*4},{d:src.cat1,r:C1*SEG_PX*0.7},{d:src.cat2,r:(C1+C2)/2*SEG_PX*0.5},{d:src.catP,r:C2*SEG_PX*0.9}];
        for(const c of cats){if(c.d>0&&c.d<simBestD){simBestD=c.d;simOptRange=c.r;}}
      }

      for(let step=0;step<8&&cur.act>0;step++){
        const en=all().filter(e=>e.pl!==cur.pl&&e.hp>0&&e.dep);if(!en.length)break;

        // Try attack (2PA) — ALWAYS PRIORITY
        if(cur.act>=2){
          let bT=null,bS=-1e9;
          for(const e of en){
            const d=Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR));
            if(blocked(cur.x+BR,cur.y+BR,e.x+BR,e.y+BR,simTerr))continue;
            const cat=rCat(d);
            for(const w of cur.ws){if(w.cur<=0)continue;const df=wDiff(w.key,cat);
              if(df>0){const sc=(21-df)*w.cur*(w.dMax||w.dmg)+(e.hp<=(w.dMax||w.dmg)?80:0);if(sc>bS){bS=sc;bT=e;}}}
          }
          if(bT){
            const usedW=simFire(cur,bT,cur.ws);
            if(usedW){hasFired=true;cur={...cur,act:cur.act-2,ws:cur.ws.map(w=>w===usedW?{...w,cur:0}:w)};sA(cur);continue;}
          }
        }

        // ALWAYS move toward optimal range if can't fire or not at optimal
        if(cur.act>=1){
          const ceDist=en.reduce((m,e)=>Math.min(m,Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR))),1e9);
          const atOptimal=Math.abs(ceDist-simOptRange)<SEG_PX*2;
          const canFireHere=canFireFrom(cur.x+BR,cur.y+BR,cur.ws);

          // Only stay if at optimal range AND can fire
          if(canFireHere&&atOptimal)break;

          // Move toward closest enemy
          let closest=null,closestD=1e9;
          for(const e of en){const d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<closestD){closestD=d;closest=e;}}
          if(closest){
            const ag=Math.atan2(closest.y-cur.y,closest.x-cur.x);
            const ms=(2+cur.mm)*SEG_PX;
            let nx=Math.max(PAD,Math.min(BW-BASE-PAD,cur.x+Math.cos(ag)*ms));
            let ny=Math.max(PAD,Math.min(BH-BASE-PAD,cur.y+Math.sin(ag)*ms));
            if(!cur.fly&&(onTerr(nx,ny,simTerr)||blocked(cur.x+BR,cur.y+BR,nx+BR,ny+BR,simTerr))){
              let found=false;
              for(let t=0.8;t>=0.2;t-=0.2){
                const sx=Math.max(PAD,Math.min(BW-BASE-PAD,cur.x+Math.cos(ag)*ms*t));
                const sy=Math.max(PAD,Math.min(BH-BASE-PAD,cur.y+Math.sin(ag)*ms*t));
                if(!onTerr(sx,sy,simTerr)&&!blocked(cur.x+BR,cur.y+BR,sx+BR,sy+BR,simTerr)){
                  nx=sx;ny=sy;found=true;break;}
              }
              if(!found)break;
            }
            cur={...cur,x:nx,y:ny,act:cur.act-1};sA(cur);continue;
          }
          break;
        }
        break;
      }

      // Gunner attacks (vehicle only)
      if(cur.isVeh&&cur.hasGunner&&cur.gw){
        let gAct=cur.gunAct||0;
        for(let gs=0;gs<4&&gAct>=2;gs++){
          const en=all().filter(e=>e.pl!==cur.pl&&e.hp>0&&e.dep);if(!en.length)break;
          let bT=null,bS=-1e9;
          for(const e of en){
            const d=Math.hypot(cur.x+BR-(e.x+BR),cur.y+BR-(e.y+BR));
            if(blocked(cur.x+BR,cur.y+BR,e.x+BR,e.y+BR,simTerr))continue;
            const cat=rCat(d);for(const w of cur.gw){if(w.cur<=0)continue;const df=wDiff(w.key,cat);
              if(df>0){const sc=(21-df)*w.cur*(w.dMax||w.dmg);if(sc>bS){bS=sc;bT=e;}}}
          }
          if(bT){const usedW=simFire(cur,bT,cur.gw);if(usedW){gAct-=2;cur={...cur,gunAct:gAct,gw:cur.gw.map(w=>w===usedW?{...w,cur:0}:w)};sA(cur);}else break;}
          else break;
        }
      }

      // End unit turn
      cur={...cur,done:true,act:0,gunDone:true};sA(cur);
      if(cur.pl===1)u1=u1.map(a=>a.id===cur.id?cur:a);else u2=u2.map(a=>a.id===cur.id?cur:a);

      // Check win
      if(u1.filter(u=>u.hp>0||(u.air&&!u.dep)).length===0)return{winner:2,turns,surv1:0,surv2:u2.filter(u=>u.hp>0).length,
        detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
      if(u2.filter(u=>u.hp>0||(u.air&&!u.dep)).length===0)return{winner:1,turns,surv1:u1.filter(u=>u.hp>0).length,surv2:0,
        detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};

      // Switch player
      const o=curP===1?2:1;
      const oA=(o===1?u1:u2).filter(u=>u.hp>0&&!u.done&&u.dep);
      if(oA.length>0)curP=o;
    }

    // Check end of turn
    if(u1.filter(u=>u.hp>0).length===0)return{winner:2,turns,surv1:0,surv2:u2.filter(u=>u.hp>0).length,
      detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
    if(u2.filter(u=>u.hp>0).length===0)return{winner:1,turns,surv1:u1.filter(u=>u.hp>0).length,surv2:0,
      detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
  }
  // Timeout → whoever has more hp wins
  const hp1=u1.reduce((s,u)=>s+Math.max(0,u.hp),0),hp2=u2.reduce((s,u)=>s+Math.max(0,u.hp),0);
  return{winner:hp1>=hp2?1:2,turns,surv1:u1.filter(u=>u.hp>0).length,surv2:u2.filter(u=>u.hp>0).length,
    detail1:u1.map(u=>({type:u.type,alive:u.hp>0})),detail2:u2.map(u=>({type:u.type,alive:u.hp>0}))};
}

function runSimulations(n,a1Defs,a2Defs){
  const results={n,w1:0,w2:0,totalTurns:0,survJ1:[],survJ2:[],unitStats:{}};
  for(let i=0;i<n;i++){
    const r=simBattle(a1Defs,a2Defs);
    if(r.winner===1)results.w1++;else results.w2++;
    results.totalTurns+=r.turns;
    results.survJ1.push(r.surv1);results.survJ2.push(r.surv2);
    for(const d of r.detail1){if(!results.unitStats[d.type])results.unitStats[d.type]={total:0,alive:0};results.unitStats[d.type].total++;if(d.alive)results.unitStats[d.type].alive++;}
    for(const d of r.detail2){if(!results.unitStats[d.type])results.unitStats[d.type]={total:0,alive:0};results.unitStats[d.type].total++;if(d.alive)results.unitStats[d.type].alive++;}
  }
  return results;
}

/* Learning */
function getBalanceTips(L){
  const tips=[];
  if(L.g<2)return["Jouez 2+ parties pour les conseils."];
  const w1=L.w1/L.g,w2=L.w2/L.g;
  if(w1>0.65)tips.push("⚠ J1 domine — réduisez -50pts ou ajoutez 1 unité J2.");
  if(w2>0.65)tips.push("⚠ J2 domine — ajoutez 1 unité J1.");
  for(const[t,s]of Object.entries(L.us||{})){
    if(s.n>=3&&UDEFS[t]){const sr=s.s/s.n;
      if(sr>0.8)tips.push(`📈 ${UDEFS[t].ic}${UDEFS[t].n} survit ${Math.round(sr*100)}% → +30pts`);
      if(sr<0.2)tips.push(`📉 ${UDEFS[t].ic}${UDEFS[t].n} meurt ${Math.round((1-sr)*100)}% → -30pts`);
    }}
  if(!tips.length)tips.push("✓ Équilibrage correct.");
  return tips;
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  render(){
    if(this.state.hasError)return React.createElement('div',{style:{background:'#1a0000',color:'#f85149',padding:20,margin:10,borderRadius:6,fontFamily:'monospace',fontSize:12,whiteSpace:'pre-wrap',border:'2px solid #f85149'}},
      'Erreur React: '+String(this.state.error?.message||this.state.error)+'\n\n'+String(this.state.error?.stack||''));
    return this.props.children;
  }
}

  const all=useMemo(()=>[...a1,...a2],[a1,a2]);
  const balUD=useMemo(()=>balUnitData(balArm),[balArm]);
  const balVD=useMemo(()=>balVehData(balArm),[balArm]);

  const aL=useCallback(m=>sLog(p=>[...p.slice(-120),m]),[]);
  useEffect(()=>{if(lRef.current)lRef.current.scrollTop=9999;},[log]);

  /* Army building */
  const addU=(pl,t)=>{(pl===1?sA1:sA2)(a=>[...a,mkUnit(t,pl)]);(pl===1?sP1:sP2)(v=>v+UDEFS[t].pts);};
  const remU=(pl,id)=>{const a=pl===1?a1:a2;const u=a.find(x=>x.id===id);if(!u)return;(pl===1?sA1:sA2)(a=>a.filter(x=>x.id!==id));(pl===1?sP1:sP2)(v=>v-u.pts);};
  const addV=(pl,vt)=>{(pl===1?sA1:sA2)(a=>[...a,mkVeh(vt,pl)]);(pl===1?sP1:sP2)(v=>v+VDEFS[vt].pts);};
  const remV=(pl,id)=>{const a=pl===1?a1:a2;const u=a.find(x=>x.id===id);if(!u)return;(pl===1?sA1:sA2)(a=>a.filter(x=>x.id!==id));(pl===1?sP1:sP2)(v=>v-u.pts);};
  const preset=(pl)=>{const ts=pl===1?["clone","clone","clone","sniper","spec","officer","airborne","fives"]:["b1","b1","b1","b1","b1","b1","b1","b1","b2","b2","b2"];
    const us=ts.map(t=>mkUnit(t,pl));(pl===1?sA1:sA2)(us);(pl===1?sP1:sP2)(us.reduce((s,u)=>s+u.pts,0));};

  /* ═══ DEPLOY ═══ */
  const startDeploy=(mode)=>{
    let na1=a1,na2=a2;
    if(!a1.length){preset(1);na1=null;}
    if(!a2.length){preset(2);na2=null;}

    setPhase("terr_p1");sTSel(null);setTab("battle");

  };

  const autoDeploy=()=>{
    const t=[];
    for(let i=0;i<4;i++)t.push(mkTerr(ri(30,BW-30),ri(HALF+30,BH-60),1,t));
    for(let i=0;i<4;i++)t.push(mkTerr(ri(30,BW-30),ri(60,HALF-30),2,t));
    sTerr(t);

    const deployOneSide=(army,pl)=>{
      const inf=[],vehs=[];
      for(const u of army){if(u.isVeh)vehs.push(u);else inf.push(u);}
      // Sort infantry by pts ascending (cheapest first = weakest)
      const boardable=inf.filter(u=>!u.air).sort((a,b)=>a.pts-b.pts);
      const airUnits=inf.filter(u=>u.air);
      const boarded=[];const emptyVehs=[];const usedInf=new Set();
      // Auto-board weakest into each vehicle
      for(const v of vehs){
        const pilot=boardable.find(u=>!usedInf.has(u.id));
        if(pilot){
          usedInf.add(pilot.id);
          // Find position for vehicle
          let pos=null;
          for(let i=0;i<50;i++){
            const px=ri(PAD+BASE,BW-BASE*2-PAD);const py=edgeY(pl)+((pl===1?-1:1)*ri(BASE*2,SEG_PX*3));
            const p=clamp(px,py);
            if(!onTerr(p.x,p.y,t)){pos=p;break;}
          }
          if(!pos)pos=clamp(BW/2+ri(-30,30),edgeY(pl)+((pl===1?-1:1)*SEG_PX*2));
          const bu=boardVehUnit(pilot,v.vtype);
          bu.x=pos.x;bu.y=pos.y;bu.dep=true;bu.done=false;bu.act=pilot.mAct;
          bu.gunAct=bu.hasGunner?pilot.mAct:0;bu.mGunAct=bu.hasGunner?pilot.mAct:0;bu.gunDone=false;
          boarded.push(bu);
          aL(`🚗 ${pilot.ic}${pilot.name}(J${pl}) embarque → ${v.name}`);
        } else {
          let pos=null;
          for(let i=0;i<50;i++){
            const px=ri(PAD+BASE,BW-BASE*2-PAD);const py=edgeY(pl)+((pl===1?-1:1)*ri(BASE*2,SEG_PX*3));
            const p=clamp(px,py);
            if(!onTerr(p.x,p.y,t)){pos=p;break;}
          }
          if(!pos)pos=clamp(BW/2+ri(-30,30),edgeY(pl)+((pl===1?-1:1)*SEG_PX*2));
          emptyVehs.push(mkEmptyVeh(v.vtype,pl,pos.x,pos.y));
        }
      }
      // Place remaining infantry at edge
      const remainInf=boardable.filter(u=>!usedInf.has(u.id));
      const placed=[...boarded];
      for(const u of [...remainInf,...airUnits]){
        if(u.air){placed.push({...u,dep:false,x:-999,y:-999});continue;}
        let best=null;
        for(let i=0;i<80;i++){
          const px=ri(PAD+BASE,BW-BASE*2-PAD);const py=edgeY(pl);
          const p={x:px,y:py};
          if(!onTerr(p.x,p.y,t)&&!overlap(p.x,p.y,placed,null)){best=p;break;}
        }
        if(!best)best={x:BW/2+ri(-30,30),y:edgeY(pl)};
        placed.push({...u,x:best.x,y:best.y,dep:true});
      }
      return{units:sqAssign(placed),emptyVehs};
    };
    const r1=deployOneSide(a1,1),r2=deployOneSide(a2,2);
    sA1(()=>r1.units);sA2(()=>r2.units);
    sEv1(r1.emptyVehs);sEv2(r2.emptyVehs);

  const nextTerr=()=>{
    if(phase==="terr_p1"){setPhase("terr_p2");sTSel(null);aL("━━ J2: Placez décors (moitié haute). ━━");}

      // Separate vehicles: deploy them as empty immediately at edges

      const inf1=a1.filter(u=>!u.isVeh&&!u.air),inf2=a2.filter(u=>!u.isVeh&&!u.air);

      if(veh1.length||veh2.length){
        const eV1=[],eV2=[];
        for(const v of veh1){
          const px=ri(PAD+BASE,BW-BASE*2-PAD);const py=edgeY(1)-SEG_PX*2;
          const p=clamp(px,py);eV1.push(mkEmptyVeh(v.vtype,1,p.x,p.y));
        }
        for(const v of veh2){
          const px=ri(PAD+BASE,BW-BASE*2-PAD);const py=edgeY(2)+SEG_PX*2;
          const p=clamp(px,py);eV2.push(mkEmptyVeh(v.vtype,2,p.x,p.y));
        }
        sEv1(eV1);sEv2(eV2);
        sA1(p=>p.filter(u=>!u.isVeh));sA2(p=>p.filter(u=>!u.isVeh));

      const q2=a2.filter(u=>!u.isVeh&&!u.air).map(u=>u.id);
      sDQ1(q1);sDQ2(q2);sDTn(1);setPhase("dep_units");

      if(q1.length>0){const u=a1.find(x=>x.id===q1[0]);if(u)aL(`→ J1: placez ${u.ic} ${u.name} (bord ou cliquez véhicule)`);}
    }
  };

  const delTerr=()=>{if(!tSel)return;sTerr(p=>p.filter(t=>t.id!==tSel));sTSel(null);aL("🗑 Supprimé");};

  const getCurDU=()=>{if(phase!=="dep_units")return null;const q=dTn===1?dQ1:dQ2;if(!q.length)return null;return(dTn===1?a1:a2).find(u=>u.id===q[0])||null;};

  const placeDU=(x,y)=>{
    const cu=getCurDU();if(!cu)return;
    
    // Check if click is on an empty vehicle of this player → board it
    const evs=dTn===1?ev1:ev2;const sEv=dTn===1?sEv1:sEv2;
    const clickedVeh=evs.find(v=>x>=v.x-BASE&&x<=v.x+BASE*3&&y>=v.y-BASE&&y<=v.y+BASE*3);
    if(clickedVeh){
      const sA=dTn===1?sA1:sA2;
      const boarded=boardVehUnit(cu,clickedVeh.vtype);
      boarded.x=clickedVeh.x;boarded.y=clickedVeh.y;boarded.dep=true;boarded.done=false;

      advanceDepQueue();
      return;
    }
    
    const nx=Math.max(PAD,Math.min(BW-BASE-PAD,x-BR));
    const ny=edgeY(dTn);
    if(onTerr(nx,ny,terr)){aL("⚠ Décor !");return;}
    if(overlap(nx,ny,all,cu.id)){aL("⚠ Occupé !");return;}
    (dTn===1?sA1:sA2)(prev=>prev.map(u=>u.id===cu.id?{...u,x:nx,y:ny,dep:true}:u));
    aL(`${cu.ic} ${cu.name}(J${dTn}) placé ✓`);
    advanceDepQueue();
  };

  const advanceDepQueue=()=>{
    if(dTn===1){
      const nQ=dQ1.slice(1);sDQ1(nQ);
      if(dQ2.length>0){sDTn(2);const nu=a2.find(u=>u.id===dQ2[0]);if(nu)aL(`→ J2: ${nu.ic} ${nu.name}`);}
      else if(nQ.length>0){const nu=a1.find(u=>u.id===nQ[0]);if(nu)aL(`→ J1: ${nu.ic} ${nu.name}`);}
      else finishDeploy();
    } else {
      const nQ=dQ2.slice(1);sDQ2(nQ);
      if(dQ1.length>0){sDTn(1);const nu=a1.find(u=>u.id===dQ1[0]);if(nu)aL(`→ J1: ${nu.ic} ${nu.name}`);}
      else if(nQ.length>0){const nu=a2.find(u=>u.id===nQ[0]);if(nu)aL(`→ J2: ${nu.ic} ${nu.name}`);}
      else finishDeploy();
    }
  };

  const finishDeploy=()=>{
    sA1(p=>sqAssign(p));sA2(p=>sqAssign(p));
    setPhase("battle");aL("━━━ BATAILLE ! ━━━");
    // AI auto-creates squads for its units
    setTimeout(()=>{
      if(!isHuman(1))aiAutoSquad(1);
      if(!isHuman(2))aiAutoSquad(2);
      rollInit();
    },300);
  };

  /* ═══ INITIATIVE ═══ */
  const rollInit=()=>{
    let r1=d20(),r2=d20();while(r1===r2){r1=d20();r2=d20();}
    const f=r1>r2?1:2;sIni({p1:r1,p2:r2});sCP(f);
    const resetU=u=>({...u,act:u.mAct,done:false,
      ws:u.ws.map(w=>{if(w.once&&w.cur<=0)return w;const src=WEAPS[w.key]||VWEAPS[w.key];return{...w,cur:src?.mun||w.mun};}),
      ...(u.isVeh?{gw:u.gw.map(w=>{if(w.once&&w.cur<=0)return w;const src=VWEAPS[w.key];return{...w,cur:src?.mun||w.mun};}),gunDone:false,gunAct:u.mGunAct}:{})
    });
    sA1(p=>p.map(resetU));sA2(p=>p.map(resetU));
    aL(`🎲 Tour ${turn}: J1=${r1} J2=${r2} → J${f}`);
  };

  /* ═══ LOS ═══ */
  const showLos=(u)=>{
    if(!u){sLos([]);return;}sSel(u);
    const cx=u.x+BR,cy=u.y+BR,aH=unitTotalH(u);
    const allW=[...u.ws,...(u.gw||[])];
    sLos(all.filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep).map(e=>{
      const ex=e.x+BR,ey=e.y+BR,d=Math.hypot(cx-ex,cy-ey),dH=unitTotalH(e);
      const los=los3d(cx,cy,aH,ex,ey,dH,terr);
      const bl=los.status==="blocked";const cv=los.status==="cover";
      const col=bl?"#555":cv?"#fd0":rCol(d);
      const cat=rCat(d);
      let cf=false;for(const w of allW)if(wDiff(w.key,cat)>0&&!bl)cf=true;
      return{x1:cx,y1:cy,x2:ex,y2:ey,color:col,blocked:bl,cover:cv,pct:los.pct,canFire:cf};
    }));
  };

  /* ═══ ANIMATED MOVE ═══ */
  const doAnimMove=(u,nx,ny,sA,cb)=>{
    sAnimating(true);
    const dx=nx-u.x,dy=ny-u.y,d=Math.hypot(dx,dy);
    const pts=[{x:u.x,y:u.y}];
    if(d>SEG_PX*1.5){
      const mx=u.x+dx*0.5+(Math.random()-0.5)*SEG_PX*0.7;
      const my=u.y+dy*0.5+(Math.random()-0.5)*SEG_PX*0.7;
      const mc=clamp(mx,my);
      if(!onTerr(mc.x,mc.y,terr))pts.push(mc);
    }
    pts.push({x:nx,y:ny});
    let fr=0;const totalFr=18;
    const iv=setInterval(()=>{
      fr++;const t=Math.min(fr/totalFr,1);
      const totalD=pts.reduce((s,p,i)=>i>0?s+Math.hypot(p.x-pts[i-1].x,p.y-pts[i-1].y):s,0);
      let walked=t*totalD,cx2=pts[0].x,cy2=pts[0].y;
      for(let i=1;i<pts.length;i++){
        const segD=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
        if(walked<=segD){const r=segD>0?walked/segD:0;cx2=pts[i-1].x+(pts[i].x-pts[i-1].x)*r;cy2=pts[i-1].y+(pts[i].y-pts[i-1].y)*r;break;}
        walked-=segD;cx2=pts[i].x;cy2=pts[i].y;
      }
      sA(p=>p.map(a=>a.id===u.id?{...a,x:cx2,y:cy2}:a));
      if(fr>=totalFr){clearInterval(iv);sA(p=>p.map(a=>a.id===u.id?{...a,x:nx,y:ny}:a));sAnimating(false);cb();}
    },22);
  };

  /* ═══ MOVE UNIT ═══ */
  const moveUnit=(u,tx,ty,sA,cb)=>{
    const pronePen=u.prone?-4:0;
    const ms=2+u.mm+pronePen;if(ms<=0){aL("MM trop bas"+(u.prone?" (couché!)":""));cb?.(null);return;}
    const mx=ms*SEG_PX;
    // Check destination terrain for climbing
    const destTerr=getTerrAt(tx,ty,terr);
    const destAlt=destTerr?(destTerr.h3d||0):0;
    const curAlt=u.alt||0;
    const altDiff=Math.abs(destAlt-curAlt);
    // Effective distance: horizontal + vertical*2 (climbing costs double)
    const dx=tx-u.x,dy=ty-u.y,dHoriz=Math.hypot(dx,dy);
    const effectiveDist=dHoriz+altDiff*2;
    let nx,ny;
    if(effectiveDist<=mx){nx=tx;ny=ty;}
    else{
      // Scale back: how far can we go?
      const ratio=mx/Math.max(1,effectiveDist);
      nx=u.x+dx*ratio;ny=u.y+dy*ratio;
    }
    const c=clamp(nx,ny);nx=c.x;ny=c.y;
    // Recalculate destination terrain after clamping
    const finalTerr=getTerrAt(nx,ny,terr);
    const finalAlt=finalTerr?(finalTerr.h3d||0):0;
    // Flying units ignore terrain blocking
    if(!u.fly&&!finalTerr){
      // Not landing on terrain: check path for blocking obstacles
      if(blocked(u.x+BR,u.y+BR,nx+BR,ny+BR,terr)){
        let bestD=0,bestX=u.x,bestY=u.y;
        const steps=12;
        for(let i=1;i<=steps;i++){
          const t=i/steps;
          const px=u.x+((nx-u.x)*t),py=u.y+((ny-u.y)*t);
          const midTerr=getTerrAt(px,py,terr);
          if(!midTerr&&(onTerr(px,py,terr)||blocked(u.x+BR,u.y+BR,px+BR,py+BR,terr)))break;
          bestD=t;bestX=px;bestY=py;
        }
        if(bestD<=0.1){aL("Décor bloque le passage !");cb?.(null);return;}
        const bc=clamp(bestX,bestY);nx=bc.x;ny=bc.y;
        aL("Arrêté par décor — déplacement partiel");
      }
    }
    if(overlap(nx,ny,all,u.id)){aL("Occupé !");cb?.(null);return;}
    const newAlt=getTerrH(nx,ny,terr);
    const climbing=newAlt>curAlt;const descending=newAlt<curAlt;
    const up={...u,x:nx,y:ny,act:u.act-1,alt:newAlt};
    const climbMsg=climbing?" (MONTE +"+Math.round(newAlt-curAlt)+"h)":descending?" (DESCEND "+Math.round(curAlt-newAlt)+"h)":"";
    aL(`${u.ic}${u.name} déplace${u.fly?" Vol":""}${climbMsg}(PA:${up.act})`);
    doAnimMove(u,nx,ny,sA,()=>{sA(p=>p.map(a=>a.id===u.id?up:a));cb?.(up);});
  };

  /* ═══ VEHICLE DESTRUCTION ═══ */
  const vehicleDestroy=(def,sDf)=>{
    const expl=d20();
    const boom=expl<=10;
    aL(boom?`💥 ${def.ic}${def.name} EXPLOSE! (🎲${expl}≤10) — Équipage: 2 dégâts!`:`🔥 ${def.ic}${def.name} détruit (🎲${expl}>10) — Pas d'explosion`);
    const pilotHp=boom?Math.max(0,def.hp-2):def.hp;
    const o=def.origUnit;
    const baseType=o?.type||(def.fac==="sep"?"b1":def.fac==="reb"?"rebel":"clone");
    const bd=UDEFS[baseType];
    if(pilotHp<=0){
      aL(`  💀 Pilote tué dans l'explosion!`);
      sDf(p=>p.map(u=>u.id===def.id?{...u,vHp:0,hp:0,isVeh:false,name:"Épave "+def.name,ic:"🔥",done:true}:u));
      sTerr(t=>[...t,{id:uid(),x:def.x-2,y:def.y-2,w:BASE+4,h:BASE+4,kind:"Épave",color:"#333",emoji:"",h3d:8,tex:"ruin"}]);
      // Drop pilot weapons on death
      for(const wk of bd.w){const pick=!NOT_PICKABLE.includes(wk);const wn=WEAPS[wk]?.n||"Arme";
        sDrops(p=>[...p,{id:uid(),x:def.x+ri(-3,3),y:def.y+ri(-3,3),key:wk,pickable:pick,name:wn}]);
      }
      checkWin(def.pl);
    } else {
      aL(`  🏃 Pilote éjecté! PV:${pilotHp}`);
      sDf(p=>p.map(u=>u.id===def.id?{...u,
        origUnit:null,isVeh:false,vHp:0,vMHp:0,fly:o?.fly||false,prone:false,
        type:baseType,name:(o?.name||bd.n)+"(éjecté)",ic:o?.ic||bd.ic,co:o?.co||bd.co,
        mm:o?.mm??bd.mm,arm:o?.arm??bd.arm,hp:pilotHp,mHp:o?.mHp||bd.hp,
        ws:bd.w.map(k=>({key:k,...WEAPS[k],cur:WEAPS[k].mun})),
        gw:[],hasGunner:false,gunDone:true,gunAct:0,
        done:true
      }:u));
      sTerr(t=>[...t,{id:uid(),x:def.x-2,y:def.y-2,w:BASE+4,h:BASE+4,kind:"Épave",color:"#333",emoji:"",h3d:8,tex:"ruin"}]);
    }
  };

  /* ═══ ATTACK — DETAILED (with vehicle HP) ═══ */
  const attackUnit=(att,def,sAt,sDf,cb2,useGw)=>{
    const actCost=2;
    const isGunnerFiring=!!useGw;
    if(!isGunnerFiring&&att.act<actCost){aL("2PA requis");cb2?.(null);return;}
    if(isGunnerFiring&&att.gunAct<actCost){aL("Canonnier: 2PA requis");cb2?.(null);return;}
    const ax=att.x+BR,ay=att.y+BR,dx2=def.x+BR,dy2=def.y+BR,d=Math.hypot(ax-dx2,ay-dy2);
    // 3D LOS check
    const los=los3d(ax,ay,unitTotalH(att),dx2,dy2,unitTotalH(def),terr);
    if(los.status==="blocked"){aL("Ligne bloquée (cible cachée à "+Math.round(los.pct*100)+"%)");cb2?.(null);return;}
    const hasCover=los.status==="cover";
    const coverBonus=hasCover?3:0;
    const cat=rCat(d);let bW=null,bD=0;
    const weaponList=isGunnerFiring?att.gw:att.ws;
    for(const w of weaponList){if(w.cur<=0)continue;const df=wDiff(w.key,cat);if(df>0&&(!bW||df<bD)){bW=w;bD=df;}}
    if(!bW){aL("Pas d'arme à portée");cb2?.(null);return;}
    let hitDiff=bD;
    if(def.prone&&cat==="melee")hitDiff=Math.max(1,bD-1);
    const bid=uid();sBul(p=>[...p,{id:bid,x1:ax,y1:ay,x2:dx2,y2:dy2,t:0}]);
    const rolls=[];for(let i=0;i<bW.cur;i++)rolls.push(d20());
    const hits=rolls.filter(r=>r>=hitDiff);
    const defArm=def.isVeh&&def.vHp>0?def.arm:def.arm;
    const effArm=Math.max(1,defArm-coverBonus); // Cover makes armor better (lower threshold = easier to save)
    let totD=0;const saveDetails=[];
    for(const h of hits){
      const sr=d20();const thresh=effArm+bW.pen;const ok=sr>=thresh;
      saveDetails.push({sr,thresh,ok});
      if(!ok){const d1=bW.dMax?ri(1,bW.dMax):bW.dmg;totD+=d1;saveDetails[saveDetails.length-1].d1=d1;}
    }
    // Apply damage to vehicle HP or unit HP
    const isVehTarget=def.isVeh&&def.vHp>0;
    const nVHp=isVehTarget?Math.max(0,def.vHp-totD):0;
    const nHp=isVehTarget?def.hp:Math.max(0,def.hp-totD);
    setTimeout(()=>{
      sBul(p=>p.filter(b=>b.id!==bid));
      if(isVehTarget){
        sDf(p=>p.map(u=>u.id===def.id?{...u,vHp:nVHp}:u));
      } else {
        sDf(p=>p.map(u=>u.id===def.id?{...u,hp:nHp}:u));
      }
      const nW=isGunnerFiring?att.ws:att.ws.map(w=>w===bW?{...w,cur:0}:w);
      const nGW=isGunnerFiring?att.gw.map(w=>w===bW?{...w,cur:0}:w):att.gw||[];
      const uA=isGunnerFiring?
        {...att,gunAct:att.gunAct-actCost,gw:nGW}:
        {...att,act:att.act-actCost,ws:nW};
      sAt(p=>p.map(u=>u.id===att.id?uA:u));
      const src=isGunnerFiring?"🎯Canonnier":"⚔";
      aL(`${src} ${att.ic}${att.name}→${def.ic}${def.name} [${bW.n}]${hasCover?` COUVERT(${Math.round(los.pct*100)}% caché, arm-3)`:""}`);
      aL(`  Touche: ${rolls.join(",")} (>=${hitDiff}${def.prone&&cat==="melee"?" couché!":""}) → ${hits.length}/${rolls.length}`);
      for(const s of saveDetails)
        aL(`  Armure(${effArm}${hasCover?"[couvert]":""})+Pen(${bW.pen})=${s.thresh}: ${s.sr} ${s.ok?"Pare":"X"+(s.d1||bW.dmg)+"dmg"}`);
      if(isVehTarget){
        aL(totD>0?`  → ${totD}dégât(s)! Véhicule PV:${def.vHp}→${nVHp}`:`  → 0 dégât`);
        if(nVHp<=0){
          vehicleDestroy({...def,vHp:nVHp},sDf);
        }
      } else {
        aL(totD>0?`  → ${totD}dégât(s)! PV:${def.hp}→${nHp}`:`  → 0 dégât`);
        if(nHp<=0){
          aL(`💀 ${def.ic}${def.name}(J${def.pl}) détruit!`);
          // Drop weapons at death location
          const dw=def.ws||[];
          for(const w of dw){
            const pick=!NOT_PICKABLE.includes(w.key);
            sDrops(p=>[...p,{id:uid(),x:def.x+ri(-3,3),y:def.y+ri(-3,3),key:w.key,pickable:pick,name:w.n||WEAPS[w.key]?.n||"Arme"}]);
            aL(`  🔫 ${w.n||"Arme"} tombée${!pick?" (non ramassable)":""}`);
          }
          checkWin(def.pl);
        }
      }
      cb2?.(uA);
    },500);
  };

  /* ═══ SQUAD MANAGEMENT ═══ */
  // Get all squads for a player
  const getSquads=(pl)=>{
    const army=pl===1?a1:a2;
    const sqs={};
    army.filter(u=>u.sqId&&u.hp>0&&u.dep).forEach(u=>{if(!sqs[u.sqId])sqs[u.sqId]=[];sqs[u.sqId].push(u);});
    return sqs;
  };
  // Create new squad with selected unit as leader
  const createSquad=(u)=>{
    if(u.sqId){aL(`${u.name} est déjà dans une escouade`);return;}
    const sid=nextSqId();
    const sA=u.pl===1?sA1:sA2;
    sA(p=>p.map(a=>a.id===u.id?{...a,sqId:sid}:a));
    sMU(prev=>prev&&prev.id===u.id?{...prev,sqId:sid}:prev);
    aL(`Escouade ${sid} créée avec ${u.name} comme leader`);
  };
  // Add unit to an existing squad
  const joinSquad=(u,sqId)=>{
    if(u.sqId===sqId){aL("Déjà dans cette escouade");return;}
    const sA=u.pl===1?sA1:sA2;
    // Leave old squad first
    sA(p=>p.map(a=>a.id===u.id?{...a,sqId}:a));
    sMU(prev=>prev&&prev.id===u.id?{...prev,sqId}:prev);
    aL(`${u.name} rejoint l'escouade ${sqId}`);
  };
  // Remove unit from its squad
  const leaveSquad=(u)=>{
    if(!u.sqId){aL("Pas dans une escouade");return;}
    const oldSq=u.sqId;
    const sA=u.pl===1?sA1:sA2;
    sA(p=>{
      const updated=p.map(a=>a.id===u.id?{...a,sqId:null}:a);
      // If only 1 member left, dissolve the squad
      const remaining=updated.filter(a=>a.sqId===oldSq&&a.hp>0);
      if(remaining.length<=1)return updated.map(a=>a.sqId===oldSq?{...a,sqId:null}:a);
      return updated;
    });

    aL(`${u.name} quitte l'escouade`);

  // Disband entire squad
  const disbandSquad=(sqId)=>{

    sA2(p=>p.map(a=>a.sqId===sqId?{...a,sqId:null}:a));

  };
  // AI auto-squad: group nearby same-type units
  const aiAutoSquad=(pl)=>{
    const army=pl===1?a1:a2;const sA=pl===1?sA1:sA2;
    const unassigned=army.filter(u=>!u.sqId&&u.hp>0&&u.dep&&!u.isVeh);
    const types={};unassigned.forEach(u=>{if(!types[u.type])types[u.type]=[];types[u.type].push(u);});
    sA(prev=>{
      let next=[...prev];
      for(const[tp,units]of Object.entries(types)){
        if(units.length>=2){
          const sid=nextSqId();
          next=next.map(u=>units.some(m=>m.id===u.id)?{...u,sqId:sid}:u);
        }
      }
      return next;
    });
  };

  /* ═══ MANUAL CONTROL ═══ */
  const takeCtrl=(u)=>{
    const canCtrl=paused||isHuman(realCP.current);

    const fresh=all.find(x=>x.id===u.id)||u;

  const manAction=(a)=>{
    if(!mU)return;
    if(a==="move"){if(mU.act<1){aL("⚠ 0PA");return;}sMW("move");aL("➡ Cliquez destination");}
    else if(a==="attack"){if(mU.act<2){aL("⚠ 2PA");return;}sMW("attack");aL("🎯 Cliquez ennemi");}
    else if(a==="gunner"){if(!mU.isVeh||mU.gunAct<2){aL("⚠ Canonnier: 2PA requis");return;}sMW("gunner");aL("🎯 Canonnier: cliquez ennemi");}
    else if(a==="prone"){
      if(mU.isVeh){aL("Véhicule ne peut pas se coucher");return;}
      if(mU.act<1){aL("1PA requis");return;}
      pushUndo();
      const sA=mU.pl===1?sA1:sA2;
      const np=!mU.prone;
      sA(p=>p.map(u=>u.id===mU.id?{...u,prone:np,act:u.act-1}:u));

      if(mU.act<1){aL("Pas assez d'actions");return;}
      const nearby=drops.find(d=>d.pickable&&Math.hypot((d.x+2)-(mU.x+BR),(d.y+2)-(mU.y+BR))<=SEG_PX);

      sMU(null);sMW(null);sLos([]);
    }
    else if(a==="squadfire"){
      if(mU.act<2){aL("⚠ 2PA requis");return;}
      if(!mU.sqId){aL("⚠ Pas dans une escouade");return;}
      sMW("squadfire");aL("🎯 TIR GROUPÉ: cliquez l'ennemi cible");
    }
    else endManual(mU);
  };

  const doManMove=(u,tx,ty)=>{
    pushUndo();
    moveUnit(u,tx-BR,ty-BR,u.pl===1?sA1:sA2,(r)=>{
      if(r){sMU(r);showLos(r);if(r.act<=0&&!(r.isVeh&&r.hasGunner&&r.gunAct>=2))setTimeout(()=>endManual(r),200);}

  const doManAttack=(att,def,isGunner)=>{
    pushUndo();

      }

  };

  const endManual=(u)=>{
    const uu=u||mU;if(!uu)return;
    // Auto-pickup best nearby weapon if actions remaining
    if(uu.act>=1&&!uu.isVeh&&uu.hp>0){
      const nearby=drops.filter(d=>d.pickable&&Math.hypot((d.x+2)-(uu.x+BR),(d.y+2)-(uu.y+BR))<=BASE*2);
      if(nearby.length>0){
        let best=null,bs=-1;
        for(const d of nearby){const w=WEAPS[d.key];if(!w)continue;const sc=w.mun*(w.dMax||w.dmg)*Math.max(w.pen,1);if(sc>bs){bs=sc;best=d;}}
        if(best){
          const wData=WEAPS[best.key];
          (uu.pl===1?sA1:sA2)(p=>p.map(a=>a.id===uu.id?{...a,ws:[...a.ws,{key:best.key,...wData,cur:wData.mun}],done:true}:a));
          sDrops(p=>p.filter(d=>d.id!==best.id));
          aL(`🔫 ${uu.ic}${uu.name} ramasse ${best.name} en fin de tour!`);
          sMU(null);sMW(null);sLos([]);return;
        }
      }
    }
    (uu.pl===1?sA1:sA2)(p=>p.map(a=>a.id===uu.id?{...a,done:true}:a));
    aL(`${uu.ic}${uu.name} terminé`);sMU(null);sMW(null);sLos([]);
    // Handle turn switching for PvP/PvE and paused mode

      const sLeft=(uu.pl===1?a1:a2).filter(a=>a.hp>0&&!a.done&&a.dep&&a.id!==uu.id);

        else if(sLeft.length>0)aL(`J${uu.pl}: ${sLeft.length} unité(s) restante(s)`);
        else aL("Tour fini — cliquez RELANCER pour continuer");
      }
    }
  };

  const togglePause=()=>{

  useEffect(()=>{

          else sCP(o);
        }
      }

  const pickBest=(active)=>{

  const aiPlay=(u)=>{

          <ellipse cx={cx-2*s} cy={y0+10.5*s} rx={1.2*s} ry={0.5*s} fill="#667788"/>
          {/* Right leg */}
          <line x1={cx+1.5*s} y1={y0+5*s} x2={cx+3.5*s} y2={y0+8*s} stroke="#778899" strokeWidth={1.5*s} strokeLinecap="round"/>
          <line x1={cx+3.5*s} y1={y0+8*s} x2={cx+2*s} y2={y0+10.5*s} stroke="#778899" strokeWidth={1.2*s} strokeLinecap="round"/>
          <ellipse cx={cx+2*s} cy={y0+10.5*s} rx={1.2*s} ry={0.5*s} fill="#667788"/>
        </g>;
      default:return <rect key={k+"d"} x={cx-3*s} y={y0+1*s} width={6*s} height={6*s} rx={1*s} fill="#888" stroke="#666" strokeWidth={0.2*s}/>;
    }
  };

  const showBoard=phase==="terr_p1"||phase==="terr_p2"||phase==="dep_units"||phase==="battle"||phase==="gameover";

  // POV: first-person view state
  const[povAngle,sPovAngle]=useState(0); // horizontal look direction in degrees
  const povDragRef=useRef(null);
  // Auto-face closest enemy when entering POV
  useEffect(()=>{
    if(!povMode)return;
    const u=mU||sel;if(!u||!u.dep||u.hp<=0)return;
    const enemies=all.filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep);
    if(enemies.length>0){
      let cd=1e9,tx=0,ty=0;for(const e of enemies){const d=Math.hypot(e.x-u.x,e.y-u.y);if(d<cd){cd=d;tx=e.x+BR;ty=e.y+BR;}}
      sPovAngle(Math.atan2(tx-(u.x+BR),-(ty-(u.y+BR)))*180/Math.PI);
    }
  },[povMode,mU,sel]);

  // FPS Renderer: projects scene from unit's eyes
  const renderFPS=()=>{
    const u=mU||sel;if(!u)return null;
    const ux=u.x+BR,uy=u.y+BR,eyeH=unitTotalH(u);
    const VW=620,VH=360,FOV=90,HALF_FOV=FOV/2;
    const angRad=povAngle*Math.PI/180;
    const maxDist=BW*1.5;
    const horizon=VH*0.42;
    const projS=(d)=>220/Math.max(1,d); // perspective scale

    // Collect objects
    const objs=[];
    for(const t of terr){
      const tcx=t.x+t.w/2,tcy=t.y+t.h/2;
      const dc=t.color.replace('#','');
      const r0=parseInt(dc.slice(0,2),16),g0=parseInt(dc.slice(2,4),16),b0=parseInt(dc.slice(4,6),16);
      objs.push({x:tcx,y:tcy,w:Math.max(t.w,t.h),h3d:t.h3d||16,alt:0,
        topC:t.color,frontC:`rgb(${Math.max(0,r0-40)},${Math.max(0,g0-40)},${Math.max(0,b0-40)})`,
        sideC:`rgb(${Math.max(0,r0-60)},${Math.max(0,g0-60)},${Math.max(0,b0-60)})`,
        kind:t.kind,type:"terr",tex:t.tex});
    }
    for(const e of all.filter(x=>x.dep&&x.hp>0&&x.id!==u.id)){
      const isE=e.pl!==u.pl;
      objs.push({x:e.x+BR,y:e.y+BR,w:BASE*1.2,h3d:unitH(e),alt:e.alt||0,
        topC:isE?"#cc2222":"#2255aa",frontC:isE?"#aa1111":"#113366",sideC:isE?"#881111":"#0a2244",
        kind:e.ic+e.name,type:"unit",isEnemy:isE});
    }

    // Project
    const projected=[];
    for(const o of objs){
      const dx=o.x-ux,dy=o.y-uy;
      const dist=Math.hypot(dx,dy);if(dist<2||dist>maxDist)continue;
      const objAng=Math.atan2(dx,-dy);
      let relAng=objAng-angRad;
      while(relAng>Math.PI)relAng-=2*Math.PI;
      while(relAng<-Math.PI)relAng+=2*Math.PI;
      const relDeg=relAng*180/Math.PI;
      if(Math.abs(relDeg)>HALF_FOV+15)continue;
      const sx=VW/2+relDeg/HALF_FOV*(VW/2);
      const ps=projS(dist);
      const topZ=o.alt+o.h3d,botZ=o.alt;
      const topY=horizon-(topZ-eyeH)*ps;
      const botY=horizon-(botZ-eyeH)*ps;
      const pH=Math.max(2,Math.abs(botY-topY));
      const pW=Math.max(4,o.w*ps);
      // Compute which face we see (left or right of center = side visible)
      const sideVis=relDeg>2?"right":relDeg<-2?"left":"front";
      projected.push({sx,topY:Math.min(topY,botY),pH,pW,dist,sideVis,...o});
    }
    projected.sort((a,b)=>b.dist-a.dist);

    return(
      <div style={{position:"relative",width:VW,maxWidth:"100%",height:VH,borderRadius:6,overflow:"hidden",border:"2px solid #f0c040",margin:"0 auto 6px",cursor:"ew-resize",background:"#000"}}
        onMouseDown={e=>{povDragRef.current={sx:e.clientX,oa:povAngle};}}
        onMouseMove={e=>{if(!povDragRef.current)return;sPovAngle(povDragRef.current.oa+(e.clientX-povDragRef.current.sx)*0.5);}}
        onMouseUp={()=>{povDragRef.current=null;}}
        onMouseLeave={()=>{povDragRef.current=null;}}>
        {/* Sky gradient */}
        <div style={{position:"absolute",top:0,left:0,width:"100%",height:horizon,background:"linear-gradient(180deg,#050810 0%,#0a1525 40%,#1a3040 80%,#2a4050 100%)"}}/>
        {/* Ground gradient */}
        <div style={{position:"absolute",top:horizon,left:0,width:"100%",height:VH-horizon,background:"linear-gradient(180deg,#2a4a1a 0%,#1a3510 30%,#0f250a 70%,#050a03 100%)"}}/>

        {/* Projected 3D objects */}
        {projected.map((p,i)=>{
          const fadeO=Math.max(0.4,1-p.dist/(maxDist*0.6));
          const sideW=Math.max(2,p.pW*0.25);
          const isTerr=p.type==="terr";
          const isUnit=p.type==="unit";
          return(<React.Fragment key={i}>
            {/* FRONT FACE — main visible face */}
            <div style={{position:"absolute",left:p.sx-p.pW/2,top:p.topY,width:p.pW,height:p.pH,
              background:p.frontC,opacity:fadeO,
              borderTop:`1px solid ${p.topC}`,
              borderBottom:"1px solid rgba(0,0,0,0.5)",
              overflow:"hidden"}}>
              {/* Texture details on terrain */}
              {isTerr&&p.tex==="forest"&&<>
                <div style={{position:"absolute",bottom:0,left:"20%",width:"8%",height:"60%",background:"#3a2510"}}/>
                <div style={{position:"absolute",bottom:0,left:"55%",width:"7%",height:"50%",background:"#3a2510"}}/>
                <div style={{position:"absolute",top:"5%",left:"10%",width:"30%",height:"40%",borderRadius:"50%",background:"#1a5a10"}}/>
                <div style={{position:"absolute",top:"10%",left:"45%",width:"25%",height:"35%",borderRadius:"50%",background:"#1a6a15"}}/>
              </>}
              {isTerr&&p.tex==="house"&&<>
                <div style={{position:"absolute",top:"15%",left:"15%",width:"20%",height:"25%",background:"#FFFACD",border:"1px solid #8B7355"}}/>
                <div style={{position:"absolute",top:"15%",left:"60%",width:"20%",height:"25%",background:"#FFFACD",border:"1px solid #8B7355"}}/>
                <div style={{position:"absolute",bottom:0,left:"35%",width:"25%",height:"40%",background:"#5C3317",borderRadius:"4px 4px 0 0"}}/>
              </>}
              {isTerr&&p.tex==="tower"&&<>
                <div style={{position:"absolute",top:"50%",left:"40%",width:"20%",height:"18%",background:"#0a0a1e"}}/>
              </>}
              {isTerr&&p.tex==="wall"&&Array.from({length:3}).map((_,r)=>
                <div key={r} style={{position:"absolute",top:r*33+"%",left:r%2?"10%":"0",width:"100%",height:"30%",borderBottom:"1px solid rgba(0,0,0,0.2)",borderRight:"1px solid rgba(0,0,0,0.1)"}}/>
              )}
              {/* Label */}
              {p.pW>25&&<div style={{position:"absolute",bottom:1,left:0,width:"100%",textAlign:"center",fontSize:Math.max(6,Math.min(10,p.pW*0.15)),color:"#fff",textShadow:"0 0 3px #000",fontWeight:700}}>{p.kind}</div>}
            </div>
            {/* TOP FACE — visible when object is below eye level */}
            {p.topY>horizon-p.pH&&isTerr&&<div style={{position:"absolute",
              left:p.sx-p.pW/2,top:p.topY-Math.max(1,p.pW*0.15),width:p.pW,height:Math.max(1,p.pW*0.15),
              background:p.topC,opacity:fadeO*0.9}}/>}
            {/* SIDE FACE — gives depth */}
            {isTerr&&<div style={{position:"absolute",
              left:p.sideVis==="right"?p.sx+p.pW/2:p.sx-p.pW/2-sideW,
              top:p.topY,width:sideW,height:p.pH,
              background:p.sideC,opacity:fadeO*0.85}}/>}
            {/* Unit glow */}
            {isUnit&&<div style={{position:"absolute",left:p.sx-p.pW/2-2,top:p.topY-2,width:p.pW+4,height:p.pH+4,
              border:p.isEnemy?"2px solid #ff4444":"2px solid #4488ff",
              borderRadius:3,boxShadow:p.isEnemy?"0 0 8px #ff4444":"0 0 6px #4488ff",
              opacity:fadeO*0.7,pointerEvents:"none"}}/>}
          </React.Fragment>);
        })}

        {/* Crosshair */}
        <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}>
          <line x1={VW/2-10} y1={horizon} x2={VW/2+10} y2={horizon} stroke="#f0c040" strokeWidth={1.5} opacity={0.6}/>
          <line x1={VW/2} y1={horizon-10} x2={VW/2} y2={horizon+10} stroke="#f0c040" strokeWidth={1.5} opacity={0.6}/>
          <circle cx={VW/2} cy={horizon} r={15} fill="none" stroke="#f0c040" strokeWidth={0.5} opacity={0.3}/>
        </svg>
        {/* HUD */}
        <div style={{position:"absolute",bottom:4,left:0,width:"100%",textAlign:"center",color:"#f0c040",fontSize:10,fontWeight:700,textShadow:"0 0 4px #000"}}>
          {u.ic} {u.name} | PA:{u.act} | PV:{u.hp} | {(((povAngle%360)+360)%360).toFixed(0)}°
        </div>
        <div style={{position:"absolute",top:4,left:8,color:"#aaa",fontSize:9}}>Glisser pour tourner</div>
      </div>
    );
  };

  // Board orbit (right-click drag = turntable), pan (shift+right or middle), zoom (scroll)
  const onBoardMouseDown=(e)=>{
    if(e.button===2||e.button===1){
      e.preventDefault();
      const mode=(e.shiftKey||e.button===1)?"pan":"orbit";
      dragRef.current={sx:e.clientX,sy:e.clientY,orx:rotRef.current.rx,ory:rotRef.current.ry,opx:panRef.current.x,opy:panRef.current.y,mode};
    }
  };
  const onBoardMouseMove=(e)=>{
    if(!dragRef.current)return;
    const dx=e.clientX-dragRef.current.sx, dy=e.clientY-dragRef.current.sy;
    if(dragRef.current.mode==="orbit"){
      // Turntable: horizontal mouse = rotate Y (spin), vertical = tilt X (limited)
      rotRef.current={rx:Math.max(0,Math.min(90,dragRef.current.orx-dy*0.3)),ry:dragRef.current.ory+dx*0.5};
      sCamSt({rx:rotRef.current.rx,ry:rotRef.current.ry,z:zoomRef.current,px:panRef.current.x,py:panRef.current.y});
    } else {
      panRef.current={x:dragRef.current.opx+dx,y:dragRef.current.opy+dy};
      sCamSt({rx:rotRef.current.rx,ry:rotRef.current.ry,z:zoomRef.current,px:panRef.current.x,py:panRef.current.y});
    }
  };
  const onBoardMouseUp=(e)=>{if(e.button===2||e.button===1)dragRef.current=null;};
  const onBoardWheel=(e)=>{
    e.preventDefault();
    const d=e.deltaY>0?-0.08:0.08;
    zoomRef.current=Math.max(0.3,Math.min(3,zoomRef.current+d));
    sCamSt({rx:rotRef.current.rx,ry:rotRef.current.ry,z:zoomRef.current,px:panRef.current.x,py:panRef.current.y});
  };
  const resetView=()=>{panRef.current={x:0,y:0};zoomRef.current=1;rotRef.current={rx:30,ry:0};sCamSt({rx:30,ry:0,z:1,px:0,py:0});};

  /* ═══ RENDER ═══ */
  return(
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#e6edf3",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* HEADER */}
      <div style={{background:"#161b22",padding:"8px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"3px solid #f0c040",flexWrap:"wrap"}}>
        <span style={{fontSize:20,fontWeight:900,color:"#f0c040",letterSpacing:2}}>🧱 CROSSBLOCK</span>
        <div style={{display:"flex",gap:2}}>
          {[["army","Armées"],["battle","Bataille"],["sim","Simulation"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"4px 12px",border:"none",borderRadius:"5px 5px 0 0",fontWeight:700,cursor:"pointer",fontSize:10,background:tab===k?"#f0c040":"#21262d",color:tab===k?"#000":"#8b949e"}}>{l}</button>
          ))}
          {isAdm&&<button onClick={()=>setTab("tips")} style={{padding:"4px 12px",border:"none",borderRadius:"5px 5px 0 0",fontWeight:700,cursor:"pointer",fontSize:10,background:tab==="tips"?"#f0c040":"#21262d",color:tab==="tips"?"#000":"#8b949e"}}>Balance</button>}
          {!isAdm&&<button onClick={()=>{var p=prompt("Mot de passe admin:");if(p==="crossblocks123"){sIsAdm(true);aL("Admin débloqué — onglet Balance visible");}else if(p!==null)aL("Mot de passe incorrect");}} style={{padding:"4px 8px",border:"none",borderRadius:"5px 5px 0 0",cursor:"pointer",fontSize:10,background:"#21262d",color:"#484f58"}}>Admin</button>}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
          {phase==="battle"&&gMode==="ai"&&<button onClick={togglePause} style={{...BS(paused?"#238636":"#b35900"),fontSize:11,padding:"5px 12px"}}>{paused?"RELANCER":"PAUSE"}</button>}
          {phase==="battle"&&(gMode==="pvp"||gMode==="pve")&&<span style={{color:curP===1?"#58a6ff":"#f85149",fontWeight:900,fontSize:13}}>→J{curP}{isHuman(curP)?" (vous)":gMode==="pve"?" (IA)":""} T{turn}</span>}
          {phase==="battle"&&(paused||isHuman(curP))&&<button onClick={doUndo} disabled={!undoStack.current.length} style={{...BS("#30363d"),fontSize:11,padding:"5px 10px",opacity:undoStack.current.length?1:0.4}}>ANNULER</button>}
          {phase==="battle"&&<button onClick={()=>sPovMode(p=>!p)} style={{...BS(povMode?"#f0c040":"#30363d"),color:povMode?"#000":"#e6edf3",fontSize:11,padding:"5px 10px"}}>{povMode?"VUE LIBRE":"VUE 1P"}</button>}
          {phase!=="setup"&&<button onClick={saveGame} style={{...BS("#1f6feb"),fontSize:11,padding:"5px 10px"}}>SAUVER</button>}
          <button onClick={loadGame} style={{...BS("#30363d"),fontSize:11,padding:"5px 10px"}}>CHARGER</button>
          {phase!=="setup"&&<button onClick={resetGame} style={{...BS("#6e1010"),fontSize:11,padding:"5px 10px"}}>NOUVELLE PARTIE</button>}
        </div>
      </div>

      {/* ═══ BALANCE TAB ═══ */}
      {tab==="tips"&&isAdm&&(()=>{
        const ud=balUnitData(balArm);
        const vd=balVehData(balArm);
        const maxVal=Math.max(...ud.map(u=>u.value),1);
        /* SVG mini-chart */
        const svgChart=(cw,ch,datasets,xMax,yMax,labels)=>{
          const px2=(x)=>20+x/(xMax||1)*(cw-30);
          const py2=(y)=>ch-18-y/(yMax||1)*(ch-28);
          const cols=["#f0c040","#f85149","#888","#3fb950","#5588cc"];
          return(<svg width={cw} height={ch} style={{background:"#0d1117",borderRadius:4}}>
            {[0.25,0.5,0.75,1].map(f=><line key={"g"+f} x1={20} y1={py2(yMax*f)} x2={cw-4} y2={py2(yMax*f)} stroke="#222" strokeDasharray="3,3"/>)}
            {[0.25,0.5,0.75,1].map(f=><text key={"t"+f} x={2} y={py2(yMax*f)+3} fill="#666" fontSize={7}>{Math.round(yMax*f)}</text>)}
            <line x1={20} y1={ch-18} x2={cw-4} y2={ch-18} stroke="#444"/>
            <line x1={20} y1={10} x2={20} y2={ch-18} stroke="#444"/>
            {[0,0.25,0.5,0.75,1].map(f=><text key={"x"+f} x={px2(xMax*f)} y={ch-6} fill="#666" fontSize={7} textAnchor="middle">{Math.round(xMax*f)}</text>)}
            {datasets.map((ds,di)=><polyline key={di} fill="none" stroke={cols[di%cols.length]} strokeWidth={di===0?2:1.5}
              strokeDasharray={di>=2?"4,2":"none"}
              points={ds.map(([x,y])=>`${px2(x)},${py2(y)}`).join(" ")}/>)}
            {labels&&labels.map((l,i)=><g key={i}>
              <line x1={cw-90} y1={8+i*10} x2={cw-78} y2={8+i*10} stroke={cols[i%cols.length]} strokeWidth={2} strokeDasharray={i>=2?"4,2":"none"}/>
              <text x={cw-75} y={11+i*10} fill={cols[i%cols.length]} fontSize={7}>{l}</text>
            </g>)}
          </svg>);
        };
        // Lanchester curve data
        const lancData=[];for(let n=1;n<=20;n++)lancData.push([n,n*n]);
        const lancLin=[];for(let n=1;n<=20;n++)lancLin.push([n,n]);

        // HP cost curve

        const hpExp=[];for(let h=1;h<=12;h++)hpExp.push([h,Math.round(100*Math.pow(h,1.5))]);
        const hpArm=[];for(let h=1;h<=12;h++)hpArm.push([h,Math.round(100*Math.pow(h,1.7))]);
        // Parade table
        const paradeRows=[
          {n:"Tri-Droïde",arm:6},{n:"TR-TT",arm:10},{n:"B2/Fives",arm:11},
          {n:"Rex/Véh.",arm:12},{n:"Clones",arm:15},{n:"Garde",arm:16},
          {n:"Rebelles",arm:17},{n:"B1",arm:18}
        ];
        const pens=[3,4,5,6,7,10];
        // Proposed
        const proposed=[
          {n:"Clone Ph.2",o:200,p:200,r:"Référence"},
          {n:"Clone Geo",o:230,p:210,r:"Quasi = Clone"},
          {n:"Sniper",o:260,p:220,r:"1 dé = aléatoire"},
          {n:"Clone Spéc.",o:250,p:210,r:"dbl_f sous-performe"},
          {n:"Officier",o:270,p:240,r:"Pistolet moyen"},
          {n:"Airborne",o:270,p:280,r:"Parachutage fort"},
          {n:"Fives",o:430,p:"500★",r:"arm→11, hp→3"},
          {n:"Rex",o:400,p:400,r:"Inchangé"},

        ];
        const S={fontSize:10,color:"#e6edf3"};const H={fontSize:11,color:"#f0c040",margin:"0 0 6px",fontWeight:700};
        const C={background:"#161b22",border:"1px solid #30363d",borderRadius:6,padding:10,marginBottom:10};
        const subBS=(a)=>({padding:"3px 10px",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",
          fontSize:9,background:balTab===a?"#f0c040":"#21262d",color:balTab===a?"#000":"#8b949e"});
        return(
        <div style={{padding:12,maxWidth:800,margin:"0 auto"}}>
          <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
            {[["theory","📐 Théorie"],["curves","📈 Courbes"],["parade","🛡 Parade"],["units","🪖 Valeur"],["propose","🔧 Rééquilibrage"]].map(([k,l])=>(
              <button key={k} onClick={()=>sBalTab(k)} style={subBS(k)}>{l}</button>

          </div>

          {/* ── THEORY ── */}
          {balTab==="theory"&&<div>
            <div style={C}>
              <p style={H}>🎯 Pourquoi 1000 soldats à 1PV battent 1 monstre à 1000PV ?</p>
              <p style={S}>Imagine deux armées à coût égal :</p>
              <p style={{...S,color:"#f85149",fontWeight:700}}>• Armée A : 1 monstre — 10 PV, 1 arme</p>
              <p style={{...S,color:"#3fb950",fontWeight:700}}>• Armée B : 10 soldats — 1 PV, 1 arme chacun</p>
              <div style={{background:"#0d1117",borderRadius:4,padding:8,margin:"8px 0",fontSize:10}}>
                <p style={{color:"#f0c040",margin:"2px 0"}}>Tour 1 : Monstre tire 1× → tue 1 soldat. 10 soldats tirent 10× → ~5 dégâts au monstre.</p>
                <p style={{color:"#f0c040",margin:"2px 0"}}>Tour 2 : Monstre (5PV) tire 1× → tue 1. Les 9 restants tirent 9× → tuent le monstre.</p>
                <p style={{color:"#3fb950",fontWeight:700,margin:"4px 0 0"}}>→ Score : monstre tue 2 soldats. 8 survivants. Victoire écrasante de la masse.</p>
              </div>
            </div>
            <div style={C}>
              <p style={H}>📐 La Loi de Lanchester (1916)</p>
              <p style={S}>Pour le combat à distance, la puissance de combat = <b style={{color:"#f0c040"}}>N² × P</b></p>

  const x=t.x,y=t.y,w=t.w,h=t.h;
  const topC=hex(t.c,1.25), midC=hex(t.c,0.80), frtC=hex(t.c,0.65), sideC=hex(t.c,0.45);
  const topPts=`${x},${y-ISO} ${x+w},${y-ISO} ${x+w},${y+h-ISO} ${x},${y+h-ISO}`;
  const frtPts=`${x},${y+h-ISO} ${x+w},${y+h-ISO} ${x+w},${y+h} ${x},${y+h}`;

  const glow=sel?"drop-shadow(0 0 6px #ff0) drop-shadow(0 0 12px #ff0)":"drop-shadow(0 6px 10px rgba(0,0,0,0.75))";
  return(
  <g key={t.id} onClick={e=>{if(phase.startsWith("terr")){e.stopPropagation();sTSel(t.id);}}} style={{filter:glow}}>
    {/* ─── OMBRE AU SOL ─── */}
    <ellipse cx={x+w/2} cy={y+h+3} rx={w*0.52} ry={ISO*0.3} fill="rgba(0,0,0,0.45)"/>

    {/* ─── DÉTAILS TOIT selon type ─── */}
    {t.tex==="house"&&<polygon points={`${x-2},${y-ISO} ${x+w+2},${y-ISO} ${x+w/2},${y-ISO-14}`} fill="#8B4513" stroke="#5a2a0a" strokeWidth={0.8}/>}
    {t.tex==="house"&&<polygon points={`${x-2},${y-ISO} ${x+w/2},${y-ISO-14} ${x+w/2},${y+h-ISO-14} ${x-2},${y+h-ISO}`} fill={hex("#8B4513",0.7)} stroke="#5a2a0a" strokeWidth={0.5}/>}
    {t.tex==="tower"&&[0,1,2,3,4].map(i=><rect key={"cren"+i} x={x+i*w/5+0.5} y={y-ISO-7} width={w/5-2} height={7} fill={topC} stroke="rgba(0,0,0,0.3)" strokeWidth={0.4} rx={0.5}/>)}
    {t.tex==="wall"&&[0,1,2,3].map(i=><rect key={"wc"+i} x={x+i*w/4+1} y={y-ISO-5} width={w/4-3} height={5} fill={topC} stroke="rgba(0,0,0,0.3)" strokeWidth={0.3} rx={0.5}/>)}
    {t.tex==="rock"&&<polygon points={`${x+w*0.1},${y-ISO} ${x+w*0.38},${y-ISO-9} ${x+w*0.62},${y-ISO-5} ${x+w*0.85},${y-ISO-11} ${x+w},${y-ISO} ${x+w},${y+h-ISO} ${x},${y+h-ISO}`} fill={topC} opacity={0.93}/>}
    {t.tex==="forest"&&[0.15,0.5,0.85].map((xf,i)=>[

      <polygon key={"fc"+i} points={`${x+w*xf},${y-ISO-22} ${x+w*xf-8},${y-ISO-6} ${x+w*xf+8},${y-ISO-6}`} fill="#1a7a1a"/>,
      <polygon key={"fc2"+i} points={`${x+w*xf},${y-ISO-30} ${x+w*xf-5},${y-ISO-18} ${x+w*xf+5},${y-ISO-18}`} fill="#228B22"/>,
    ])}
    {t.tex==="ruin"&&<>
      <rect x={x+1} y={y-ISO} width={w*0.32} height={ISO*0.7} fill={midC} stroke="rgba(0,0,0,0.35)" strokeWidth={0.5}/>
      <rect x={x+w*0.58} y={y-ISO} width={w*0.38} height={ISO*0.85} fill={midC} stroke="rgba(0,0,0,0.35)" strokeWidth={0.5}/>
      <polygon points={`${x+w*0.28},${y+h-ISO} ${x+w*0.48},${y+h-ISO*0.5} ${x+w*0.62},${y+h-ISO}`} fill={hex(t.c,0.55)} opacity={0.8}/>
    </>}
    {t.tex==="crater"&&<>
      <ellipse cx={x+w/2} cy={y+h/2-ISO/2} rx={w*0.45} ry={h*0.38} fill={hex(t.c,0.35)} stroke={hex(t.c,0.5)} strokeWidth={1}/>
      <ellipse cx={x+w/2} cy={y+h/2-ISO/2} rx={w*0.28} ry={h*0.22} fill={hex(t.c,0.25)}/>
    </>}
    {t.tex==="wreck"&&<>
      <rect x={x+3} y={y-ISO+2} width={w-6} height={ISO*0.5} fill={hex("#445566",0.8)} rx={2}/>

      <line x1={x+5} y1={y-ISO+3} x2={x+w-5} y2={y-ISO+8} stroke="rgba(255,100,50,0.4)" strokeWidth={1.5}/>
