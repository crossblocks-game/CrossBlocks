    const k = `${bt}_${~~cx}_${~~y0}`;

    // ═══ FIGURE PARTS — clearly humanoid silhouette ═══
    const parts = [];

    // ── LEGS (gives clear body shape) ──
    parts.push(
      <rect key={k+"_lL"} x={cx-1.7*s} y={y0+5.5*s} width={1.5*s} height={4*s} fill={c.armor} stroke="#000" strokeWidth={0.2*s} rx={0.3*s}/>,
      <rect key={k+"_lR"} x={cx+0.2*s} y={y0+5.5*s} width={1.5*s} height={4*s} fill={c.armor} stroke="#000" strokeWidth={0.2*s} rx={0.3*s}/>,
      // feet
      <ellipse key={k+"_fL"} cx={cx-0.95*s} cy={y0+9.7*s} rx={0.9*s} ry={0.4*s} fill="#000"/>,
      <ellipse key={k+"_fR"} cx={cx+0.95*s} cy={y0+9.7*s} rx={0.9*s} ry={0.4*s} fill="#000"/>
    );

    // ── TORSO (trapezoidal, NOT a cube) ──
    parts.push(
      <polygon key={k+"_torso"}
        points={`${cx-2.4*s},${y0+2*s} ${cx+2.4*s},${y0+2*s} ${cx+2*s},${y0+5.5*s} ${cx-2*s},${y0+5.5*s}`}
        fill={c.body} stroke="#000" strokeWidth={0.25*s}/>,
      // chest plate detail
      <polygon key={k+"_chest"}
        points={`${cx-2*s},${y0+2.3*s} ${cx+2*s},${y0+2.3*s} ${cx+1.7*s},${y0+4.5*s} ${cx-1.7*s},${y0+4.5*s}`}
        fill={c.armor} stroke={c.armor} strokeWidth={0.1*s}/>,
      // belt
      <rect key={k+"_belt"} x={cx-2.2*s} y={y0+4.8*s} width={4.4*s} height={0.5*s} fill="#1a1a1a"/>
    );

    // ── ARMS (slim, clearly not cube) ──
    parts.push(
      <ellipse key={k+"_aL"} cx={cx-2.8*s} cy={y0+3.5*s} rx={0.7*s} ry={1.7*s} fill={c.body} stroke="#000" strokeWidth={0.18*s}/>,
      <ellipse key={k+"_aR"} cx={cx+2.8*s} cy={y0+3.5*s} rx={0.7*s} ry={1.7*s} fill={c.body} stroke="#000" strokeWidth={0.18*s}/>,
      // forearms
      <ellipse key={k+"_aLf"} cx={cx-2.6*s} cy={y0+5.5*s} rx={0.6*s} ry={1.2*s} fill={c.armor} stroke="#000" strokeWidth={0.15*s}/>,
      <ellipse key={k+"_aRf"} cx={cx+2.6*s} cy={y0+5.5*s} rx={0.6*s} ry={1.2*s} fill={c.armor} stroke="#000" strokeWidth={0.15*s}/>
    );

    // ── HEAD ──
    if (isDroid) {
      // Droid head - sphere
      parts.push(
        <circle key={k+"_dh"} cx={cx} cy={y0+0.5*s} r={1.6*s} fill={c.helmet} stroke="#000" strokeWidth={0.2*s}/>,
        <ellipse key={k+"_dme"} cx={cx} cy={y0+1.2*s} rx={1*s} ry={0.3*s} fill="#1a1a1a"/>,
        <circle key={k+"_de1"} cx={cx-0.55*s} cy={y0+0.2*s} r={0.4*s} fill="#1a1a2e"/>,
        <circle key={k+"_de2"} cx={cx+0.55*s} cy={y0+0.2*s} r={0.4*s} fill="#1a1a2e"/>,
        <circle key={k+"_dg1"} cx={cx-0.45*s} cy={y0+0.05*s} r={0.12*s} fill="#ffaa00"/>,
        <circle key={k+"_dg2"} cx={cx+0.45*s} cy={y0+0.05*s} r={0.12*s} fill="#ffaa00"/>
      );
    } else if (bt === "vader" || bt === "kylo") {
      // Dark side helmet - distinctive silhouette
      parts.push(
        <path key={k+"_dh"} d={`M${cx-2*s},${y0+1.8*s} L${cx-2*s},${y0+0.2*s} Q${cx-2*s},${y0-1.7*s} ${cx},${y0-2*s} Q${cx+2*s},${y0-1.7*s} ${cx+2*s},${y0+0.2*s} L${cx+2*s},${y0+1.8*s} Z`}
          fill="#0a0a0a" stroke="#222" strokeWidth={0.25*s}/>,
        <path key={k+"_dvi"} d={`M${cx-1.5*s},${y0-0.2*s} L${cx-0.7*s},${y0+0.8*s} L${cx+0.7*s},${y0+0.8*s} L${cx+1.5*s},${y0-0.2*s}`}
          fill="#000033" opacity={0.85}/>,
        // grill
        <rect key={k+"_dg"} x={cx-1*s} y={y0+1.1*s} width={2*s} height={0.5*s} fill="#1a1a1a" rx={0.1*s}/>
      );
    } else if (bt === "yoda") {
      // Yoda - distinctive ears
      parts.push(
        <circle key={k+"_yh"} cx={cx} cy={y0+0.5*s} r={1.7*s} fill="#5a8a3a" stroke="#3a6a2a" strokeWidth={0.2*s}/>,
        <ellipse key={k+"_yeL"} cx={cx-1.8*s} cy={y0-0.2*s} rx={0.5*s} ry={1.2*s} fill="#5a8a3a" stroke="#3a6a2a" strokeWidth={0.15*s}/>,
        <ellipse key={k+"_yeR"} cx={cx+1.8*s} cy={y0-0.2*s} rx={0.5*s} ry={1.2*s} fill="#5a8a3a" stroke="#3a6a2a" strokeWidth={0.15*s}/>,
        <circle key={k+"_y1"} cx={cx-0.5*s} cy={y0+0.4*s} r={0.25*s} fill="#1a3a1a"/>,
        <circle key={k+"_y2"} cx={cx+0.5*s} cy={y0+0.4*s} r={0.25*s} fill="#1a3a1a"/>
      );
    } else if (bt === "chewie") {
      // Chewbacca - furry head
      parts.push(
        <ellipse key={k+"_ch"} cx={cx} cy={y0+0.5*s} rx={1.9*s} ry={2*s} fill="#8B6040" stroke="#6B4020" strokeWidth={0.22*s}/>,
        <circle key={k+"_ce1"} cx={cx-0.7*s} cy={y0+0.2*s} r={0.35*s} fill="#3a2010"/>,
        <circle key={k+"_ce2"} cx={cx+0.7*s} cy={y0+0.2*s} r={0.35*s} fill="#3a2010"/>,
        <ellipse key={k+"_cm"} cx={cx} cy={y0+1.2*s} rx={0.5*s} ry={0.2*s} fill="#3a2010"/>
      );
    } else if (bt === "ahsoka") {
      // Ahsoka - togruta with head-tails
      parts.push(
        <ellipse key={k+"_ah"} cx={cx} cy={y0+0.5*s} rx={1.6*s} ry={1.8*s} fill="#CC8855" stroke="#aa6644" strokeWidth={0.2*s}/>,
        <line key={k+"_ah1"} x1={cx-0.6*s} y1={y0-1.5*s} x2={cx-1.2*s} y2={y0-3.5*s} stroke="#4455AA" strokeWidth={0.7*s} strokeLinecap="round"/>,
        <line key={k+"_ah2"} x1={cx+0.6*s} y1={y0-1.5*s} x2={cx+1.2*s} y2={y0-3.5*s} stroke="#4455AA" strokeWidth={0.7*s} strokeLinecap="round"/>,
        <circle key={k+"_a1"} cx={cx-0.55*s} cy={y0+0.4*s} r={0.25*s} fill="#1a2a44"/>,
        <circle key={k+"_a2"} cx={cx+0.55*s} cy={y0+0.4*s} r={0.25*s} fill="#1a2a44"/>
      );
    } else {
      // Standard human / clone head
      const headBase = facKey === "cl" || facKey === "rep" || facKey === "emp" || facKey === "mando" || facKey === "fo";
      if (headBase) {
        // Helmeted head (Clone, Stormtrooper, Mando)
        parts.push(
          <path key={k+"_hh"} d={`M${cx-1.9*s},${y0+1.8*s} Q${cx-2*s},${y0-1.5*s} ${cx},${y0-1.8*s} Q${cx+2*s},${y0-1.5*s} ${cx+1.9*s},${y0+1.8*s} Z`}
            fill={c.helmet} stroke="#000" strokeWidth={0.2*s}/>,
          // T-visor
          <path key={k+"_hv"} d={`M${cx-1.4*s},${y0-0.2*s} L${cx-0.8*s},${y0+0.7*s} L${cx+0.8*s},${y0+0.7*s} L${cx+1.4*s},${y0-0.2*s}`}
            fill="#001144" stroke="rgba(100,180,255,0.4)" strokeWidth={0.1*s}/>,
          // helmet detail
          <rect key={k+"_hd"} x={cx-0.4*s} y={y0-1.7*s} width={0.8*s} height={0.5*s} fill="#888" rx={0.1*s}/>
        );
      } else {
        // Bare human head
        parts.push(
          <circle key={k+"_hh"} cx={cx} cy={y0+0.3*s} r={1.7*s} fill={c.head} stroke="#aa7744" strokeWidth={0.18*s}/>,
          // hair
          <path key={k+"_hr"} d={`M${cx-1.7*s},${y0+0.1*s} Q${cx},${y0-2*s} ${cx+1.7*s},${y0+0.1*s}`}
            fill="#3a2010" stroke="none"/>,
          <circle key={k+"_e1"} cx={cx-0.6*s} cy={y0+0.3*s} r={0.25*s} fill="#1a1218"/>,
          <circle key={k+"_e2"} cx={cx+0.6*s} cy={y0+0.3*s} r={0.25*s} fill="#1a1218"/>,
          <ellipse key={k+"_m"} cx={cx} cy={y0+1.1*s} rx={0.4*s} ry={0.15*s} fill="#aa5544"/>
        );
      }
    }

    // ── WEAPON / SABER (in right hand) ──
    if (hasSaber) {
      // Lightsaber blade with glow
      const bladeX1 = cx + 2.6*s, bladeY1 = y0 + 5*s;
      const bladeX2 = cx + 4*s,   bladeY2 = y0 - 2*s;
      // Glow halo
      parts.push(
        <line key={k+"_sblg"} x1={bladeX1} y1={bladeY1} x2={bladeX2} y2={bladeY2}
          stroke={saberCol} strokeWidth={2.5*s} strokeLinecap="round" opacity={0.35}/>,
        // Blade core
        <line key={k+"_sbl"} x1={bladeX1} y1={bladeY1} x2={bladeX2} y2={bladeY2}
          stroke={saberCol} strokeWidth={1.2*s} strokeLinecap="round" opacity={0.95}/>,
        // White core
        <line key={k+"_sblc"} x1={bladeX1} y1={bladeY1} x2={bladeX2} y2={bladeY2}
          stroke="#ffffff" strokeWidth={0.4*s} strokeLinecap="round" opacity={0.9}/>,
        // Hilt
        <rect key={k+"_sh"} x={cx+2.4*s} y={y0+4.8*s} width={0.5*s} height={1*s} fill="#888" stroke="#444" strokeWidth={0.1*s} rx={0.1*s}/>
      );
    } else {
      // Blaster
      parts.push(
        <rect key={k+"_w1"} x={cx+2.6*s} y={y0+4.8*s} width={2.5*s} height={0.7*s} fill={c.weapon} stroke="#000" strokeWidth={0.15*s} rx={0.2*s}/>,
        <rect key={k+"_w2"} x={cx+5*s} y={y0+4.6*s} width={0.6*s} height={1.1*s} fill={c.weapon} stroke="#000" strokeWidth={0.12*s} rx={0.1*s}/>
      );
    }

    // ── JETPACK (behind torso) ──
    if (hasJetpack) {
      parts.unshift(  // unshift = put behind everything else
        <rect key={k+"_jp"} x={cx-1.5*s} y={y0+2.2*s} width={3*s} height={3*s} fill="#445566" stroke="#000" strokeWidth={0.2*s} rx={0.3*s}/>,
        <line key={k+"_jf1"} x1={cx-0.7*s} y1={y0+5*s} x2={cx-0.5*s} y2={y0+7*s} stroke="#ff6600" strokeWidth={0.5*s}/>,
        <line key={k+"_jf2"} x1={cx+0.7*s} y1={y0+5*s} x2={cx+0.5*s} y2={y0+7*s} stroke="#ff6600" strokeWidth={0.5*s}/>
      );
    }

    // ── CAPE (behind everything) ──
    if (hasCape) {
      parts.unshift(
        <path key={k+"_cape"}
          d={`M${cx-2.5*s},${y0+2*s} L${cx-3.5*s},${y0+9*s} L${cx+3.5*s},${y0+9*s} L${cx+2.5*s},${y0+2*s} Z`}
          fill={bt==="yoda"?"#553322":"#1a1a1a"} opacity={0.85}/>
      );
    }

    return <g key={k+"_g"}>{parts}</g>;
  };

    /* ─── Prone figure (flattened, seen from above) ─── */
  const drawProne=(type,cx,y0,s,pl)=>{
    const c=UDEFS[type]?.co||"#888";const fac=UDEFS[type]?.fac||"cl";
    const bodyCol=fac==="cl"?"#e0e0e0":fac==="sep"?"#C4A65A":"#8B6C42";
    const helmCol=fac==="cl"?"#ddd":fac==="sep"?(type==="b2"?"#6a6a6a":"#C4A65A"):"#775533";
    return <g key={`pr_${cx}_${y0}`}>
      <ellipse cx={cx} cy={y0+2*s} rx={3.5*s} ry={1.2*s} fill={bodyCol} stroke="#444" strokeWidth={0.2*s} opacity={0.85}/>
      <ellipse cx={cx} cy={y0+0.6*s} rx={1.8*s} ry={1.2*s} fill={helmCol} stroke="#555" strokeWidth={0.2*s}/>
      <ellipse cx={cx} cy={y0+0.6*s} rx={1*s} ry={0.7*s} fill="#1a1a2e" opacity={0.5}/>
      <line x1={cx+2.5*s} y1={y0+1.5*s} x2={cx+5*s} y2={y0+0.5*s} stroke="#556" strokeWidth={0.5*s} strokeLinecap="round"/>
    </g>;
  };

  /* ─── Vehicle SVG (STAP, AV-7, CRAM/BARC, TR-TT/AT-RT) ─── */
  const drawVeh=(vt,cx,y0,s,pl,op)=>{
    const o=op||1;const k=`v_${vt}_${cx}_${y0}`;
    switch(vt){
      case"stap": /* Separatist STAP — thin hovering platform, twin cannons */
        return <g key={k} opacity={o}>
          {/* Main body / spine */}
          <rect x={cx-1.2*s} y={y0+1*s} width={2.4*s} height={8*s} rx={0.6*s} fill="#AA7733" stroke="#886622" strokeWidth={0.25*s}/>
          {/* Front wing/handlebars */}
          <ellipse cx={cx} cy={y0+1.5*s} rx={4*s} ry={1.2*s} fill="#997733" stroke="#886622" strokeWidth={0.2*s}/>
          {/* Twin cannon pods */}
          <rect x={cx-4.5*s} y={y0+0*s} width={1.5*s} height={2.5*s} rx={0.3*s} fill="#887744" stroke="#776633" strokeWidth={0.15*s}/>
          <rect x={cx+3*s} y={y0+0*s} width={1.5*s} height={2.5*s} rx={0.3*s} fill="#887744" stroke="#776633" strokeWidth={0.15*s}/>
          <circle cx={cx-3.75*s} cy={y0-0.2*s} r={0.4*s} fill="#f44"/>
          <circle cx={cx+3.75*s} cy={y0-0.2*s} r={0.4*s} fill="#f44"/>
          {/* Rear platform */}
          <ellipse cx={cx} cy={y0+7.5*s} rx={2.5*s} ry={0.8*s} fill="#886622" stroke="#775511" strokeWidth={0.15*s}/>
          {/* B1 droid pilot on top */}
          <circle cx={cx} cy={y0+4.2*s} r={1.2*s} fill="#C4A65A" stroke="#aa8844" strokeWidth={0.15*s}/>
          <circle cx={cx-0.3*s} cy={y0+4*s} r={0.2*s} fill="#111"/>
          <circle cx={cx+0.3*s} cy={y0+4*s} r={0.2*s} fill="#111"/>
          {/* Hover glow */}
          <ellipse cx={cx} cy={y0+9.5*s} rx={3*s} ry={0.6*s} fill="#88ccff" opacity={0.2}/>
        </g>;
      case"av7": /* Republic AV-7 cannon — heavy artillery, tripod legs */
        return <g key={k} opacity={o}>
          {/* Cannon barrel */}
          <rect x={cx-0.8*s} y={y0-2*s} width={1.6*s} height={5*s} rx={0.4*s} fill="#668899" stroke="#557788" strokeWidth={0.2*s}/>
          <circle cx={cx} cy={y0-2*s} r={0.9*s} fill="#556677" stroke="#446666" strokeWidth={0.2*s}/>
          {/* Turret housing */}
          <rect x={cx-3*s} y={y0+2.5*s} width={6*s} height={3*s} rx={0.8*s} fill="#5577AA" stroke="#446699" strokeWidth={0.25*s}/>
          {/* Tripod legs */}
          <line x1={cx-2*s} y1={y0+5.5*s} x2={cx-4.5*s} y2={y0+10*s} stroke="#5577AA" strokeWidth={1.2*s} strokeLinecap="round"/>
          <line x1={cx+2*s} y1={y0+5.5*s} x2={cx+4.5*s} y2={y0+10*s} stroke="#5577AA" strokeWidth={1.2*s} strokeLinecap="round"/>
          <line x1={cx} y1={y0+5.5*s} x2={cx} y2={y0+10*s} stroke="#5577AA" strokeWidth={1.2*s} strokeLinecap="round"/>
          {/* Feet */}
          <ellipse cx={cx-4.5*s} cy={y0+10*s} rx={0.8*s} ry={0.4*s} fill="#446688"/>
          <ellipse cx={cx+4.5*s} cy={y0+10*s} rx={0.8*s} ry={0.4*s} fill="#446688"/>
          <ellipse cx={cx} cy={y0+10*s} rx={0.8*s} ry={0.4*s} fill="#446688"/>
          {/* Clone pilot silhouette */}
          <rect x={cx-1.5*s} y={y0+3*s} width={3*s} height={2.2*s} rx={0.8*s} fill="#e8e8e8" stroke="#bbb" strokeWidth={0.15*s}/>
          <rect x={cx-0.8*s} y={y0+3.5*s} width={1.6*s} height={0.8*s} rx={0.2*s} fill="#1a1a2e" opacity={0.6}/>
        </g>;
      case"cram": /* BARC-type speeder (Motojet CRAM) — sleek flying speeder */
        return <g key={k} opacity={o}>
          {/* Nose / front */}
          <ellipse cx={cx} cy={y0+1*s} rx={1.5*s} ry={2*s} fill="#5599DD" stroke="#4488CC" strokeWidth={0.2*s}/>
          {/* Main body */}
          <rect x={cx-2.5*s} y={y0+2*s} width={5*s} height={5*s} rx={1*s} fill="#4488CC" stroke="#3377BB" strokeWidth={0.25*s}/>
          {/* Wings */}
          <polygon points={`${cx-2.5*s},${y0+3.5*s} ${cx-6*s},${y0+2*s} ${cx-5*s},${y0+4*s}`} fill="#3377BB" stroke="#2266AA" strokeWidth={0.2*s}/>
          <polygon points={`${cx+2.5*s},${y0+3.5*s} ${cx+6*s},${y0+2*s} ${cx+5*s},${y0+4*s}`} fill="#3377BB" stroke="#2266AA" strokeWidth={0.2*s}/>
          {/* Engine pods on wings */}
          <ellipse cx={cx-5.5*s} cy={y0+3*s} rx={1*s} ry={0.5*s} fill="#446699" stroke="#335588" strokeWidth={0.15*s}/>
          <ellipse cx={cx+5.5*s} cy={y0+3*s} rx={1*s} ry={0.5*s} fill="#446699" stroke="#335588" strokeWidth={0.15*s}/>
          {/* Rear section */}
          <rect x={cx-1.5*s} y={y0+6.5*s} width={3*s} height={2.5*s} rx={0.5*s} fill="#3366AA" stroke="#2255AA" strokeWidth={0.15*s}/>
          {/* Sniper mount (gunner) */}
          <line x1={cx} y1={y0+7*s} x2={cx} y2={y0+10*s} stroke="#446688" strokeWidth={0.8*s} strokeLinecap="round"/>
          {/* Clone pilot */}
          <rect x={cx-1.2*s} y={y0+2.5*s} width={2.4*s} height={1.8*s} rx={0.6*s} fill="#e8e8e8" stroke="#bbb" strokeWidth={0.15*s}/>
          <rect x={cx-0.7*s} y={y0+3*s} width={1.4*s} height={0.5*s} rx={0.15*s} fill="#1a1a2e" opacity={0.6}/>
          {/* Hover glow */}
          <ellipse cx={cx} cy={y0+10*s} rx={3.5*s} ry={0.5*s} fill="#88ccff" opacity={0.15}/>
        </g>;
      case"trtt": /* TR-TT / AT-RT walker — bipedal scout walker */
        return <g key={k} opacity={o}>
          {/* Head / cockpit */}
          <rect x={cx-3*s} y={y0+0*s} width={6*s} height={3.5*s} rx={0.8*s} fill="#667788" stroke="#556677" strokeWidth={0.25*s}/>
          {/* Main cannon (right side) */}
          <rect x={cx+3*s} y={y0+0.5*s} width={4*s} height={1.2*s} rx={0.3*s} fill="#778899" stroke="#667788" strokeWidth={0.2*s}/>
          <circle cx={cx+7*s} cy={y0+1.1*s} r={0.5*s} fill="#f44" opacity={0.6}/>
          {/* Viewport */}
          <rect x={cx-2*s} y={y0+1.2*s} width={4*s} height={1*s} rx={0.3*s} fill="#1a1a2e" opacity={0.6}/>
          {/* Clone inside */}
          <rect x={cx-1*s} y={y0+1.4*s} width={2*s} height={0.6*s} rx={0.3*s} fill="#e8e8e8" opacity={0.5}/>
          {/* Body connector */}
          <rect x={cx-1.5*s} y={y0+3.5*s} width={3*s} height={2*s} rx={0.5*s} fill="#778899" stroke="#667788" strokeWidth={0.2*s}/>
          {/* Left leg */}
          <line x1={cx-1.5*s} y1={y0+5*s} x2={cx-3.5*s} y2={y0+8*s} stroke="#778899" strokeWidth={1.5*s} strokeLinecap="round"/>
          <line x1={cx-3.5*s} y1={y0+8*s} x2={cx-2*s} y2={y0+10.5*s} stroke="#778899" strokeWidth={1.2*s} strokeLinecap="round"/>
          <ellipse cx={cx-2*s} cy={y0+10.5*s} rx={1.2*s} ry={0.5*s} fill="#667788"/>
          {/* Right leg */}
          <line x1={cx+1.5*s} y1={y0+5*s} x2={cx+3.5*s} y2={y0+8*s} stroke="#778899" strokeWidth={1.5*s} strokeLinecap="round"/>
          <line x1={cx+3.5*s} y1={y0+8*s} x2={cx+2*s} y2={y0+10.5*s} stroke="#778899" strokeWidth={1.2*s} strokeLinecap="round"/>
          <ellipse cx={cx+2*s} cy={y0+10.5*s} rx={1.2*s} ry={0.5*s} fill="#667788"/>
        </g>;
      default:return <rect key={k+"d"} x={cx-3*s} y={y0+1*s} width={6*s} height={6*s} rx={1*s} fill="#888" stroke="#666" strokeWidth={0.2*s}/>;
    }
  };

  const showBoard=phase==="terr_p1"||phase==="terr_p2"||phase==="dep_units"||phase==="battle"||phase==="gameover";

  // POV: first-person view state
  const[povAngle,sPovAngle]=useState(0); // horizontal look direction in degrees
  const povDragRef=useRef(null);
  // Auto-face closest enemy when entering POV
  useEffect(()=>{
    if(!povMode)return;
    const u=mU||sel;if(!u||!u.dep||u.hp<=0)return;
    const enemies=all.filter(e=>e.pl!==u.pl&&e.hp>0&&e.dep);
    if(enemies.length>0){
      let cd=1e9,tx=0,ty=0;for(const e of enemies){const d=Math.hypot(e.x-u.x,e.y-u.y);if(d<cd){cd=d;tx=e.x+BR;ty=e.y+BR;}}
      sPovAngle(Math.atan2(tx-(u.x+BR),-(ty-(u.y+BR)))*180/Math.PI);
    }
  },[povMode,mU,sel]);

  // FPS Renderer: projects scene from unit's eyes
  const renderFPS=()=>{
    const u=mU||sel;if(!u)return null;
    const ux=u.x+BR,uy=u.y+BR,eyeH=unitTotalH(u);
    const VW=620,VH=360,FOV=90,HALF_FOV=FOV/2;
    const angRad=povAngle*Math.PI/180;
    const maxDist=BW*1.5;
    const horizon=VH*0.42;
    const projS=(d)=>220/Math.max(1,d); // perspective scale

    // Collect objects
    const objs=[];
    for(const t of terr){
      const tcx=t.x+t.w/2,tcy=t.y+t.h/2;
      const dc=t.color.replace('#','');
      const r0=parseInt(dc.slice(0,2),16),g0=parseInt(dc.slice(2,4),16),b0=parseInt(dc.slice(4,6),16);
      objs.push({x:tcx,y:tcy,w:Math.max(t.w,t.h),h3d:t.h3d||16,alt:0,
        topC:t.color,frontC:`rgb(${Math.max(0,r0-40)},${Math.max(0,g0-40)},${Math.max(0,b0-40)})`,
        sideC:`rgb(${Math.max(0,r0-60)},${Math.max(0,g0-60)},${Math.max(0,b0-60)})`,
        kind:t.kind,type:"terr",tex:t.tex});
    }
    for(const e of all.filter(x=>x.dep&&x.hp>0&&x.id!==u.id)){
      const isE=e.pl!==u.pl;
      objs.push({x:e.x+BR,y:e.y+BR,w:BASE*1.2,h3d:unitH(e),alt:e.alt||0,
        topC:isE?"#cc2222":"#2255aa",frontC:isE?"#aa1111":"#113366",sideC:isE?"#881111":"#0a2244",
        kind:e.ic+e.name,type:"unit",isEnemy:isE});
    }

    // Project
    const projected=[];
    for(const o of objs){
      const dx=o.x-ux,dy=o.y-uy;
      const dist=Math.hypot(dx,dy);if(dist<2||dist>maxDist)continue;
      const objAng=Math.atan2(dx,-dy);
      let relAng=objAng-angRad;
      while(relAng>Math.PI)relAng-=2*Math.PI;
      while(relAng<-Math.PI)relAng+=2*Math.PI;
      const relDeg=relAng*180/Math.PI;
      if(Math.abs(relDeg)>HALF_FOV+15)continue;
      const sx=VW/2+relDeg/HALF_FOV*(VW/2);
      const ps=projS(dist);
      const topZ=o.alt+o.h3d,botZ=o.alt;
      const topY=horizon-(topZ-eyeH)*ps;
      const botY=horizon-(botZ-eyeH)*ps;
      const pH=Math.max(2,Math.abs(botY-topY));
      const pW=Math.max(4,o.w*ps);
      // Compute which face we see (left or right of center = side visible)
      const sideVis=relDeg>2?"right":relDeg<-2?"left":"front";
      projected.push({sx,topY:Math.min(topY,botY),pH,pW,dist,sideVis,...o});
    }
    projected.sort((a,b)=>b.dist-a.dist);

    return(
      <div style={{position:"relative",width:VW,maxWidth:"100%",height:VH,borderRadius:6,overflow:"hidden",border:"2px solid #f0c040",margin:"0 auto 6px",cursor:"ew-resize",background:"#000"}}
        onMouseDown={e=>{povDragRef.current={sx:e.clientX,oa:povAngle};}}
        onMouseMove={e=>{if(!povDragRef.current)return;sPovAngle(povDragRef.current.oa+(e.clientX-povDragRef.current.sx)*0.5);}}
        onMouseUp={()=>{povDragRef.current=null;}}
        onMouseLeave={()=>{povDragRef.current=null;}}>
        {/* Sky gradient */}
        <div style={{position:"absolute",top:0,left:0,width:"100%",height:horizon,background:"linear-gradient(180deg,#050810 0%,#0a1525 40%,#1a3040 80%,#2a4050 100%)"}}/>
        {/* Ground gradient */}
        <div style={{position:"absolute",top:horizon,left:0,width:"100%",height:VH-horizon,background:"linear-gradient(180deg,#2a4a1a 0%,#1a3510 30%,#0f250a 70%,#050a03 100%)"}}/>

        {/* Projected 3D objects */}
        {projected.map((p,i)=>{
          const fadeO=Math.max(0.4,1-p.dist/(maxDist*0.6));
          const sideW=Math.max(2,p.pW*0.25);
          const isTerr=p.type==="terr";
          const isUnit=p.type==="unit";
          return(<React.Fragment key={i}>
            {/* FRONT FACE — main visible face */}
            <div style={{position:"absolute",left:p.sx-p.pW/2,top:p.topY,width:p.pW,height:p.pH,
              background:p.frontC,opacity:fadeO,
              borderTop:`1px solid ${p.topC}`,
              borderBottom:"1px solid rgba(0,0,0,0.5)",
              overflow:"hidden"}}>
              {/* Texture details on terrain */}
              {isTerr&&p.tex==="forest"&&<>
                <div style={{position:"absolute",bottom:0,left:"20%",width:"8%",height:"60%",background:"#3a2510"}}/>
                <div style={{position:"absolute",bottom:0,left:"55%",width:"7%",height:"50%",background:"#3a2510"}}/>
                <div style={{position:"absolute",top:"5%",left:"10%",width:"30%",height:"40%",borderRadius:"50%",background:"#1a5a10"}}/>
                <div style={{position:"absolute",top:"10%",left:"45%",width:"25%",height:"35%",borderRadius:"50%",background:"#1a6a15"}}/>
              </>}
              {isTerr&&p.tex==="house"&&<>
                <div style={{position:"absolute",top:"15%",left:"15%",width:"20%",height:"25%",background:"#FFFACD",border:"1px solid #8B7355"}}/>
                <div style={{position:"absolute",top:"15%",left:"60%",width:"20%",height:"25%",background:"#FFFACD",border:"1px solid #8B7355"}}/>
                <div style={{position:"absolute",bottom:0,left:"35%",width:"25%",height:"40%",background:"#5C3317",borderRadius:"4px 4px 0 0"}}/>
              </>}
              {isTerr&&p.tex==="tower"&&<>
                <div style={{position:"absolute",top:"50%",left:"40%",width:"20%",height:"18%",background:"#0a0a1e"}}/>
              </>}
              {isTerr&&p.tex==="wall"&&Array.from({length:3}).map((_,r)=>
                <div key={r} style={{position:"absolute",top:r*33+"%",left:r%2?"10%":"0",width:"100%",height:"30%",borderBottom:"1px solid rgba(0,0,0,0.2)",borderRight:"1px solid rgba(0,0,0,0.1)"}}/>
              )}
              {/* Label */}
              {p.pW>25&&<div style={{position:"absolute",bottom:1,left:0,width:"100%",textAlign:"center",fontSize:Math.max(6,Math.min(10,p.pW*0.15)),color:"#fff",textShadow:"0 0 3px #000",fontWeight:700}}>{p.kind}</div>}
            </div>
            {/* TOP FACE — visible when object is below eye level */}
            {p.topY>horizon-p.pH&&isTerr&&<div style={{position:"absolute",
              left:p.sx-p.pW/2,top:p.topY-Math.max(1,p.pW*0.15),width:p.pW,height:Math.max(1,p.pW*0.15),
              background:p.topC,opacity:fadeO*0.9}}/>}
            {/* SIDE FACE — gives depth */}
            {isTerr&&<div style={{position:"absolute",
              left:p.sideVis==="right"?p.sx+p.pW/2:p.sx-p.pW/2-sideW,
              top:p.topY,width:sideW,height:p.pH,
              background:p.sideC,opacity:fadeO*0.85}}/>}
            {/* Unit glow */}
            {isUnit&&<div style={{position:"absolute",left:p.sx-p.pW/2-2,top:p.topY-2,width:p.pW+4,height:p.pH+4,
              border:p.isEnemy?"2px solid #ff4444":"2px solid #4488ff",
              borderRadius:3,boxShadow:p.isEnemy?"0 0 8px #ff4444":"0 0 6px #4488ff",
              opacity:fadeO*0.7,pointerEvents:"none"}}/>}
          </React.Fragment>);
        })}

        {/* Crosshair */}
        <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}>
          <line x1={VW/2-10} y1={horizon} x2={VW/2+10} y2={horizon} stroke="#f0c040" strokeWidth={1.5} opacity={0.6}/>
          <line x1={VW/2} y1={horizon-10} x2={VW/2} y2={horizon+10} stroke="#f0c040" strokeWidth={1.5} opacity={0.6}/>
          <circle cx={VW/2} cy={horizon} r={15} fill="none" stroke="#f0c040" strokeWidth={0.5} opacity={0.3}/>
        </svg>
        {/* HUD */}
        <div style={{position:"absolute",bottom:4,left:0,width:"100%",textAlign:"center",color:"#f0c040",fontSize:10,fontWeight:700,textShadow:"0 0 4px #000"}}>
          {u.ic} {u.name} | PA:{u.act} | PV:{u.hp} | {(((povAngle%360)+360)%360).toFixed(0)}°
        </div>
        <div style={{position:"absolute",top:4,left:8,color:"#aaa",fontSize:9}}>Glisser pour tourner</div>
      </div>
    );
  };

  // Board orbit (right-click drag = turntable), pan (shift+right or middle), zoom (scroll)
  const onBoardMouseDown=(e)=>{
    if(e.button===2||e.button===1){
      e.preventDefault();
      const mode=(e.shiftKey||e.button===1)?"pan":"orbit";
      dragRef.current={sx:e.clientX,sy:e.clientY,orx:rotRef.current.rx,ory:rotRef.current.ry,opx:panRef.current.x,opy:panRef.current.y,mode};
    }
  };
  const onBoardMouseMove=(e)=>{
    if(!dragRef.current)return;
    const dx=e.clientX-dragRef.current.sx, dy=e.clientY-dragRef.current.sy;
    if(dragRef.current.mode==="orbit"){
      // Turntable: horizontal mouse = rotate Y (spin), vertical = tilt X (limited)
      rotRef.current={rx:Math.max(0,Math.min(90,dragRef.current.orx-dy*0.3)),ry:dragRef.current.ory+dx*0.5};
      sCamSt({rx:rotRef.current.rx,ry:rotRef.current.ry,z:zoomRef.current,px:panRef.current.x,py:panRef.current.y});
    } else {
      panRef.current={x:dragRef.current.opx+dx,y:dragRef.current.opy+dy};
      sCamSt({rx:rotRef.current.rx,ry:rotRef.current.ry,z:zoomRef.current,px:panRef.current.x,py:panRef.current.y});
    }
  };
  const onBoardMouseUp=(e)=>{if(e.button===2||e.button===1)dragRef.current=null;};
  const onBoardWheel=(e)=>{
    e.preventDefault();
    const d=e.deltaY>0?-0.08:0.08;
    zoomRef.current=Math.max(0.3,Math.min(3,zoomRef.current+d));
    sCamSt({rx:rotRef.current.rx,ry:rotRef.current.ry,z:zoomRef.current,px:panRef.current.x,py:panRef.current.y});
  };
  const resetView=()=>{panRef.current={x:0,y:0};zoomRef.current=1;rotRef.current={rx:30,ry:0};sCamSt({rx:30,ry:0,z:1,px:0,py:0});};

  /* ═══ RENDER ═══ */
  return(
    <div style={{minHeight:"100vh",background:"#0d1117",color:"#e6edf3",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* HEADER */}
      <div style={{background:"#161b22",padding:"8px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:"3px solid #f0c040",flexWrap:"wrap"}}>
        <span style={{fontSize:20,fontWeight:900,color:"#f0c040",letterSpacing:2}}>🧱 CROSSBLOCK</span>
        <div style={{display:"flex",gap:2}}>
          {[["army","Armées"],["battle","Bataille"],["sim","Simulation"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"4px 12px",border:"none",borderRadius:"5px 5px 0 0",fontWeight:700,cursor:"pointer",fontSize:10,background:tab===k?"#f0c040":"#21262d",color:tab===k?"#000":"#8b949e"}}>{l}</button>
          ))}
          {isAdm&&<button onClick={()=>setTab("tips")} style={{padding:"4px 12px",border:"none",borderRadius:"5px 5px 0 0",fontWeight:700,cursor:"pointer",fontSize:10,background:tab==="tips"?"#f0c040":"#21262d",color:tab==="tips"?"#000":"#8b949e"}}>Balance</button>}
          {!isAdm&&<button onClick={()=>{var p=prompt("Mot de passe admin:");if(p==="crossblocks123"){sIsAdm(true);aL("Admin débloqué — onglet Balance visible");}else if(p!==null)aL("Mot de passe incorrect");}} style={{padding:"4px 8px",border:"none",borderRadius:"5px 5px 0 0",cursor:"pointer",fontSize:10,background:"#21262d",color:"#484f58"}}>Admin</button>}
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
          {phase==="battle"&&gMode==="ai"&&<button onClick={togglePause} style={{...BS(paused?"#238636":"#b35900"),fontSize:11,padding:"5px 12px"}}>{paused?"RELANCER":"PAUSE"}</button>}
          {phase==="battle"&&(gMode==="pvp"||gMode==="pve")&&<span style={{color:curP===1?"#58a6ff":"#f85149",fontWeight:900,fontSize:13}}>→J{curP}{isHuman(curP)?" (vous)":gMode==="pve"?" (IA)":""} T{turn}</span>}
          {phase==="battle"&&(paused||isHuman(curP))&&<button onClick={doUndo} disabled={!undoStack.current.length} style={{...BS("#30363d"),fontSize:11,padding:"5px 10px",opacity:undoStack.current.length?1:0.4}}>ANNULER</button>}
          {phase==="battle"&&<button onClick={()=>sPovMode(p=>!p)} style={{...BS(povMode?"#f0c040":"#30363d"),color:povMode?"#000":"#e6edf3",fontSize:11,padding:"5px 10px"}}>{povMode?"VUE LIBRE":"VUE 1P"}</button>}
          {phase!=="setup"&&<button onClick={saveGame} style={{...BS("#1f6feb"),fontSize:11,padding:"5px 10px"}}>SAUVER</button>}
          <button onClick={loadGame} style={{...BS("#30363d"),fontSize:11,padding:"5px 10px"}}>CHARGER</button>
          {phase!=="setup"&&<button onClick={resetGame} style={{...BS("#6e1010"),fontSize:11,padding:"5px 10px"}}>NOUVELLE PARTIE</button>}
        </div>
      </div>

      {/* ═══ BALANCE TAB ═══ */}
      {tab==="tips"&&isAdm&&(()=>{
        const ud=balUnitData(balArm);
        const vd=balVehData(balArm);
        const maxVal=Math.max(...ud.map(u=>u.value),1);
        /* SVG mini-chart */
        const svgChart=(cw,ch,datasets,xMax,yMax,labels)=>{
          const px2=(x)=>20+x/(xMax||1)*(cw-30);
          const py2=(y)=>ch-18-y/(yMax||1)*(ch-28);
          const cols=["#f0c040","#f85149","#888","#3fb950","#5588cc"];
          return(<svg width={cw} height={ch} style={{background:"#0d1117",borderRadius:4}}>
            {[0.25,0.5,0.75,1].map(f=><line key={"g"+f} x1={20} y1={py2(yMax*f)} x2={cw-4} y2={py2(yMax*f)} stroke="#222" strokeDasharray="3,3"/>)}
            {[0.25,0.5,0.75,1].map(f=><text key={"t"+f} x={2} y={py2(yMax*f)+3} fill="#666" fontSize={7}>{Math.round(yMax*f)}</text>)}
            <line x1={20} y1={ch-18} x2={cw-4} y2={ch-18} stroke="#444"/>
            <line x1={20} y1={10} x2={20} y2={ch-18} stroke="#444"/>
            {[0,0.25,0.5,0.75,1].map(f=><text key={"x"+f} x={px2(xMax*f)} y={ch-6} fill="#666" fontSize={7} textAnchor="middle">{Math.round(xMax*f)}</text>)}
            {datasets.map((ds,di)=><polyline key={di} fill="none" stroke={cols[di%cols.length]} strokeWidth={di===0?2:1.5}
              strokeDasharray={di>=2?"4,2":"none"}
              points={ds.map(([x,y])=>`${px2(x)},${py2(y)}`).join(" ")}/>)}
            {labels&&labels.map((l,i)=><g key={i}>
              <line x1={cw-90} y1={8+i*10} x2={cw-78} y2={8+i*10} stroke={cols[i%cols.length]} strokeWidth={2} strokeDasharray={i>=2?"4,2":"none"}/>
              <text x={cw-75} y={11+i*10} fill={cols[i%cols.length]} fontSize={7}>{l}</text>
            </g>)}
          </svg>);
        };
        // Lanchester curve data
        const lancData=[];for(let n=1;n<=20;n++)lancData.push([n,n*n]);
        const lancLin=[];for(let n=1;n<=20;n++)lancLin.push([n,n]);
        const lancMid=[];for(let n=1;n<=20;n++)lancMid.push([n,Math.pow(n,1.5)]);
        // HP cost curve
        const hpLin=[];for(let h=1;h<=12;h++)hpLin.push([h,h*100]);
        const hpExp=[];for(let h=1;h<=12;h++)hpExp.push([h,Math.round(100*Math.pow(h,1.5))]);
        const hpArm=[];for(let h=1;h<=12;h++)hpArm.push([h,Math.round(100*Math.pow(h,1.7))]);
        // Parade table
        const paradeRows=[
          {n:"Tri-Droïde",arm:6},{n:"TR-TT",arm:10},{n:"B2/Fives",arm:11},
          {n:"Rex/Véh.",arm:12},{n:"Clones",arm:15},{n:"Garde",arm:16},
          {n:"Rebelles",arm:17},{n:"B1",arm:18}
        ];
        const pens=[3,4,5,6,7,10];
        // Proposed
        const proposed=[
          {n:"Clone Ph.2",o:200,p:200,r:"Référence"},
          {n:"Clone Geo",o:230,p:210,r:"Quasi = Clone"},
          {n:"Sniper",o:260,p:220,r:"1 dé = aléatoire"},
          {n:"Clone Spéc.",o:250,p:210,r:"dbl_f sous-performe"},
          {n:"Officier",o:270,p:240,r:"Pistolet moyen"},
          {n:"Airborne",o:270,p:280,r:"Parachutage fort"},
          {n:"Fives",o:430,p:"500★",r:"arm→11, hp→3"},
          {n:"Rex",o:400,p:400,r:"Inchangé"},
          {n:"B1",o:170,p:"120★",r:"5PA, chair à canon"},
          {n:"B2",o:300,p:320,r:"Bon arm, légère ↑"},
          {n:"Tri-Droïde",o:1800,p:"3000★",r:"Lanchester HP^1.5"},
          {n:"Rebelle",o:180,p:130,r:"0% parade = pas cher"},
          {n:"Reb. Fusil",o:180,p:130,r:"Idem"},
          {n:"Reb. Pistol.",o:150,p:100,r:"Arme la + faible"},
          {n:"Reb. Jetpack",o:240,p:200,r:"Vol mais fragile"},
          {n:"Garde Reb.",o:200,p:170,r:"arm=16 correct"},
        ];
        const S={fontSize:10,color:"#e6edf3"};const H={fontSize:11,color:"#f0c040",margin:"0 0 6px",fontWeight:700};
        const C={background:"#161b22",border:"1px solid #30363d",borderRadius:6,padding:10,marginBottom:10};
        const subBS=(a)=>({padding:"3px 10px",border:"none",borderRadius:4,fontWeight:700,cursor:"pointer",
          fontSize:9,background:balTab===a?"#f0c040":"#21262d",color:balTab===a?"#000":"#8b949e"});
        return(
        <div style={{padding:12,maxWidth:800,margin:"0 auto"}}>
          <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
            {[["theory","📐 Théorie"],["curves","📈 Courbes"],["parade","🛡 Parade"],["units","🪖 Valeur"],["propose","🔧 Rééquilibrage"]].map(([k,l])=>(
              <button key={k} onClick={()=>sBalTab(k)} style={subBS(k)}>{l}</button>
            ))}
          </div>

          {/* ── THEORY ── */}
          {balTab==="theory"&&<div>
            <div style={C}>
              <p style={H}>🎯 Pourquoi 1000 soldats à 1PV battent 1 monstre à 1000PV ?</p>
              <p style={S}>Imagine deux armées à coût égal :</p>
              <p style={{...S,color:"#f85149",fontWeight:700}}>• Armée A : 1 monstre — 10 PV, 1 arme</p>
              <p style={{...S,color:"#3fb950",fontWeight:700}}>• Armée B : 10 soldats — 1 PV, 1 arme chacun</p>
              <div style={{background:"#0d1117",borderRadius:4,padding:8,margin:"8px 0",fontSize:10}}>
                <p style={{color:"#f0c040",margin:"2px 0"}}>Tour 1 : Monstre tire 1× → tue 1 soldat. 10 soldats tirent 10× → ~5 dégâts au monstre.</p>
                <p style={{color:"#f0c040",margin:"2px 0"}}>Tour 2 : Monstre (5PV) tire 1× → tue 1. Les 9 restants tirent 9× → tuent le monstre.</p>
                <p style={{color:"#3fb950",fontWeight:700,margin:"4px 0 0"}}>→ Score : monstre tue 2 soldats. 8 survivants. Victoire écrasante de la masse.</p>
              </div>
            </div>
            <div style={C}>
              <p style={H}>📐 La Loi de Lanchester (1916)</p>
              <p style={S}>Pour le combat à distance, la puissance de combat = <b style={{color:"#f0c040"}}>N² × P</b></p>
              <p style={S}>(N = nombre d'unités, P = puissance individuelle)</p>
              <p style={S}>Pourquoi le <b>carré</b> ? Chaque unité supplémentaire :</p>
              <p style={S}>① <b>Ajoute</b> sa puissance de feu (×N)</p>
              <p style={S}>② <b>Dilue</b> le feu ennemi (survie ×N)</p>
              <p style={S}>→ N × N = <b>N²</b>. Doubler les unités <b>quadruple</b> la puissance.</p>
            </div>
            <div style={C}>
              <p style={H}>💰 Conséquence pour les points</p>
              <p style={S}>• 10 Clones (2PV chacun) = <b>100P</b> de puissance → 2000pts</p>
              <p style={S}>• 1 unité à 20PV = seulement <b>~10-20P</b> (1 tir/tour !)</p>
              <p style={{...S,color:"#f85149"}}>→ Le coût doit augmenter <b>exponentiellement</b> avec les PV :</p>
              <div style={{background:"#0d1117",borderRadius:4,padding:8,margin:"4px 0",textAlign:"center"}}>
                <span style={{color:"#f0c040",fontSize:14,fontWeight:900}}>Coût = Base × HP^1.5 × (1 + DPS) × (1 + Parade)</span>
              </div>
              <p style={{...S,color:"#888",fontSize:9}}>Le Tri-Droïde (10PV, 50% parade, 12 tourelles) devrait coûter ~3000-5000pts, pas 1800.</p>
            </div>

              <div style={{width:"100%",height:"100%",display:"flex",justifyContent:"center",alignItems:"center",perspective:"1200px",perspectiveOrigin:"50% 50%"}}>
              {(()=>{const dispW=Math.min(BW,typeof window!=='undefined'?window.innerWidth-40:500);const dispH=dispW*BH/BW;const sc=dispW/BW;return(
              <div style={{transform:`translate3d(${camSt.px}px, ${camSt.py}px, 0) scale(${camSt.z}) rotateX(${camSt.rx}deg) rotateY(${camSt.ry}deg)`,transformOrigin:"50% 50%",transformStyle:"preserve-3d",transition:dragRef.current?"none":"transform 0.3s ease-out",position:"relative",width:dispW,height:dispH}}>

                {/* ═══ TERRAIN FOOTPRINTS (3D volume is CSS) ═══ */}
                {terr.map(t=>{
  const sel=tSel===t.id;

  const ISO=h3*0.48;

  const hex=(c,f)=>{try{const p=c.replace('#','');const r=~~(parseInt(p.slice(0,2),16)*f),g=~~(parseInt(p.slice(2,4),16)*f),b=~~(parseInt(p.slice(4,6),16)*f);return`rgb(${r<0?0:r>255?255:r},${g<0?0:g>255?255:g},${b<0?0:b>255?255:b})`}catch(e){return c}};
  const x=t.x,y=t.y,w=t.w,h=t.h;
  const topC=hex(t.c,1.15), frtC=hex(t.c,0.72), sideC=hex(t.c,0.48);

  // Build terrain as IRREGULAR organic shapes — NOT simple boxes
  const rand=(seed,min,max)=>{const s=Math.sin(seed*9999+t.id*7)*10000;return min+(s-~~s)*(max-min);};

  return(
  <g key={t.id} onClick={e=>{if(phase.startsWith("terr")){e.stopPropagation();sTSel(t.id);}}}>

    {/* ─── TYPE: MUR DE DÉFENSE ─── */}

      {/* Base bricks row */}

      {/* Crenellations - irregular */}
      {[0,1,2,3].map(c=><rect key={"wcr"+c} x={x+c*w/4+2} y={y+h-ISO-4-rand(c,0,3)} width={w/4-4} height={5+rand(c,0,2)} fill={topC} stroke="#111" strokeWidth={0.3} rx={0.5}/>)}

    {/* ─── TYPE: BÂTIMENT / MAISON ─── */}
    {t.tex==="house"&&<>

      {/* Roof tiles lines */}
      {[0.2,0.4,0.6,0.8].map((f,i)=><line key={"rt"+i} x1={x+w*f*0.5} y1={y+h-ISO+1-f*3} x2={x+w-w*f*0.5} y2={y+h-ISO+1-f*3} stroke="rgba(0,0,0,0.25)" strokeWidth={0.4}/>)}

      <line x1={x+6.5} y1={y+h-ISO+5} x2={x+6.5} y2={y+h-ISO+13} stroke="#335577" strokeWidth={0.4}/>

    {/* ─── TYPE: TOUR DE GUET ─── */}
    {t.tex==="tower"&&<>
      {/* Tower cylinder — use curved rect */}
      <rect x={x+1} y={y+h-ISO} width={w-2} height={ISO} fill={frtC} stroke="#111" strokeWidth={0.4} rx={w*0.3}/>

      <polygon points={`${x+w*0.38},${y+h} ${x+w*0.45},${y+h-6} ${x+w*0.52},${y+h}`} fill={hex(t.c,0.5)} stroke="#111" strokeWidth={0.4}/>

    {/* ─── TYPE: CRATÈRE ─── */}

      <ellipse cx={x+w/2} cy={y+h-ISO*0.2} rx={w*0.38} ry={ISO*0.5} fill={hex(t.c,0.35)} stroke="rgba(0,0,0,0.5)" strokeWidth={0.4}/>
      <ellipse cx={x+w/2} cy={y+h-ISO*0.15} rx={w*0.2} ry={ISO*0.2} fill={hex(t.c,0.15)}/>

      <circle cx={x+w-5} cy={y+h-3} r={1.2} fill={hex(t.c,0.6)}/>
      <polygon points={`${x+w*0.2},${y+h} ${x+w*0.23},${y+h-2} ${x+w*0.26},${y+h}`} fill={hex(t.c,0.7)}/>
    </>}

    {/* ─── TYPE: ÉPAVE DE VÉHICULE ─── */}
    {t.tex==="wreck"&&<>
      {/* Main chassis - tilted */}
      <polygon points={`${x+2},${y+h-2} ${x+2},${y+h-ISO+4} ${x+w-3},${y+h-ISO} ${x+w-1},${y+h-1}`} fill={hex("#445566",0.8)} stroke="#222" strokeWidth={0.5}/>
      {/* Wrecked top part */}
      <polygon points={`${x+w*0.2},${y+h-ISO+4} ${x+w*0.3},${y+h-ISO-6} ${x+w*0.5},${y+h-ISO-3} ${x+w*0.6},${y+h-ISO+1}`} fill={hex("#334455",0.9)} stroke="#222" strokeWidth={0.4}/>
      {/* Wheels / treads */}
      <circle cx={x+4} cy={y+h-3} r={3} fill="#2a2a2a" stroke="#111" strokeWidth={0.5}/>
      <circle cx={x+4} cy={y+h-3} r={1.5} fill="#444"/>
      <circle cx={x+w-5} cy={y+h-3} r={3} fill="#2a2a2a" stroke="#111" strokeWidth={0.5}/>
      <circle cx={x+w-5} cy={y+h-3} r={1.5} fill="#444"/>
      {/* Flames from damage */}
      <path d={`M${x+w*0.35},${y+h-ISO+2} Q${x+w*0.4},${y+h-ISO-4} ${x+w*0.45},${y+h-ISO+3}`} fill="#ff6600" opacity={0.8}/>
      <path d={`M${x+w*0.38},${y+h-ISO} Q${x+w*0.42},${y+h-ISO-8} ${x+w*0.48},${y+h-ISO}`} fill="#ffaa00" opacity={0.7}/>
      {/* Smoke */}
      <ellipse cx={x+w*0.4} cy={y+h-ISO-10} rx={4} ry={3} fill="rgba(60,60,60,0.5)"/>
    </>}

    {/* Selection outline */}
    {sel&&<rect x={x-1} y={y-ISO-4} width={w+2} height={h+ISO+4} fill="none" stroke="#ff0" strokeWidth={1.5} strokeDasharray="3,2" rx={2}/>}

    {/* Label */}
    <text x={x+w/2} y={y+h-ISO*0.4} textAnchor="middle" dominantBaseline="middle"
      fontSize={Math.min(w,ISO)*0.35} fill="rgba(255,255,255,0.7)" fontWeight="700"
      style={{pointerEvents:"none",textShadow:"0 0 3px black"}}>{t.e}</text>
  </g>);
})}

                {/* LOS lines — with glow + cover indicator */}
                {los.map((l,i)=>(
                  <g key={i}>
                    <line x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.color} strokeWidth={l.canFire?1.5:0.5} strokeDasharray={l.blocked?"3,3":l.cover?"6,3":"none"} opacity={l.canFire?0.6:0.3} filter={l.canFire?"url(#glow)":"none"}/>
                    {l.canFire&&<circle cx={l.x2} cy={l.y2} r={BR+2.5} fill="none" stroke={l.color} strokeWidth={1} opacity={0.4}/>}
                    {l.cover&&<text x={(l.x1+l.x2)/2} y={(l.y1+l.y2)/2-3} textAnchor="middle" fontSize={4} fill="#fd0" fontWeight="700" style={{pointerEvents:"none"}}>COUVERT {Math.round(l.pct*100)}%</text>}
                    {l.blocked&&<text x={(l.x1+l.x2)/2} y={(l.y1+l.y2)/2-3} textAnchor="middle" fontSize={4} fill="#f44" fontWeight="700" style={{pointerEvents:"none"}}>BLOQUE</text>}
                  </g>
                ))}

                {/* ═══ EMPTY VEHICLES (no pilot) ═══ */}
                {[...ev1,...ev2].map(v=>{const cx=v.x+BR,cy=v.y+BR;
                  return(<g key={v.id} onClick={e=>{e.stopPropagation();aL(`🚗 ${v.name} vide (J${v.pl}) — embarquez un pilote!`);}}>
                                        {drawVeh(v.vtype,cx,cy-4,0.65,v.pl,0.4)}
                    <text x={cx} y={cy+BASE} textAnchor="middle" fontSize={3} fill="#f0c040" fontWeight="bold" opacity={0.8}>VIDE</text>

                  </g>);
                })}

                {/* ═══ DROPPED WEAPONS ═══ */}
                {drops.map(d=>{const wSrc=WEAPS[d.key];const col=wSrc?(wSrc.pen>=6?"#6af":wSrc.pen>=4?"#4af":"#aaa"):"#888";
                  return(<g key={d.id}>
                                        {d.pickable?<>
                      <line x1={d.x-0.5} y1={d.y+2.5} x2={d.x+4.5} y2={d.y+1} stroke={col} strokeWidth={0.7} strokeLinecap="round"/>

                {all.filter(u=>u.dep&&u.hp>0).map(u=>{

              {/* ═══ FULL 3D TERRAIN & UNITS ═══ */}
              {(()=>{
                // 3D Box: 6 solid faces + optional LEGO studs
                const Box=({x,y,w,h,z,c,cF,cS,cT,bd,studs,children,faceF})=>{

                  const f=cF||`rgb(${ci(1,-50)},${ci(3,-50)},${ci(5,-50)})`;
                  const s=cS||`rgb(${ci(1,-30)},${ci(3,-30)},${ci(5,-30)})`;

                  // LEGO studs on top face
                  const studEls=studs?Array.from({length:Math.max(1,Math.floor(w*h/(8*sc*8*sc)))}).map((_,i)=>{
                    const cols=Math.max(1,Math.floor(w/(8*sc)));const row=Math.floor(i/cols);const col=i%cols;
                    const sx=4*sc+col*(w/cols);const sy=4*sc+row*(h/Math.max(1,Math.ceil(studs/cols)));

                  }):null;

                    <div style={{position:"absolute",width:"100%",height:z,bottom:0,left:0,transformOrigin:"bottom",transform:"rotateX(-90deg)",background:f,overflow:"hidden"}}>{faceF}</div>
                    <div style={{position:"absolute",width:"100%",height:z,top:0,left:0,transformOrigin:"top",transform:"rotateX(90deg)",background:f}}/>
                    <div style={{position:"absolute",width:z,height:"100%",right:0,top:0,transformOrigin:"right",transform:"rotateY(90deg)",background:s}}/>
                    <div style={{position:"absolute",width:z,height:"100%",left:0,top:0,transformOrigin:"left",transform:"rotateY(-90deg)",background:lt}}/>
                    <div style={{position:"absolute",width:"100%",height:"100%",background:bk}}/>
                  </div>);
                };
                return(<div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",transformStyle:"preserve-3d"}}>
                {terr.map(t=>{
                  const h3=t.h3d||16;const hPx=h3*sc;const wPx=t.w*sc;const hhPx=t.h*sc;
                  const sel3=tSel===t.id;const tx=t.tex||"";const bdr=sel3?"2px solid #ff0":"none";
                  const click=e=>{if(phase.startsWith("terr")){e.stopPropagation();sTSel(t.id);}};
                  const wrap={position:"absolute",left:t.x*sc,top:t.y*sc,width:wPx,height:hhPx,transformStyle:"preserve-3d",pointerEvents:phase.startsWith("terr")?"auto":"none"};

                  // ─── FOREST ───
                  if(tx==="forest"&&t.trees){return(
                    <div key={"t3d_"+t.id} onClick={click} style={wrap}>
                      <Box x={0} y={0} w={wPx} h={hhPx} z={3*sc} c="#2a5a1a" bd={bdr} studs={4}/>
                      {t.trees.map((tr,i)=>{const lx=tr.dx*sc;const ly=tr.dy*sc;const tsz=tr.sz;
                        const trH=(h3*0.5+tsz*3)*sc;const canSz=(tsz+1.5)*sc;const trW=1.5*sc;
                        const gc="#"+[20,tr.g,15].map(v=>v.toString(16).padStart(2,"0")).join("");
                        const gc2="#"+[30,Math.min(255,tr.g+20),20].map(v=>v.toString(16).padStart(2,"0")).join("");
                        return(<div key={i} style={{position:"absolute",left:lx-trW/2,top:ly-trW/2,width:trW,height:trW,transformStyle:"preserve-3d"}}>

                            <Box x={-canSz+trW/2} y={-canSz+trW/2} w={canSz*2} h={canSz*2} z={canSz*1.4} c={gc} cT={gc2}/>
                          </div>
                          <div style={{position:"absolute",left:0,top:0,transformStyle:"preserve-3d",transform:`translateZ(${trH*0.7+canSz}px)`}}>
                            <Box x={-canSz*0.6+trW/2} y={-canSz*0.6+trW/2} w={canSz*1.2} h={canSz*1.2} z={canSz*0.8} c={gc2}/>
                          </div>
                        </div>);
                      })}
                    </div>);}

                  // ─── HOUSE: walls + angled roof + windows ───
                  if(tx==="house"){
                    const winEls=[];const nw=Math.max(1,Math.floor(wPx/16));
                    for(let i=0;i<nw;i++)winEls.push(<div key={"w"+i} style={{position:"absolute",left:(8+i*(100-16)/nw)+"%",top:"20%",width:Math.min(12,80/nw)+"%",height:"30%",background:"#FFFACD",border:"1px solid #8B7355"}}/>);
                    winEls.push(<div key="door" style={{position:"absolute",left:"38%",bottom:0,width:"24%",height:"45%",background:"#5C3317",borderRadius:"3px 3px 0 0",border:"1px solid #3a1a08"}}/>);
                    return(
                    <div key={"t3d_"+t.id} onClick={click} style={wrap}>
                      <Box x={0} y={0} w={wPx} h={hhPx} z={hPx} c="#C4A46C" bd={bdr} studs={6} faceF={winEls}/>
                      {/* Stepped pyramid roof: 3 layers on TOP of walls */}
                      <div style={{position:"absolute",left:0,top:0,transformStyle:"preserve-3d",transform:`translateZ(${hPx}px)`}}>
                        <Box x={-2*sc} y={hhPx*0.05} w={wPx+4*sc} h={hhPx*0.9} z={hPx*0.2} c="#8B4513" cT="#9B5523" studs={4}/>
                      </div>
                      <div style={{position:"absolute",left:0,top:0,transformStyle:"preserve-3d",transform:`translateZ(${hPx+hPx*0.2}px)`}}>
                        <Box x={2*sc} y={hhPx*0.15} w={wPx-4*sc} h={hhPx*0.7} z={hPx*0.15} c="#7B3F13" cT="#8B4F23" studs={2}/>

                        <Box x={5*sc} y={hhPx*0.25} w={wPx-10*sc} h={hhPx*0.5} z={hPx*0.1} c="#6B2F03" cT="#7B3F13" studs={1}/>
                      </div>
                    </div>);}

                  // ─── TOWER + merlons + arrow slit ───
                  if(tx==="tower"){const nb=Math.max(2,Math.floor(wPx/(6*sc)));const mW=wPx/nb*0.55;const mH=hhPx/nb*0.55;const mZ=6*sc;
                    const slitEl=<div key="slit" style={{position:"absolute",left:"42%",top:"50%",width:"16%",height:"25%",background:"#0a0a1e",borderRadius:1}}/>;
                    return(
                    <div key={"t3d_"+t.id} onClick={click} style={wrap}>
                      <Box x={0} y={0} w={wPx} h={hhPx} z={hPx} c="#708090" bd={bdr} studs={8} faceF={slitEl}/>
                      <div style={{position:"absolute",left:0,top:0,transformStyle:"preserve-3d",transform:`translateZ(${hPx}px)`}}>
                        {Array.from({length:nb}).map((_,bi)=>bi%2===0?<Box key={"m"+bi} x={bi/nb*wPx} y={0} w={mW} h={mH} z={mZ} c="#667788" studs={1}/>:null)}
                        {Array.from({length:nb}).map((_,bi)=>bi%2===0?<Box key={"mb"+bi} x={bi/nb*wPx} y={hhPx-mH} w={mW} h={mH} z={mZ} c="#667788" studs={1}/>:null)}
                        {Array.from({length:nb}).map((_,bi)=>bi%2===0?<Box key={"ml"+bi} x={0} y={bi/nb*hhPx} w={mW} h={mH} z={mZ} c="#667788" studs={1}/>:null)}
                        {Array.from({length:nb}).map((_,bi)=>bi%2===0?<Box key={"mr"+bi} x={wPx-mW} y={bi/nb*hhPx} w={mW} h={mH} z={mZ} c="#667788" studs={1}/>:null)}
                      </div>
                    </div>);}

                  // ─── RUINS: irregular broken walls + debris ───
                  if(tx==="ruin"){return(
                    <div key={"t3d_"+t.id} onClick={click} style={wrap}>
                      <Box x={0} y={0} w={wPx*0.28} h={hhPx*0.95} z={hPx*0.8} c="#8a8278" bd={bdr} studs={2}/>
                      <Box x={wPx*0.22} y={hhPx*0.05} w={wPx*0.18} h={hhPx*0.5} z={hPx*0.35} c="#7a7268"/>
                      <Box x={wPx*0.38} y={hhPx*0.15} w={wPx*0.22} h={hhPx*0.55} z={hPx*0.55} c="#908880" studs={1}/>
                      <Box x={wPx*0.63} y={0} w={wPx*0.37} h={hhPx*0.85} z={hPx*0.65} c="#847a70" studs={2}/>
                      <Box x={wPx*0.65} y={hhPx*0.55} w={wPx*0.15} h={hhPx*0.35} z={hPx*0.3} c="#6a6258"/>
                      <Box x={wPx*0.35} y={hhPx*0.72} w={wPx*0.18} h={hhPx*0.15} z={3*sc} c="#6a6258"/>
                      <Box x={wPx*0.1} y={hhPx*0.8} w={wPx*0.1} h={hhPx*0.1} z={2*sc} c="#7a7268"/>
                    </div>);}

                  // ─── WALL: thin brick wall ───
                  if(tx==="wall"){
                    // Brick pattern on front face
                    const bricks=[];const bh=4*sc;const bw=6*sc;const nRows=Math.max(1,Math.floor(hPx/bh));
                    for(let row=0;row<nRows;row++){const off=row%2?bw*0.5:0;
                      for(let bx=off;bx<wPx;bx+=bw)bricks.push(<div key={"b"+row+bx} style={{position:"absolute",left:bx,top:row*bh,width:Math.min(bw-1,wPx-bx),height:bh-1,border:"0.5px solid rgba(0,0,0,0.2)",borderRadius:0.5}}/>);
                    }
                    return(
                    <div key={"t3d_"+t.id} onClick={click} style={{...wrap,height:hhPx*0.35}}>
                      <Box x={0} y={0} w={wPx} h={hhPx*0.35} z={hPx} c="#A0522D" bd={bdr} studs={4} faceF={bricks}/>
                    </div>);}

                  // ─── ROCK: irregular multi-block formation ───
                  return(
                  <div key={"t3d_"+t.id} onClick={click} style={wrap}>
                    <Box x={wPx*0.05} y={hhPx*0.05} w={wPx*0.55} h={hhPx*0.6} z={hPx*0.9} c="#696969" bd={bdr} studs={2}/>
                    <Box x={wPx*0.35} y={hhPx*0.2} w={wPx*0.6} h={hhPx*0.55} z={hPx*0.7} c="#5a5a5a" studs={2}/>
                    <Box x={wPx*0.15} y={hhPx*0.5} w={wPx*0.5} h={hhPx*0.45} z={hPx*0.5} c="#787878" studs={1}/>
                    <Box x={wPx*0.55} y={hhPx*0.65} w={wPx*0.35} h={hhPx*0.3} z={hPx*0.35} c="#606060"/>
                  </div>);
                })}

                {/* ═══ 3D UNIT BASES (clickable) ═══ */}
                {all.filter(u=>u.dep&&u.hp>0).map(u=>{
                  const uh=unitH(u);const uhPx=uh*sc;
                  const isSel=sel?.id===u.id||mU?.id===u.id;

                  const pC=isSel?"#f0c040":sqC||( u.pl===1?"#2255aa":"#aa2222");
                  return(
                  <div key={"u3d_"+u.id} onClick={e=>{e.stopPropagation();if((paused||isHuman(realCP.current))&&!u.done)takeCtrl(u);else showLos(u);}}
                    style={{position:"absolute",left:(u.x-1)*sc,top:(u.y-1)*sc,width:(BASE+2)*sc,height:(BASE+2)*sc,transformStyle:"preserve-3d",pointerEvents:"auto",cursor:"pointer",transform:`translateZ(${(u.alt||0)*sc}px)`}}>
                    <Box x={0} y={0} w={(BASE+2)*sc} h={(BASE+2)*sc} z={uhPx} c={pC} bd={isSel?"2px solid #fff":sqC?`2px solid ${sqC}`:"1px solid rgba(255,255,255,0.2)"} studs={1}/>
                  </div>);
                })}

                {/* ═══ 3D LOS LINES ═══ */}
                {los.map((l,i)=>{
                  const srcU=all.find(u=>Math.abs(u.x+BR-l.x1)<2&&Math.abs(u.y+BR-l.y1)<2);
                  const tgtU=all.find(u=>Math.abs(u.x+BR-l.x2)<2&&Math.abs(u.y+BR-l.y2)<2);
                  const z1=(srcU?unitTotalH(srcU):0)*sc;const z2=(tgtU?unitTotalH(tgtU):0)*sc;
                  const dx=(l.x2-l.x1)*sc,dy=(l.y2-l.y1)*sc,dz=z2-z1;
                  const hDist=Math.hypot(dx,dy);const dist3d=Math.hypot(hDist,dz);
                  if(dist3d<1)return null;
                  const xyAng=Math.atan2(dy,dx)*180/Math.PI;
                  const elAng=Math.atan2(dz,hDist)*180/Math.PI;
                  const col=l.blocked?"#f44":l.cover?"#fd0":l.canFire?"#0f0":"#555";
                  return(<div key={"los3d_"+i} style={{position:"absolute",left:l.x1*sc,top:l.y1*sc,width:dist3d,height:l.canFire?3:1,
                    transformOrigin:"0 50%",transformStyle:"preserve-3d",
                    transform:`translateZ(${z1}px) rotateZ(${xyAng}deg) rotateY(${-elAng}deg)`,
                    background:col,opacity:l.canFire?0.6:0.25,
                    borderRadius:1,boxShadow:l.canFire?`0 0 4px ${col}`:"none"}}/>);
                })}
                </div>);
              })()}

              </div>
              )})()}
              </div>
            </div>
          )}

          {/* ═══ CONTROL PANEL — FIXED OVERLAY ═══ */}
          {mU&&phase==="battle"&&(
            <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:"#1a1a0a",borderTop:"3px solid #f0c040",padding:8,boxShadow:"0 -4px 20px rgba(0,0,0,0.8)"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4,maxWidth:900,margin:"0 auto 4px"}}>
                <span style={{fontWeight:900,color:"#f0c040",fontSize:14}}>{mU.ic} {mU.name} (J{mU.pl})</span>

                <span style={{color:"#3fb950",fontSize:11}}>PV:{mU.hp}/{mU.mHp}</span>
                {mU.isVeh&&mU.vHp>0&&<span style={{color:"#f0c040",fontWeight:700,fontSize:11}}>Véh:{mU.vHp}/{mU.vMHp}</span>}
                {mU.isVeh&&mU.hasGunner&&<span style={{color:"#d2a8ff",fontWeight:700,fontSize:11}}>Canon:{mU.gunAct}PA</span>}
                {mU.alt>0&&<span style={{color:"#f0c040",fontSize:10}}>Alt:{mU.alt}</span>}
                {mU.sqId&&<span style={{color:sqColor(mU.sqId)||"#aaa",fontSize:10,border:`1px solid ${sqColor(mU.sqId)||"#555"}`,borderRadius:3,padding:"0 4px",background:(sqColor(mU.sqId)||"#888")+"22"}}>{mU.sqId} ({all.filter(a=>a.sqId===mU.sqId&&a.hp>0).length}u)</span>}

              <div style={{display:"flex",gap:5,flexWrap:"wrap",maxWidth:900,margin:"0 auto 3px"}}>

                <button onClick={()=>manAction("attack")} disabled={mU.act<2} style={{...BS(mU.act>=2?"#b35900":"#333"),fontSize:11,padding:"5px 12px",opacity:mU.act<2?0.3:1}}>{mU.isVeh?"PILOTE":"ATTAQUE"} (2PA)</button>
                {mU.isVeh&&mU.hasGunner&&<button onClick={()=>manAction("gunner")} disabled={mU.gunAct<2} style={{...BS(mU.gunAct>=2?"#6e40aa":"#333"),fontSize:11,padding:"5px 12px",opacity:mU.gunAct<2?0.3:1}}>CANONNIER (2PA)</button>}
                {mU.sqId&&!mU.isVeh&&all.filter(a=>a.sqId===mU.sqId&&a.hp>0&&a.dep&&a.act>=2&&a.id!==mU.id).length>0&&
                  <button onClick={()=>manAction("squadfire")} disabled={mU.act<2} style={{...BS(mU.act>=2?"#8b5cf6":"#333"),fontSize:10,padding:"4px 10px",opacity:mU.act<2?0.3:1}}>TIR GROUPÉ</button>}
                {!mU.isVeh&&<button onClick={()=>manAction("prone")} disabled={mU.act<1} style={{...BS(mU.act>=1?(mU.prone?"#2563eb":"#6b7280"):"#333"),fontSize:10,padding:"4px 10px",opacity:mU.act<1?0.3:1}}>{mU.prone?"LEVER":"COUCHER"} (1PA)</button>}
                {!mU.isVeh&&(mU.pl===1?ev1:ev2).some(v=>Math.hypot((v.x+BR)-(mU.x+BR),(v.y+BR)-(mU.y+BR))<=SEG_PX*1.5)&&
                  <button onClick={()=>manAction("board")} style={{...BS("#b45309"),fontSize:10,padding:"4px 10px"}}>EMBARQUER</button>}
                {mU.isVeh&&<button onClick={()=>manAction("dismount")} disabled={mU.act<1} style={{...BS(mU.act>=1?"#dc2626":"#333"),fontSize:10,padding:"4px 10px",opacity:mU.act<1?0.3:1}}>DÉBARQUER</button>}
                {!mU.isVeh&&drops.some(d=>d.pickable&&Math.hypot((d.x+2)-(mU.x+BR),(d.y+2)-(mU.y+BR))<=SEG_PX)&&

                <button onClick={()=>manAction("end")} style={{...BS("#555"),fontSize:11,padding:"5px 12px"}}>TERMINER</button>

                {mU.sqId&&<button onClick={()=>leaveSquad(mU)} style={{...BS("#6e1010"),fontSize:9,padding:"3px 6px"}}>QUITTER ESC.</button>}
                {mU.sqId&&<button onClick={()=>disbandSquad(mU.sqId)} style={{...BS("#6e1010"),fontSize:9,padding:"3px 6px"}}>DISSOUDRE</button>}

                  <button key={sid} onClick={()=>joinSquad(mU,sid)} style={{...BS("#30363d"),fontSize:8,padding:"2px 5px",border:`1px solid ${sqColor(sid)}`}}>+{sid}({members.length}u)</button>
                ))}
              </div>
              {mW&&<div style={{maxWidth:900,margin:"0 auto",color:"#f0c040",fontSize:11,fontWeight:700}}>{mW==="move"?"Cliquez la destination sur le plateau":mW==="gunner"?"Canonnier: cliquez ennemi":mW==="squadfire"?"TIR GROUPÉ: cliquez cible":"Cliquez sur un ennemi"}</div>}
            </div>
          )}
          {paused&&!mU&&phase==="battle"&&(
            <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:"#1a1a0a",borderTop:"2px solid #f0c040",padding:10,textAlign:"center",color:"#f0c040",fontSize:13,fontWeight:700}}>

              <span style={{color:curP===1?"#58a6ff":"#f85149",fontWeight:900,fontSize:14}}>TOUR J{curP}</span>
              {(curP===1?a1:a2).filter(u=>u.hp>0&&!u.done&&u.dep).map(u=>(
                <button key={u.id} onClick={()=>takeCtrl(u)} style={{...BS(curP===1?"#1a3a5a":"#3a1a1a"),fontSize:9,padding:"3px 8px",border:`1px solid ${curP===1?"#58a6ff44":"#f8514944"}`}}>
                  {u.ic}{u.name} ({u.act}PA)
                </button>

            </div>

          {/* Unit roster */}
          {phase==="battle"&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:2,marginTop:4,position:"relative",zIndex:40}}>
              {all.filter(u=>u.hp>0&&u.dep).map(u=>{
                const isSel=mU?.id===u.id||sel?.id===u.id;
                const sqC=sqColor(u.sqId);
                return(
                <div key={u.id} onClick={()=>{if(paused||isHuman(realCP.current))takeCtrl(u);else showLos(u);}}

                  {u.sqId&&<span style={{marginLeft:2,padding:"0 3px",borderRadius:2,fontSize:7,background:(sqC||"#888")+"33",color:sqC||"#888",border:`1px solid ${(sqC||"#888")}55`}}>{u.sqId}</span>}

              {log.slice(-50).map((m,i)=>(
